body:
  text: 續宋編年資治通鑑巻十三宋劉時舉撰宋寜宗二壬戌嘉泰二年春正月癸亥蘇師旦兼樞密院都承㫖師旦本平江府書佐韓侂胄頃為本府兵馬鈐轄從府假筆吏吏以其冷局俾師旦行韓滿歸蘇復還府下丘崈為守嘗以事怒師旦編管秀州久之韓知閣門事師旦困甚往依之韓憐而寘之門下未久上登極韓以師旦竄名藩邸吏士内遂用隨龍恩得官韓以其辯慧愛之髙宗實録成己巳雷二月弛學禁初學禁之行也京鏜何澹劉徳秀胡紘四人者實主其議為韓侂胄斥逐異已者羣小附之牢不可破慶元五年二月紘罷吏部侍郎七月徳秀自吏部尚書出知婺州六年八月鏜以左相死於位去年七月澹罷知樞密院魁憸盡去侂胄亦厭前事欲稍示更改以消中外意時亦有勸其開黨禁以杜他日報復之祸者侂胄以為然甲申追復趙汝愚資政殿學士戊子頒治縣十二事以風厲縣令癸巳禁行私史二月辛亥詔舉邊郡官己未初命提刑以五月按部理囚詔薦舉除陞改自代十科外悉罷夏四月庚寅雨雹辛夘禁經營留闕者復太學混補試五月甲辰朔日有食之己巳賜傅行簡四百九十有七人及第出身有差六月己夘臨安府災壬寅浚浙西運河己亥禁冒發充軍秋七月不雨八月袁説友同知樞密院事癸未建寳謨閤奉藏光宗御集己丑詔作夀慈殿請太皇太后還内甲午慶元條法事例成九月己酉上朝夀慈宫甲寅修皇帝㑹要丙寅嗣秀王伯圭薨庚午臨安府奏野蠶成繭冬十月壬申以通判主管總所財賦追復朱熹職名以煥章閤待制致仕十一月庚子陳自强知樞密院事許及之參知政事丁夘皇帝日厯成庚午命贓吏毋使予祠十二月甲戌日中有黒子甲申立貴妃為皇后韓侂胄為太師吕中曰外戚不得預政此祖宗家法也自建隆至紹熙列聖相承不敢失墜雖以曹佾之賢䖏帝舅之重神宗皇帝欲除佾為中書令而吕申公力言其不可聖君賢相所以防㣲杜漸之意盖可見矣惟政和六年鄭居中由顯肅皇后之親拜為太宰此已往之失不可效尤也侂胄何人夤縁戚里干預朝政且躐取帝師之任是祖宗三百年之家法至侂胄而盡壊之矣他日兩觀之誅其能免乎庚辰大閲閏十二月乙未詔講官開陳經義宗室曮拜威武軍節度使封衞國公復周必大少傅觀文殿大學士是冬皇子坰生未踰月薨追封華王諡曰冲穆詔修孝宗光宗實録臺諫侍從紹興末年臺諫每月必一請對密官毎月必一言事從官兩月必一求見否則謂之失職自侂胄扼塞言路從官既不言事而臺諫亦多牽掣月終必舉按小吏一二人謂之月課凡釐務官州屬曹掾簿尉監當皆在此列又有泛論君徳時政皆以陳熟緩慢者言之或問之則愧謝曰聊以塞責聊以藉手而已聞者哂之賑諸州水旱癸亥嘉泰三年春正月丞相謝深甫罷壬午置湖南溪洞總首戊子龍州蕃部宼邊甲午參政張巖罷丙申陳自强以樞密兼參知政事丁酉雷戊戌幸太學謁大成殿御化原堂命國子祭酒李寅仲講尚書幸武學謁武成殿監學官進秩一等諸生推恩賜帛有差袁説友參知政事是春謝深甫初免相許及之為參知政事既命陳自强以員外兼權又命説友盖三員也嘉定初命雷孝友婁機樓鑰亦三員遂為故事至九月説友罷政事傅伯夀簽書樞密院事以老病除集英殿修撰知䕫州費士寅簽書樞密院事二月乙巳冊皇后楊氏乙丑再竄王徳謙於新州三月久雨詔大理三衙臨安府决繫囚乙酉幸聚景園夏四月己亥朔日有食之壬寅福州言瑞麥生李運言兩淮鐵錢交子利害詔戸部相度至是出封樁庫交子一百萬命轉運司收民間鐵錢乙夘陳自强等進徽宗孝宗玉牒光宗實録五月戊寅陳自强為右丞相以許及之知樞密院事兼參知政事不雨詔釋杖以下囚秋七月辛未出封樁錢造戰艦壬午同安漢陽蘄春三監罷鑄錢白虹貫日癸未禁抑納逃囚九月壬申立宗子希璂為孝宗長子鄧王愭後癸酉命鐵冶司毋得私毁錢為銅冬十月庚子吕祖泰任便居住丙午命兩淮諸州以仲冬敎閱民戸萬弩手丁未大風戊申龍州蕃部降十一月甲戌詔南郊加祀感生帝太子庶子等星赦天下癸未大風己丑更定選人改官法庚寅復置福田居養院十二月辛酉詔戒將帥掊克金國盜起沿邊聚粮増戍且禁襄陽府𣙜場懼宋朝乗其隙也朝廷聞其事乃以參政張巖帥淮東樞密程松帥淮西以侍郎丘崈守四明防海道以大卿辛棄疾帥浙東時武帥鄭挺在襄陽力求去以李奕為荆鄂副都統兼知襄陽松為父喪辭改命廣帥薛叔似而叔似不行遂命侍郎宇文紹節代之又徙辛棄疾以次對守京口起資政趙彦逾守四明出知院許及之守金陵及之不欲行乃命崈以直學士代典留鑰其開邊釁盖自此始御筆命監司郡守申交割數張孝仲以安撫司幹辦除成州後以諸司屬官係京官考理通判任一次自此始甲子嘉泰四年春正月乙亥大風庚辰貶内侍甘昺癸未日中有黒子辛夘雷壬辰雨雹西浮洞逃軍為亂盤量北邊積糧辛棄疾入見言敵國必亂必亡願付之元老大臣當備兵為倉卒應變之計侂胄大喜二月壬子蠲臨安府逋負酒錢己未立試刑法避親法庚辰夜有赤氣亘天三月丁夘臨安府火災壬申禁質賣軍器辛巳立添差及祠廟限員夏四月命内外諸軍詳度屯隊法甲辰以知院許及之守金陵為出師計不行而罷賑恤江西州縣水旱乙巳費士寅兼知樞密院事張孝伯參知政事錢象祖賜出身同知樞密院事丙辰詔選舉禁請嘱受私書之弊五月乙亥詔舉將材追封岳飛為鄂王六月丙申置諸軍帳前雄効韓侂胄却生日賀儀仰進奉官徧行關報議者謂大臣却四方之饋未有自奏邸行下諸路盖僣也時士大夫或獻紅錦壁衣承塵地衣之属修廣髙下皆與中堂等盖密量其度而為之又有獻紅牙果卓珍珠搭幡光耀奪目以媚侂胄其後或遇侂胄生日大臣以下皆排列所獻於天慶觀之廡下都人競往觀焉己亥詔改明年元壬子禁州縣按私籍没民産甲辰再蠲臨安府身丁錢六部架閣非闕官勿除總所令監司算綱運乙丑開禧元年春正月癸丑初置澉浦水軍壬午雨霾賜蘇泃諡曰文二月丙午蠲臨安府酒税錢乙夘雪竄翁㸃新州先是有㫖召㸃赴行在御史徐柟劾㸃貪黷嗜進等事遂寢是命㸃聞之上章自辨察官為内臺刑獄之官為外臺察官論事不得其平外臺安得冺没而不與之直次論柟私託不行所以貽怒者數事其末云楊輔劉起晦乃今之望人一旦報怨併論罷之中外失望侂胄怒遂有是責三月庚申太白晝見申嚴生子弃殺之禁仍令諸路文官常平官月給錢米收養之韓侂胄欲用兵恢復中原乃出封樁庫金一萬兩以待賞功侂胄欲以費士寅鎭興元士寅固辭遂罷樞密是科䇿士有論宜乗機以定中原者侂胄大喜用兵之意遂决四月武學生華岳上書言朝廷未宜用兵恐啟邊釁忤侂胄流建寜府金人伺知朝廷有用兵意五月遣其平章事布薩揆為宣撫使駐開封遣使來責渝盟以邊民侵掠及沿邊増戍為辭是月鎭江都統戚拱遣忠義人朱裕結漣水軍弓手李全焚漣水塞其後侍郎李璧乞斬朱裕梟首境上人皆寃之六月詔内外諸軍密為行軍之計而以程松為四川制置使諫議大夫李大異以諫止開邊同日補外是月命敎閱禁軍八月命興元都統司増招戰兵詔侍從兩省臺諫在外待制學士以上及内外諸軍主帥各舉將帥邊守一二人侂胄欲風厲諸將乃封贈劉光世為鄜王諡文忠少保岳飛為鄂王中興諸將至是畢王矣又命湖北安撫司増招神勁軍又以殿前副都指揮使郭倪為鎮江都統守揚州十月李璧使還言兵未可輕動不聽十一月置殿前司神武軍五千人屯揚州十二月増刺馬軍司弩手中郎將厲仲方造戰車連弩未及用而罷去周虎繼之用戰車敗敵於清水鎭時軍政修明人心大喜以為恢復之期可必惜朝臣議論不一不能成功天也夏四月戊子朔錢象祖參知政事兼同知樞密院事劉徳秀簽書樞密院事辛夘皇甫斌兼知襄陽府辛丑日中有黒子乙夘大風五月己巳試舉人毛自知四百三十有二人復淳熙薦舉改官法乙亥詔以曮為皇子進封榮王六月罷廣東税場辛丑淮東安撫鄭挺罷壬寅天鳴有聲復同安漢陽蘄春三監乙丑陳自强上吏部七司法秋七月庚申韓侂胄平章軍國事兼國用使詔立班丞相上三日一朝先是六月陳自强鄧友龍等請用本朝故事以侂胄平章軍國事乃有是命吕中曰國朝故事如仁宗朝吕夷簡拜司空平章軍國重事哲宗初文彦博以太師拜平章軍國重事此二人者皆累朝元老徳碩望隆故䖏以是職也侂胄何人而憸朋黨奸乃以為比易曰負且乗致㓂至其是之謂乎蘇師旦除安逺軍節度使在京宫觀領閤門事贈趙汝愚少保是月不雨置資善堂直講説書各二員八月癸巳雨欽宗玉牒成九月丁亥簽書劉徳秀罷庚午詔贓吏追還所受贓庚戌大風冬十月甲子汀州守臣陳鑄更圖瑞麥以獻詔奪一官復置利州馬監十一月申嚴告訐之禁十二月修孝宗光宗御集詔兩浙路身丁錢絹自開禧二年以後其永除之戊寅金主遣禮部尚書趙之傑來賀明年正旦之傑入見容止倨緩持國書逡廵前立若將要上為起者閤門奪其書以進儀賛者唱云躬身立之傑端立不動金主父顯宗名允恭同音字合與避而不避者之傑益不平侂胄請駕還内繼有㫖更以正旦相見真里國來入貢賑諸州水丙寅開禧二年春正月雪乙未増太學内舍員為百二十人辛丑置國用司參詳官乙巳薛叔似宣諭京湖己酉雷雨雹辛亥禁毁錢為銅是月雅州蠻髙吟師寇邊三月進犯碉門寨四月賊焚碉門寨官軍失利義勇軍准備將刁謙戰死提刑劉崇之檄宣撫司調兵自行討之宣撫司調潼川隆慶府大軍各五百合前後官軍六七千人以准備差遣王好謙與原統領王鉞統之委崇之往軍前節制王師至髙吟師出降擒其首六十三人誅之二月癸丑夜夀慈宫火久雨己夘復御正殿三月癸巳程松宣撫四川呉曦副之仍有節制財賦指揮且許按劾兩軍出入曦得自專先是四川計司舊属宣撫司節制鄭剛中在蜀秦檜惡其專始命趙徳文以少卿為之自是三司抗衡至是轉宣撫司節制劉崇之新除總領即上章抗論辭職不允甲午以鄧友龍為兩淮宣諭使詔監司行部理囚己亥幸聚景園從太皇太后逰幸錢象祖責其懐姦避事乃罷參政尋竄信州張巖兼知樞密院事己酉知處州徐邦憲入見請因立太子肆赦弭兵侍御史徐柟劾罷之吕中曰臺諫天子耳目為朝廷爭是非辨邪正者也祖宗盛時先正名臣有識大體者有風采動朝端者有稱鐵面御史者其所彈劾往往合於衆論之公曷嘗觀望朝廷之風㫖哉自王安石用事諸君子以不合去位而職紏繩者率用鄧綰李定之流小人希合始有不當劾而劾者矣且以開禧之際觀之皇嗣雖立而儲位未正權倖輕舉而邊釁將開是二事者真當世之切務也徐柟職䖏風憲方且緘黙不言迨及直臣有言又從而劾罷之是果何心哉遡其本情不過迎合權倖而已咄哉鄙夫真有負祖宗設官之美意矣夏四月甲子以薛叔似為湖北京西宣撫使兩淮宣諭使鄧友龍改除宣撫使下納粟補官令戊辰修紹興以後鹽法庚午追奪秦檜王爵四川宣撫副使呉曦兼陜西河東路招撫使鎭江都統郭倪兼山東京東路招撫使鎭江都統趙淳兼京西北路招撫使江陵副都統皇甫斌兼西北路招撫副使吕中曰小人擅朝欲為專寵固位之計往往至於用兵王吕變法生事於熙河王珪懐姦喪師於靈武繼是則章蔡造釁於湟鄯王黼稔禍於燕雲誤國戕民前後一律今侂胄在朝窮奸極惡海内切齒而復不度事勢妄啟兵端三邊瘡痍生靈魚肉雖擢髮不足數其罪矣陳孝慶復泗州又復虹縣許進復新息縣孫武復褒信縣四川總領所奏辟以進義副尉楊巨源監興州合江倉五月陳孝慶復虹縣侂胄聞已得泗州乃議降詔仍調泉州兵赴山東路㑹合丙戌上内批云北敵世仇久稽報復爰遵先志决䇿討除宜頒詔書明示海内翌日乃下北伐之詔詔畧曰天道好還中國有必伸之理人心效順匹夫無不報之仇蠢兹勍敵猶託要盟朘生靈之資奉谿壑之欲迹其不恭孰不含怒軍入塞而公肆創殘使來庭而敢為桀驁洎行李之繼遣復慢詞之見加含垢納汙在人情而已極聲罪致討屬敵運之將傾兵出有名師直為壯言乎逺言乎近孰無忠義之心為人子為人臣當念祖宗之憤上以北伐告於天地祖宗社稷四川宣撫程松至漢中江州都統王大節攻蔡州不克江陵都統皇甫斌引兵攻唐州不克興元都統秦世輔至城固縣而軍大亂池州副都統郭倬馬軍行司李汝翼攻宿州不克建康都統李爽攻夀州敗績後王大節竄袁州郭倬李汝翼皇甫斌李爽等各奪官吕中曰恢復大計當以人才為先真宗之禦契丹必有李繼隆石保吉然後成澶淵克敵之勲仁宗之制夏羌也必有韓琦范仲淹然後收曩霄納欵之績髙宗之抗女真者必有張韓劉岳然後剉烏珠今則總戎三邊者誰歟呉曦特膏腴之子弟郭倪郭倬李爽李汝翼皇甫斌諸人又皆猥瑣之庸才平居暇日不過尅剥士卒苞苴饋賂圖為進身之梯媒甚者且外交仇敵以伺中國之動靜矣朝廷顧以推轂制閫之事悉以委之師纔出境而前者敗後者潰大者殱小者奔罪甚者誅戮輕者投竄而統蜀漢之逆曦又以叛聞用兵以來敵之損未一二而吾國之喪失敗亡已不可勝計矣假使鄧禹聞之寜不笑人於地下乎六月金人封呉曦為蜀王先是四月曦獻關外四州之地求封於金十二月曦焚河池縣退屯清野源癸丑曦自殺金平退歸魚關金人遣呉瑞持詔印授曦於置口曦自置口還興州癸酉呉曦稱蜀王先一日夜興州天赤如血照地如晝自月初有兩日相摩於初晴之時至是復有此異壬寅太白晝見簡荆㐮兩淮田卒以備戰兵戊申安丙置司於河池時為陜西河東招撫司隨軍轉運使甲辰鄧友龍罷兩淮宣撫使以丘崈代之駐揚州兵凡十六萬一千四百餘人畢再遇權山東京東招撫公事時諸將用兵皆敗唯畢再遇數有功金人常以水櫃敗我再遇夜縛藁人數千衣以甲胄持旗幟戈矛儼列成行昧爽鳴鼓金人驚視亟放水櫃後知其非兵也甚沮乃出兵攻之金人大敗又嘗引金人與戰且却至於數四視日已晩乃以香料煮黒豆鋪地上復前搏金人佯為敗走金人乗勝追逐其馬已饑聞豆香皆就食鞭之不前我師反攻之金人馬死者不可勝計又嘗與金人對壘度金兵至者日衆難與爭鋒一夕㧞營去慮金人來追乃留旗幟於營并縛生羊置其前二足於鼓上擊鼓有聲金人不覺為空營復相持數日及覺欲追則已逺矣田琳復夀春府戊辰雅州蠻復寇邊先是官軍既殺髙吟師官軍欲深入夷界㑹有為石棚所壓者乃遣土丁先往攻之提刑督捕司簽㕔任䖏厚時在碉門寨以狀白提刑督捕司欲焚其巢提刑除總領遂還夷人掩官軍不備殺傷甚衆興元將張全忠戰死陳堯輔一軍盡没即自刃而死王好謙與王金共議再與之戰壬午夷酋髙奴嵬等出降韓侂胄以喪師為蘇師旦所誤乃奏劾師旦除名安置仍籍其家秋七月梁洋義士統制毋思襲取和尚原九月復陷權都統制范仲壬出師寳雞小捷未幾楊輔遺書韓侂胄言蜀兵驕粮乏暫休息以規後圖遂班師張巖知樞密院事李璧參知政事誅郭倬於靜江府置御前强勇軍以淮東安撫司所招者為之九月戊子雷辛夘合祭天地於明堂赦天下乙巳賞復泗州功冬十月詔内外軍帥各舉智勇可為將帥者二人辛酉以將帥暴露罷瑞慶節宴丙午金人自清河口渡淮守將郭超失利遂圍楚州十一月庚辰以主管殿前司公事郭杲領兵駐真州以援江淮辛巳金人犯棗陽軍有北來韓元靚者至真州言金人有和意丘崈遣人䕶送北還丙申元靚又還得金人行省文字崈以聞於朝甲申令丘崈督視江淮軍馬金人犯神馬坡江陵副都統魏友諒突圍趨㐮陽忠勇軍呂靖孫欲圖友諒友諒格殺之戊子金人犯廬州副都統制田琳引戰拒却之真州援兵至後八日而圍解田琳襲之金人大敗而還乙未以湖廣總領陳謙為湖北京西宣撫副使韓侂胄獻家財二十萬以贍軍優詔褒納金人逰騎渡漢丁酉金人犯舊岷州踏白軍統制王喜引兵遁戊戌金人圍和州守將周虎引戰却之敵乃引兵陷信陽軍辛丑圍襄陽府先是敵将至趙淳焚樊城而憂悸成疾賴諸将協力守禦城得以完時蜀漢路斷金人圍皂郊不下移屯天水縣壬寅陷隨州守臣遁州人迎拜金人斂兵不殺逐之徳安癸夘太皇太后賜犒軍錢一百萬緡詔諸路招填禁軍以待調遣甲辰金人犯真州士民奔逃溺江者十餘萬鎮江守臣宇文紹節亟具舟以濟之廪食之於是濠梁安豐及並邉諸戍皆没矣乙巳陷西和州後八日聞王師至而遁十二月戊申金人圍徳安府守将李師尹拒之再攻襄陽東南西門為國兵所敗庚戌陷成州守臣辛槱之遁王師攻城不下明年二月始解圍去甲寅金人攻六合縣郭倪遣前軍統制郭僎救之遇於湑浦橋官軍大敗倪棄揚州走瓜洲渡督府復遺書金人言和好先是元靚還金營以文字來言和至是募得盱眙小吏王文持書往金營大畧謂用兵乃蘇師旦鄧友龍皇甫斌等所為非朝廷本意文等還金人答書悖慢多所要索且謂侂胄無意於用兵則師旦豈敢專擅督府又遣書許以送還淮北流移人及今年嵗幣金人有許意朝廷乃以報書遣陳璧持第三書以往㑹六合交兵第三書犯金人廟諱金人以用兵語來使却其書而還丁巳金人陷大散闗都統制毋思遁以總管孫忠鋭權都統制癸亥魏友諒潰軍於祀泉友諒走江陵丁夘金人犯仙人闗興州中軍正将李好義拒却之畢再遇持重兵江上邀擊金人累克捷㑹朝廷調兵畢集江上金人乃自淮南退師惟留一統制守濠州郭倪喪師責授果安團練使送南康軍安置庚午薛叔似陳謙罷以呉獵為湖北京西宣撫使仍知江陵軍復両浙圍田募両淮流民耕種四川宣撫程松自米倉山出閬州順流以歸時呉曦已有逆謀矣丁夘開禧三年春正月丘崈罷以張巖督視江淮軍馬先是丘崈乞朝廷移書金營通好而謂金人指侂胄為元謀乞免繫銜侂胄怒故罷崈皇甫恭自汴京使回恭奏行省完顔弼右副元帥赫舍哩志寧皆有和意且移書都堂金陷階州丁亥皇子圻生庚寅遣淮民歸業甲午呉曦僣位於興州下黄榜於四路召安丙為丞相權行都省事丙稱疾不出權大安軍楊震仲以不受偽命飲藥而死利州路轉運判官不受偽命削髮於利州之石鐓四川總領劉崇之不受偽命曦怒命徐景望為四川都轉運入利州逐崇之崇之遂趨成都成都府安撫使楊輔下令稱提錢引大書開禧之號㑹崇之至乃議舉兵誅曦董鎭以偽命至成都復為潼川知府費士寅所殺庚子彭輅奔㐮陽癸夘嚴進引兵入成都甲辰陳孝慶奪三官二月戊申雪甲寅竄商榮己未呉曦反書聞以楊輔為四川制置使葉適兼江淮制置使不雨庚申罷諸路添差冗員戊辰皇子墌生庚午金人去㐮陽壬申上以金人退始御正殿復膳安丙誅呉曦四川平先是正月興州中軍正將李好義與其徒謀舉義二月監興州合江倉楊巨源至興州與丙謀丙喜明日始出視事興州進士楊君玉引楊巨源以見李好義皆謁安丙遂定議君玉與白子申共草密詔其略曰惟干戈省厥躬既昧聖賢之戒雖犬馬識其主乃甘仇敵之臣邦有常刑罪在不赦二十九乙亥未明誅曦於偽宫軍士李貴斬曦首楊君玉宣密詔安丙權宣撫使巨源為參賛軍事先是朝廷賜安丙帛書諭以能殺曦報國不次推賞雖二府之崇亦所不吝於是曦已誅而朝廷未知也三月丁丑誅受偽命人徐景望丁亥趙彦呐誅曦將禄禧於䕫州庚子誅呉曦露布至相丙寅贈吕祖儉朝奉郎直秘閣官其子一人丁夘詔改明年元四川宣撫使科别糴米是嵗以建康鎮江三務場徑𨽻提領四川初行小㑹子續宋編年資治通鑑巻十三
