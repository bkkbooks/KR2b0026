body:
  text: 續宋編年資治通鑑卷十宋劉時舉撰宋孝宗三辛丑淳熙八年春正月上諭宰執曰德夀宫提舉陳源帶浙西副總管趙汝愚謂內侍不當領兵政進呈太上亦以為然並改內祠遂詔自今內侍不得兼兵職永為定制三月親試舉人以黃由為第一詔臨安府及諸路官私房僦不限貫百十分減三閏月立臧否郡守法夏五月宴講筵官六月賑紹興府徽嚴等州水災知處州李士龍納租多取加耗詔降一官録范質後吕祖謙以疾奉祠終於家祖謙五世祖公著以勳德著聞四世祖希哲首從程氏遊淵源所漸尤為深逺資稟特異聞道甚早其學本於纍世家庭之所傳博稽四方師友之所講至今學者知嚮正學而尊前輩則其訓迪之餘功薰染之遺澤也嘉定八年諡曰成八月趙雄罷出知瀘州時有言雄多私里黨者於是命大臣進擬皆於姓名下注本貫封入遂為故事以王淮為左丞相詔見任宰執臺諌子孫並與宫觀嶽廟俾為資考先是蔡京父子共政秦熺繼之由是典型大壞帝深惡之九月江浙湖北旱出爵募民賑濟冬十月謹出命經三省法國子監簿喻良能進忠義傳頒之武舉詔以連嵗荒歉權罷賀雪賜宴十一月詔諸路賑飢浙東提舉朱熹入對奏論浙東救荒事乞勸諭推賞人乞撥賜米斛乞預放來年身丁錢上皆從之又奏推行建寧府社倉法於諸路又乞復白鹿洞書院本唐朝李渤所居有臺榭環以流水雜植花木為一時之勝南唐升元中因建學館買田以給諸生學者大集後經兵火屋宇煨燼至是復之吕中曰我朝京師有學諸州有學下至一邑亦有學其制備矣然古人比閭族黨莫不有學則復白鹿書院其亦鄉學之意歟孔子以詩書禮樂教弟子蓋三千焉則傳道育才不在辟雍泮水而在杏壇之上洙泗之間於此見鄉學之有功也國家肇造之初為書院者有五曰嵩陽書院曰石鼓書院曰嶽麓書院曰應天府書院曰白鹿書院今嵩陽應天二書院不可考而石鼓書院淳熙中得潘候時而復興嶽麓書院又得張朱二先生振之回視州縣之學不過世俗之書進取之業其相去豈數百驛而已哉當文公乞復書院時朝野喧謂州縣已有學校不必煩費文公之議曰先王禮樂之官與異端鬼道之居孰正孰邪三綱五常之教與無父無君之教孰利孰害今佛老之言大郡以千計中郡不下數十學校教養郡縣僅一置焉而附郭之縣或不復有其盛衰多寡相絶如此則其邪正利害之際亦已明矣今有司不能正於彼反疑其有所請於此不知其何説也十二月雨電壬寅淳熙九年春正月賑兩浙飢池州汪青坐盜發人冢誅後他卒事覺知非青罪詔推勘官吏趙粹中落職餘責罰有差青家支給五年王淮奏陛下念一夫之寃存恤其家恩及幽明矣詔勸民種春麥夏六月詔侍從臺諫舉官堪充監司者各一二名秋八月詔任子以品秩之崇卑立為定數宰相十人開封以上同執政八人太尉同侍從六人觀察使至節度侍御史同中散大夫至中大夫四人右武大夫至通侍大夫同帶職朝奉郎至朝議大夫三人職事官寺長二監長至左右司諫開封少尹釐務及一年須官至朝奉郎并朝奉郎元帶職人因除在京職事官而寄職者同武翼大夫至武功大夫同非侍從官無遺表外見行條格致仕遺表通減三分之一餘分不減紹興初中書舍人趙思誠上任子限員之議詔從官討論至是始用廷臣集議行之淮東蝗辛巳大饗明堂九月以王淮梁克家為左右丞相冬十一月夔州路飢癸卯淳熙十年春正月上曰養兵費財國用十分幾八分養兵周必大奏尚不止八分上曰今民間未裕江東浙西路州軍寄招鎮江諸軍及武鋒軍嵗額人數可權免三年所有諸州未足之數特以蠲免以黃洽為御史中丞三月詔舉制科夏六月兩浙水命賑之監察御史請禁偽學奏略曰臣竊謂天下之士所學於聖人之道者未始不同既同矣而謂我之學獨異於人是必假其名以濟其偽者也邪正之辨誠與偽而已表裏相副是之謂誠言行相違是之謂偽臣伏見近世士大夫有所謂道學者其説以謹獨為能以踐履為高以正心誠意克已復禮為事若此之類皆學者所共學也而其徒乃謂已獨能之夷考其所為則又大不然不幾於假其名以濟其偽者耶臣願陛下明詔中外痛革此習每於聽納除授之間擯棄勿用以示好惡之所在庶幾多士靡然向風言行表裏一出於正無或肆為詭異以干治體實宗社無疆之福從之廣西運司申昭州金坑五處遞年所入不多若行廢罷以裕民間甚便上從之詔監司帥臣嵗舉亷吏一二人詔經理屯田和州屯田五百餘所廬州管下三十六處建康府上元縣五百餘頃又襄陽府宜城縣荒熟田七百五十頃令各處具田畝實數以聞詔命官犯自盜枉法贓罪抵死者籍沒家財取旨決配必無容貸秋七月廣西鹽復鈔法先是官利其贏而自鬻久為民病至是詔罷官給官賣通行客鈔旱詔求言上謂輔臣曰朕心未嘗放下一日之間天下定行一兩遭又謂數日羣臣應詔言事並無及朕過失多言刑獄事刑獄自有成法王淮對曰陛下憂勤如此更有何過失可指詔助役聽從民便先是處州守臣范成大於本州令民間出錢助役謂之義役行之十六年後有右正言蔣繼周言范成大倡為義役之説擾民壞法乞降睿旨將處州及兩浙有見行差役去處聽從民便令官司不得干預其民間自難久行或不能息爭訟仰州縣照應物力次差募從之監察御史謝諤言蔣繼周所奏係是兩項見行義役聽從民便是行義役法也民間自難久行不能息訟依次差募是待差役法也是欲差役義役並行不曽名言盡罷義役訪聞江東西諸路乘此頗有搖動蓋民間舊因差役吏緣為姦當差之時枚舉數名廣行追擾望其脫免邀求貨賂使之爭訟至有纍月而不定者所以吏人自為諺曰衆人出錢一户入役民間因此多有困竭緣行義役遂頗便之胥吏束手無措日夕伺隙以敗其謀近有饒州吉州人户赴臺陳訴端有可憫乞下諸路應有義役當從民便其不願義役及自有爭訟乃行差役上曰前則蔣繼周言處州守臣專行義役之弊今諤欲義役差役各從民便令照前降指揮施行十一月朔日有食之大閲於龍山李椿卒椿為吏部侍郎極言宦官之盛衰係有國之興亡靖康明受其權有以裁制之則國家免於前日之禍宦官亦保其富貴又門禁宫戒之外勿使預於人材政事又嚴士大夫兵將官與之交通之禁又言渡江以來茶法之弊謂官執劵市之園户州縣嵗額取之於民廣西鹽法官自鬻之後改鈔法漕計大窘以一路田租二十二萬斛令民折而輸錢至於吏祿兵糧稍無所給則又損其估以市於民曰和糴曰招糴椿請除民和糴招糴官民兩便椿所言皆憂國利民之事及卒人皆為之流涕甲辰淳熙十一年春正月辛卯雨土詔救災傷免核實甲午雨土二月令兩淮京西河北路閲民兵萬弩手拘集比試每州解一二名赴樞密院依四川義士例補授以示激勸三月親試舉人以衛涇為第一太湖知縣趙傑之有言其不丁繼母憂者上諭宰臣王淮曰士大夫一被此名此身不可贖不須明言其罪止降一官上之忠厚如此夏五月校書郎羅點請降配刑謂戢盜賊不可不弭逃亡之卒欲弭逃亡之卒不可不減刺配之法望詔有司將見行刺配情輕者從寬減降或議居役或編管他郡令其應配照淳熙元年指揮擇其強壯者充軍庶幾配卒漸少不至於盜又四年八月臣曽言刺配之法始於晉天福間國初加杖用貸死罪竊謂前後創立配條若止令居役不離鄉井則幾於長姦不足以懲惡若仍用配法不恤點刺則面目一壞誰復顧藉強民適長威力有過無由自新檢照元豐刑部格諸編配人自有不移不放及移放條限政和編配格又有情重稍重情輕稍輕四等色目莫若依舊制參行而其他偶罹於罪皆得全其面目知所顧藉可以自新省過弭銷姦黨誠天下之切務乞詔有司裁定施行建康府大平等州水命賑之六月詔舉制科詔不拘三嵗之制有合試人舉官即以名聞明年春詔制舉題免出注疏秋七月賑泉福興化軍飢冬十二月熊克上九朝通略乙巳淳熙十二年春正月知平江府常熟縣曽棨犯贓監司傅珙劉穎失察並降官上諭輔臣諸路獄案多稽滯其間久不決者各取一二件將上仍命罰之二月雨雹三月右正言蔣繼周申禁胡服畨樂夏五月地震秋九月湖州台州水冬十月詔戒將帥曰朕惟將帥之弊每在蔽功而忌能専已而自用故下有沉抑之嘆而上無勝算之助殊不知兼收衆善不掩其勞使智者獻其謀勇者盡其力逮夫成效則皆主帥之功也昔趙奢解閼與之圍始令軍中有諫者死及許歷進北山之䇿而奢許諾卒敗秦師奢為封君與亷頗同仕果何害焉卿當以奢為法母蹈往弊仍刻石給賜諸將十一月辛卯郊十二月庚戌朔太上皇帝尊號加紹業興統明謨盛烈八字太上皇后加備德二字丙午淳熙十三年春正月庚辰朔慶上皇聖夀八十行慶夀禮乃大赦夏四月詔以沒官田産入常平五月宴經筵官以進讀陸贄奏議終篇賜侍讀蕭燧等御筵及金器鞍馬上召宰執賜酒從容詔曰自古人主讀書少有知道知之亦罕能行之且如與人不求備檢身若不及二句人君豈不知自是不能行甚者但作歌詩如隋唐之君竟亦何補唐德宗豈不知書然所行不至陸贄論諫諄復不已者原欲德宗知而行之如魏徴於太宗則語言不甚諄復且當德宗禍亂果何等時而與陸贄論事皆使中人傳旨其事有是非當面反覆詰難猶恐未盡中人傳旨又安能盡事機之會間不容髮中人得旨誤事實多朕每事以太宗為法德宗為戒秋閏七月雨雹八月乙亥日月五星聚軫九月求遺書户部言江西帥司乞以上供和糴折價錢上曰食與貨自是不同本是納米今使納錢以病民尤不可也冬十一月四朝國史成梁克家罷相與在京宫觀明年六月薨諡文靖十二月利州路飢命賑之丁未淳熙十四年春二月以樞密使周必大為右丞相以參政施師點知樞密院事二月封節婦廖氏墓親試舉人賜王容以下及第出身有差夏六月旱詔求言衡州請修炎帝陵從之秋七月賑台州紹興府等州旱災九月令湖北京西措置民兵以三丁取一五丁取二十丁取三冬十月大赦乙亥太上皇帝崩遺詔太上皇后宜改稱皇太后尋上宫名曰慈福上尋諭王淮等欲不用易月之制如晉孝武魏孝文實行三年喪服自不妨聽政司馬光通鑑所載甚詳淮等奏通鑑載晉武雖有此意然後來只是宫中深衣練冠上曰當時羣臣不能將順其美光所以譏之後來武帝竟欲行淮等奏記得亦不曽行上曰自我作古何害十一月詔皇太子參決庶務詔定厯差戊申淳熙十五年春正月置補闕拾遺却會慶節進奉三月葬高宗永思陵夏四月祔高宗以吕頤浩趙鼎韓世忠張俊配饗廟庭詔曰朕昨降指揮欲衰絰三年羣臣屢請御殿易服故以布素視事內殿雖有俟過祔廟勉從所請之語然稽諸禮典心實未安行之終制乃為近古宜體至意勿復有請蓋三年之制斷自聖心舉千載廢墜之典不為浮議所搖廟號曰孝不亦宜乎吕中曰此高廟配享之儀從洪景盧之請也然以公論觀之當以韓趙二公配享而吕頤浩不厭人望張俊附檜主和誣殺嶽飛不當預配饗之列故當時論者以為普彬之配食太祖定議於二十餘年之後今乃忽定於一日之間乞别集議其後楊萬里亦上書爭其事謂今建議之臣曰欺曰専曰私而已又論張公有社稷大功者五建復辟之勳一也發儲嗣之議二也誅范瓊以立國基三也用吳玠以保全蜀四也却劉璘以定江左五也蓋景盧兄弟皆湯思退舊客夙有憾於魏公故以復辟之功歸之吕頤浩也其後孝廟配享議者推陳魯公而魏公終不得預蓋但以富平符離之過而不考曹彬岐溝之敗其喪師蹙國亦不下於富平符離豈可以一眚而掩其大德乎三月大享明堂自乾道以後議者以德夀宫為嫌止行郊祀淳熙六年用朱熹等議行明堂之祭熹言近世祀明堂者皆以其父配五帝此乃誤認孝經之意也孝經曰嚴父莫大於配天則周公其人也下乃曰郊祀后稷以配天宗祀文王於明堂以配上帝天者謂郊祀配天也帝者五帝之神也故上云嚴父配天下乃云郊祀后稷以配天則父者専謂后稷也祖為王父則父不專謂考也至是周必大言高宗几筵未除未應配坐且當以太祖太宗配孝經自周公言之故曰嚴父耳留正言嚴父専指周公而言若成王則其祖也五月丞相王淮罷辭免判衢州六月雨雹朱熹入對賑臨安飢京鏜使金為報謝使堅執不肯聽樂詔京鏜將命執禮可嘉乃以京鏜為工部侍郎秋七月賑諸州水災八月甲午朔日有食之陳亮上萬言書略曰秦檜以和誤國二十餘年而天下之氣已索然無餘矣陛下有削平宇內之志又二十餘年而天下之士始知所向其有功於社稷宗廟非區區之所能誦也高宗皇帝春秋既尊陛下不欲大舉以驚動慈顔抑心俯首以致色養聖孝之盛書册之所未有也今者高宗既已祔廟天下之英雄豪傑仰首而觀陛下之舉動其忍使二十年間所以作天下之氣者一日而復索然乎天下不可以坐取也兵不可以常勝也驅馳運動又非年高德尊者之所宜也東宫居曰監國行曰撫軍陛下何不於此時命東宫為撫軍大將軍使之盡護諸將置長史司馬以専其勞此肅宗命廣平王之故事也兵雖未出而聖意震動天下之英雄豪傑靡然知所向矣天下知所向而吾之驅馳運動亦有所憑藉矣陛下倘以撫軍之言為可行則當先理建業而後臨之雖今嵗無北伐之舉而為經理建業之計以震動天下而與金絶陛下即位之志庶少伸矣九月辛丑大享明堂上曰配位如何周必大言禮官昨己申請髙宗几筵未除用徽宗故事未應配坐且當以太祖太宗並配他日高宗几筵既除自當别議録中興節義後冬十月置煥章閣藏高宗御集鄭僑使金賀正旦張時修副之金主病篤傳旨免朝見令就東上閣門進書僑與時修抗辭謂閣門者乃臣僚進獻表章之地皇帝國書豈當於此投進乃令且就館至元日遣還明日金主告殂使還未至會光宗受禪遷給事中十二月召朱熹上封事曰且以天下之大本與今日之急務為陛下言之蓋大本者陛下之心急務則輔翼太子選任大臣振舉綱維變化風俗愛養民力修明軍政六者是也己酉淳熙十六年春正月以周必大留正為左右丞相吕中曰相位之所以屢易者蓋懲秦檜專權之弊也然二十八年命相十有七人洪文惠三閲月而罷張魏公蔣子禮皆四閲月葉夢錫十閲月湯岐公葉正簡魏文節皆不踰年陳魏公一年七閲月趙魏公二年九閲月惟虞雍公滿三年而王魯公六年九閲月此其最久也若周益公爰立二年留衡公爰立踰月則同值內禪矣此外再入陳魯公事上凡一年九閲月吏部王曽魯公各不踰年惟梁鄭公再相僅五年以久病而罷此其最久也淳熙十五年沈清臣言天下之務有六一曰論相必天下之真相陛下始也取之故老重臣既而取之潛藩舊傳或取之詞臣翰墨或取之時望名流或取之刑法能吏或取之刀筆計臣或取之雅重脫易或取之行實自將或取之跅弛誕謾或取之謹畏柔懦或取狡猾俗吏或取勾稽小才始也取之姦豪詭詐皆空鄙之人而卒也任之柔懦委靡無可立之志間有度量沉靜而經畫甚淺心存社稷而才術甚踈表裏忠讜而規制良狹其他則以空踈敗以鄙猥敗以欺誕敗以姦險敗以浮誇敗以貪墨敗以詭詐敗以委靡敗然則焉用彼相哉二月辛酉朔日有食之壬戌上內禪移居重華宫皇太子即皇帝位立妃李氏為皇后上夀聖皇太后尊號詔求言下戒勵詔詔職事官日輪面對祕書郎權吏部郎官鄭湜因轉對首言三代以還本朝家法最正一曰事親二曰齊家三曰教子此家法之大經也自昔帝王雖有天下之富而不以天下養其親惟高宗享天下之養夀皇躬天下之孝二十有七年人無間言此聖賢之所難也陛下率而行之必如夀皇然後無愧也本朝歷世以來未有不賢之后蓋祖宗家法最嚴子孫持守最謹也后家待遇有節故無恩寵盈溢之過妃嬪進御有序故無忌嫉專恣之行宫禁不與外事故無斜封請謁之私此三者漢唐所不及也陛下能謹間家之義察女壯之戒則齊家之道得矣皇子岐嶷之性過人逺甚然在王所者左右前後皆善士也王誰與為不善講讀之官進見有時志意不通休沐之日或至多於講讀時而在左右前後之人與王親狎朝夕無間一日暴之十日寒之未有能生之物也願陛下盡事親之道以全帝王之大孝嚴家法之義以正內治之紀綱明教子之規以夀萬世之基本三月皇子擴進封嘉王夏五月周必大罷相秋九月赴省舉人定以二月一日引試冬十月詔大臣裁節冗費十一月詔遵祖宗成憲是嵗金主雍死孫璟立續宋編年資治通鑑卷十
