body:
  text: 續宋編年資治通鑑巻十一宋劉時舉撰宋光宗庚戌紹熙元年春二月申明御史弹奏二十條御史䑓弹奏格三百五條本淳熙所定至是劉光祖摘其有關於中外臣僚握兵將帥后戚内侍兵農禮樂訛雜風俗奢僣之事凡二十條奏乞付下恪守上從之詔夀聖帝典章法度類編成書當遵而行之以趙汝愚知貢舉而宗室知貢舉自此始右丞相留正請建儲上曰少徐議之貶姜特立時特立譙熙載以春坊舊人得幸特立除知閤門事留正為右揆通亞參尚闕特立忽見正曰上以丞相在位久欲遷左揆而葉張二尚書中擇一人誰實先之明日正奏具論其招權納賄之状上大怒罷特立與興國官夏五月親試舉人賜余復以下五百五十人及第出身有差罷劉光祖言職是春何澹同知貢舉光祖除殿中侍御史首上學術邪正之章及奏名光祖被㫖入院拆號與澹同席謝深甫逼澹曰近日風采一新光祖曰光祖非立異也但常日為大諫所言者則自言之耳澹出同院謂光祖曰何自然見公所上章數日為之恍惚日餌定志丸他可知也未㡬深甫除右正言至是光祖坐論呉瑞孫璫事忤㫖出為潼州府轉運判官澹遷御史中丞議論自此分矣呉瑞者舊以巫毉為業上在潜邸先是上皇有病國毉不能療呉瑞療治有功上既受禪擢閣門宣贊舎人又遷帶御器械澹三上䟽論之不報給事亦封還勅黄上以御筆諭止之光祖再上䟽言小人渝分干請而使給諌不得行其職輕名噐虧紀綱䙝主權是一日而三失也䟽入上命大臣令都司諭止之光祖言益力上不樂徙光祖為太府少卿由是遂出蠲減充窠名版帳錢秋八月詔造新厯冬十月改左藏西上庫為封樁下庫減廣西五州鹽直鹽數命監司帥守舉人才命潭州經界緩不克行保任京官犯贓連坐湖北㑹子初行兩界辛亥紹熙二年春正月詔修紹熙㑹計録詔裁節浮費自今内諸司所給賜所營造所取索悉從有司定為中制惟正之供濫恩横例皆釐正之詔謁者趙彦逾何澹同稽考其後亦不果裁節焉夏四月初命任子簾試以革代筆之弊工部侍郎潘景珪言法令一書久不刪潤乃復置詳定敕令局差詳定一員删修官三員五月太學生余古上書言上宴遊無度聲樂不絕宫女進獻不時伶人出入無節宦官侵奪攝政隨加寵賜或至超遷更建樓䑓不輟興作深為陛下不取也甚至奏胡戎樂習齋郎舞乃使嬖妾雜以優人聚之數十飾以怪巾施之異服備極惡醜以致戲笑至亡謂也帝覽書怒始以編管議古罪言者乞從寛宥乃送秀州聽讀右丞相留正請復建儲上曰俟過宫與夀皇議之既而諭正夀皇聖意亦欲少緩六院官復入雜押秋中丞何澹有所生繼母之䘮請解官持服冬十一月壬申冬至郊風雨大至上震懼感疾后李氏大將李道女也悍而妬欲援立子嘉王為儲嗣因宴而請於夀皇未許后不遜夀皇有怒語后銜之乃造言謂夀皇有廢立意上驚疑疾愈甚及聞後宫有暴死者上震懼其疾不能痊平壬子紹熙三年春正月上以疾不瘳乃御内朝於是重華宫温清之禮以及誕辰節序屢以夀皇傳㫖而免宰輔羣臣封章㳫上都人始憂臣僚上言臣願陛下先清心寡欲躬自節儉然後明詔大臣裁立經費上自乘輿下至庶府一切量事裁酌罷其不急損其太過伶人胡永年積官至武功大夫遇恩乞任子吏部尚書趙汝愚奏永年樂藝出身難以任子望立為定法從之夏四月童子科呉綱年九嵗能誦六經語孟以夀皇聖帝親特改承務郎皇伯嗣秀王伯圭拜太師蜀鹽復舊法聽從民間自煮鹽嵗輸課利増印兩淮㑹子秋七月瀘州軍亂蠲減蜀中重額錢癸丑紹熙四年春正月詔江上諸軍陞差統制至准備將者令主帥解發三人赴總領所選擇一名事既行諸將皆不以為便三月趙汝愚同知樞宻院事察院汪義端有言高宗聖訓不用宗室為宰執汝愚力辭復命當筆學士申諭聖意汝愚乃受命趙汝愚言舊法聽改官者皆以三考為一任今以三考之外未罷竒零日内輙敢從旁干請已非法意詔未成考人於後任凑成三考聽舉改官應著為令夏五月左丞相留正以論姜特立待罪親試舉人賜陳亮以下三百九十人及第禮部舉人以亮冠多士朝野相賀李僑年五十四調成都府司户參軍自以禄不及養乞以一官回贈父母上嘉其志特詔以本官致仕父母皆予初品官封葢異數也錄先聖後詔以文逺子為承奉郎冬十一月戊寅上朝重華宫左丞相留正復視事十二月布衣王孝禮言今年冬至日影表當在十九日壬午而㑹元厯乃在二十日癸未係差一日乞將修内作所堂銅表圭降付太史局測騐從之以朱熹為湖南安撫知潭州是冬使人自金回金問朱先生安在荅以見在擢用回白廟堂遂有是除更獨員薦士法甲寅紹熙五年春三月夀皇不豫夏四月朱熹始拜命赴潭州五月夀皇疾寖棘上不能視疾人情益懼王府贊讀黄由乞令皇子嘉王過重華宫問疾甲申嘉王至重華宫夀皇為之感動戊寅以夀皇服藥故乃大赦六月丁酉夜夀皇崩於重華宫上猶未能出嘉王數入禁中泣請未遂中外訛言靡所不至翌日宰執奏事退太皇太后御札付宰執已下命宰執率百官詣重華宫發䘮左丞相留正樞宻趙汝愚參政陳騤同知余端禮率百官詣文徳殿拜表畢退聚重華殿廬議成服典故端禮引唐肅宗朝羣臣發哀太極殿故事附中使王公昌入奏是日太皇太后有㫖皇帝以疾聽就内中成服汝愚請太后埀簾不許丁未留正等奏嘉王仁孝夙成學問日進宜早正儲位以安人心乙夘再擬指揮進入上怒書八字云歴事嵗久念欲退閒而以手札付留正其議猶未决也利州西路帥呉挺卒革兩川牒試弊秋七月壬戌左丞相留正逃歸辛酉上正臨朝仆於地都人大駭工部尚書趙彦逾見汝愚白事汝愚微告以翊戴之議遣中郎將范仲壬以告殿帥郭杲汝愚知太皇太后深以宗社為憂將白事焉而難其人有知閣門事韓侂胄者太后女弟之子也張宗尹同在閣門遂令侂胄以内禪事附宗尹入奏又使閤門宣贊舎人傅昌期宻製黄袍時王在嘉邸猶未知也甲子果與歩帥王仲先分兵衞南北内太皇太后埀簾命闗禮引嘉王先入汝愚出太皇太后聖㫖云皇帝以疾至今未能執䘮曽有親筆自欲退閒皇子嘉王可即皇帝位尊皇帝為太上皇帝皇后為太上皇后王固辭且顧汝愚曰某無罪恐負不孝之名闗禮等以黄袍披上上拒不受汝愚固請遂即皇帝位於東楹之素幄次行禫祭禮都人聞之始安乃大赦天下赦文有曰冲懐每念於退閒親翰嘗頒於近輔先是京口諸軍亂言洶洶襄土歸正人陳應祥亦謀為變舉事前一日登極赦書至遂敗是晩沈有開彭龜年乞奏事上慘然久之曰前日聞大臣有建儲之話此亦可以息浮言安人心今怱遽乃爾早泣告慈福不可至今悸動吕中曰光宗自在潜邸以令徳著聞孝宗属意卒受内禪未幾不幸嬰疾享國不永而能以神噐授之聖子付託得人豈不美哉詔建大安宫以奉太上皇帝太上皇后尋詔五日一朝百官月兩朝立崇國夫人韓氏為皇后上既立趙汝愚奏乞禮請留正上從之而侍御史張叔椿劾留正擅去乃徙叔椿吏部侍郎而留正復相戊辰詔求言以章穎為侍御史黄艾為左司諫鄭湜使金告登位范仲壬副之己巳趙汝愚兼參知政事庚午朱熹自湖南召赴行在先是黄裳為嘉王府翊善光宗宣諭曰嘉王進學皆卿之功裳謝因進曰若欲進徳修業追跡古先哲王則須尋天下第一等人乃可帝問曰誰以熹對彭龜年繼為宫僚因講魯莊公不能制其母云母不可制當制其侍御僕從嘉王問此誰之說對曰朱熹之說自後每講必問熹之說如何故即位首召之辛未以黄裳為給事中陳傅良彭龜年並為中書舎人黄由為起居郎沈有開為起居舎人乙亥以趙汝愚為右丞相辭不拜陳騤知樞宻院事余端禮參知政事同知樞宻院事賜前宰執侍從詔訪以得失丙子大風戊寅賞定䇿功以郭杲除武康軍節度使韓侂胄除汝州防禦使初侂胄以内禪為已功所望不過節鉞知閤劉弼嘗從容以告汝愚汝愚不答侂胄不滿所望漸有邪謀辛巳趙汝愚辭相除樞宻院壬午貶内侍林億年陳源楊舜卿以光宗已病不能時過宫源等離間之罪癸酉余端禮辭同知樞宻院事甲申羅㸃簽書樞宻院事詔兩省官看詳封事具要切者以聞戊子詔百官日輪一員面對八月辛夘初御行宫行殿聽政辛巳除朱熹煥章閣待制甲午増置講讀官以黄裳陳傅良彭龜年為之壬寅賜講讀官詔乙巳詔晩講官坐講尋罷詔以生日為天祐節詔諸道舉亷吏糾汙吏皇弟柄進封徐國公禮部侍郎上率羣臣朝泰安宫許及之等請祧宣祖廟而祔夀皇詔侍從禮官集議是年趙汝愚秉政遂祧禧宣二廟而正太祖東嚮之位朱熹力爭不聽丁未議賑諸路水旱乙夘安南國王李龍翰加封思忠功臣減廣南鹽額章𨽻黄文罷言職謝深甫為御史中丞先是侂胄恃功意望建節恨趙汝愚抑之有怨言徐誼為京尹勸汝愚以節度使授之汝愚悔遣人諭侂胄侂胄荅語不遜遂日夜謀引其黨為䑓諫以擯汝愚㑹汝愚奏除劉光祖侍御史陳騤忽奏曰劉光祖與臣有嫌今光祖入䑓願先避位汝愚愕然而止侂胄遂以内批除深甫盖侂胄與騤合謀已久汝愚未之覺爾黄度為右正言度在言路未幾欲論韓侂胄之奸侂胄知之以内批斥去丙辰罷留正相位於是朱熹赴召至信州聞之有憂色未㡬諌議張叔椿再劾留正擅去相位詔降正觀文殿學士復命趙汝愚為右丞相詔侍從兩省䑓諫各舉通亮公清不植黨與曽任知縣者二人丁夘劉徳秀為監察御史時趙汝愚奏乞令近臣舉御史許之始議除兩人諸公舉吳獵者最多名在其首游仲鴻次之徳秀為大理寺主簿與侂胄深交侂胄乃諭中司令薦徳秀因以内批令兼用中司舉者一人徳秀遂與吴獵並除其黨以次而進言路遂皆侂胄之人一時善類排斥無餘盖十餘年而後定云庚午簽書羅㸃卒辛未合祭天地於明堂上以孝宗之䘮命趙汝愚朝獻景靈宫命嗣秀王伯珪朝享太廟而親祀明堂乃大赦天下趙汝愚為政首裁仰僥倖以故人多怨者自祖宗以來人主登極凡列郡守臣率得任子恩間有闕守臣而以幕職班行攝之者亦官之如例英宗即位司馬公時知諫院嘗以為言不聽上受禪肆眚汝愚因進言始命監司郡守許上表進貢推恩内守臣係權官者免進貢其表聽附遞是嵗五月以孝宗大漸嘗肆赦七月上登極九月宗祀明堂尚書省契勘一嵗之間三行赦故恐有兇惡累犯之人指恩作過内曽犯徒流罪已經登極赦恩免罪後再犯徒流以情深理重者未得斷遣别聽朝廷指揮其指揮與赦文同降但以白紙連書於黄牒前云二事皆前所未有也京鏜簽書樞宻事侂胄用鏜為黨陳傅良呉旒劉光祖咸先後斥去羣憸附和視正士如仇讎衣冠之禍自此始矣壬午黄裳卒裳與羅㸃相繼殂謝而汝愚之勢益孤甲申韓侂胄為宣州觀察使侂胄除防禦使不滿上䟽力辭乃止遷一官於是怨趙汝愚益深矣冬十月辛夘銓量四川守臣朱熹奏五事於行宫便殿乙未以雷雨詔求言辛丑減兩浙江東西路和買折帛錢蠲兩浙路丁絹身丁錢一半雅州蠻宼邊是日命朱熹講大學除朱熹國史實錄同修撰辭不允甲辰詔後有看詳封事擇其善者條上乙巳上大行至尊夀皇帝諡曰哲文神武成孝皇帝廟號孝宗尋詔廟樂名曰大倫之舞詔建􅓖宫於永思陵之東南以十一月乙夘權攢孝宗殯宫於永阜陵丙午卻瑞慶節賀表壬申曽三復使金賀正旦是月詔建福寕殿朱熹彭龜年請罷之閏十月癸亥集議廟制辛未核實封樁錢乙亥趙彦逾知建康府彦逾初兾汝愚引已同升已而止除端明知建康彦逾怨之遂與侂胄合未㡬改除四川制置彦逾益恨入辭䟽廷臣姓名於上指為汝愚之黨曰老奴今去不惜為陛下言之於是上亦疑汝愚矣復提舉太史局官詔兩省臺諫侍從各舉宗室有文學噐識者二人詔改明年元賜史浩諡曰文惠十一月戊子上欲罷朱熹乃降内批朕憫卿耆艾方此隆冬恐難立講已除卿宫觀可知悉趙汝愚獨袖内批還上且諫且拜韓侂胄必欲出之汝愚退求去不許侂胄使中使王徳講封内批以授熹熹即附奏謝遂行給事中樓鑰封還錄黄舎人鄧馹面奏乞留熹上許除宫祠已而不下起居郎劉光祖又言之中書舎人陳傅良再封還録黄有㫖除熹寶文閣待制與郡傅良䟽中有朱熹論事頗頻煩迂闊之語盖侂胄嘗言陛下千乘萬騎而熹乃欲令一日一朝豈非迂闊故時人謂傅良因廟議不合隂肆中傷去熹工部侍郎黄艾因侍講問逐熹之驟上曰始除熹經筵耳今乃事事欲與聞侂胄嘗令優人王喜於禁中效熹容止為戯熒惑上聽於是侍講孫逢吉誦言將入諫乃止登聞鼓院游仲鴻上言朱熹海内名儒首蒙収召四方傳誦以為天下大老歸之纔四十餘日復有宫祠之命逺近相弔以為天下大老去之則人誰不欲去者若正人盡去陛下何以為國願亟還朱熹無使小人得志養成亂階時侂胄勢方盛人皆為仲鴻危吕中曰甚矣君子之道難行而小人之奸易售也昔哲宗初年伊川先生入在講筵未㡬羣吠紛紛遂有西監之除今寧宗新政晦庵先生入侍經幄未㡬權倖媢疾遽有宫觀之命嗚呼此小人排擯道學之漸自是而後䑓諫糾彈一則曰偽學二則曰偽黨已醖釀於此時矣甲午復加安南國王濟美功臣丙午韓侂胄兼樞宻都承㫖彭龜年論韓侂胄竊弄權柄為中外所附不去必貽患又奏只縁陛下近日逐得朱熹太暴故謂陛下宜亟去此小人母使天下人謂陛下去君子之易去小人如此之難上初欲兩罷之汝愚聞疏欲兩留之既而内批彭龜年與郡侂胄既留勢益張矣侂胄因欲併逐汝愚而難其名或教之曰彼宋姓誣以謀危社稷則一網打盡矣侂胄然之詔均内外任汝愚當國言者以為今賢士大夫徃徃不樂為外官盖外權太輕雖欲有所施設而不得騁故也今日之勢莫若稍重外重外之權必使帥漕總領可以馴致於從官而後可久任可乆任而後可以責事功詔可未㡬汝愚去位亦不克行辛亥雨木氷詔用三年之制以明州潜邸改慶元府十二月乙巳朔禁民間妄言宫禁事戊辰以陳康伯配饗孝宗廟庭己巳陳騤罷庚午余端禮知樞宻院事京鏜㕘知政事鄭僑同知樞宻院事皆侂胄引進将以助已彭龜年上䟽攻侂胄乃罷趙汝愚請留彭龜年而上不允陳傅良為陳雨所劾劉光祖為徳秀所劾坐留朱熹之罪傅良罷中書舎人光祖罷起居郎是嵗詔賑諸路水旱築紹熙堰淮東提舉陳損之以淮田多沮洳因築堤數百里捍之得良田數百頃事聞錫名紹熙續宋編年資治通鑑巻十一
