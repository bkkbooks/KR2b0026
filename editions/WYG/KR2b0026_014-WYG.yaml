body:
  text: 續宋編年資治通鑑巻十四宋劉時舉撰宋寜宗三戊辰嘉定元年春正月諫臺葉時等言侂胄專政無君罔上不道乞梟其首願置之淮甸積屍叢冢之間以謝天下上未欲輕從先是金求韓侂胄函首至是詔三省樞密院詳議仍詔韓侂胄冒定䇿功命史官改正詔直言壬辰史彌逺知樞密院事許奕使金為通謝使戊申追復趙汝愚觀文殿大學士諡曰忠定壬子賑流民甲寅雪戊午再竄程松甲子罷劉徳秀遺表贈官郴州黒風洞寇為亂三月詔曰奸倖弄權相與同惡上下交利賄賂通行監司郡守並相倣傚貪婪無厭狼籍已甚繼自今各務精白一心其有縁公濟私尚為故態必罰無赦復秦檜王爵贈諡以復議講和故也辛夘詔梟韓侂胄首於兩淮先是王柟自軍前還行在議以韓侂胄函首事易淮陜侵地諸司百官詳議議者皆言和議重事待此而决姦㓙已斃之首又何足惜是日詔臨安府令副將尹明斵棺取首送江淮制司仍諭諸路安撫制司以函首事議曰庶人之讐釋禮記者猶可盡五世矧有天下者乎齊㐮復九世之讐春秋大之我宋之於金不共戴天之仇也侂胄無謀浪戰固可罪矣然乃至於函首乞和何也當時太學諸生之詩曰晁錯既誅終叛漢於期已入竟亡燕此但以利害言耳盖未嘗以名義言也譬如人家子孫其祖父為人所殺其田宅為人所吞有一狂僕佐之復讐謀踈計淺迄不能遂乃歸罪此僕還之讐人使之甘心焉可乎哉丁酉謝奕使金為通謝使汰鎮淮軍是春皇子垍生利州兵老小喧閧夏四月詔科别羣臣奏䟽可行者以聞上以彭龜年當權臣用事之始首能折其奸萌可贈龍圖閣直學士諡忠肅又以吕祖泰上書忤侂胄配欽州與改正罪名特授廸功郎壬申雨雹旱詔决繫囚甲申詔皇子侍立朝殿丁酉詔求言五月親試舉人賜鄭自成等四百二十有六人及第甲子太白經天蝗六月庚午金人歸大散關辛未歸濠州乙亥衞涇罷甲申簽書林大中薨於位丙戌詔舉邉守秋七月癸丑丘崈同知樞密院事甲寅許奕使囘八月辛未同知丘崈薨侍從臺諫兩省詳議㑹子折閱利害辛巳婁機同知樞密院事樓鑰簽書樞密院事丙戌詔考訂監司守令所條民間利害擇其可行者以聞甲午賑江淮流民九月金國諭成使完顔侃僑宇入見詔以和議成諭天下吕中曰和戎國家之不得已也然必先折其氣而後可以要其成真宗鑾輿親征達蘭授首我是以有紹興之和今也嘉定之和敵有求於我歟我有求於敵歟彼欲得權倖之首則與之彼欲増嵗幣之數則與之屈已而和皆由於我敵人巧詐能無易我之心乎未及數朞渝盟犯順三邉瘡痍生靈魚肉然則和議詎可恃耶是必有以任其責者矣乙丑大風背嵬軍謀為變有告變者乃捕為首八人誅之冬十月錢象祖為左丞相史彌逺右丞相雷孝友知樞密院事兼參知政事樓機參知政事樓鑰同知樞密院事己夘褒録慶元上書楊宏中等六人趙崇憲奏乞辨雪父汝愚讒誣等事有㫖蔡璉著除名加配十一月四川收兑九十界錢引庚子四川初行當五錢戊午史彌逺丁母喪皇太子請賜彌逺第於行在令就第行服許之乙丑李大用謀為變不克丙寅錢象祖罷貶李沐再奪三官己夘黎州蠻蓄卜寇邉金主璟死允濟立己巳嘉定二年春正月詔内外條陳節用事丁巳樓鑰參知政事張良能同知樞密院事宇文紹節簽書樞密院事庚申詔舉監司郡守二月庚午黎州蠻蓄卜寇邉壬午詔稱提楮幣之䇿丁亥罷法科試經義戊子大風熒惑入太㣲垣三月丙申雨雹庚申恤流民夏四月蝗戊辰汰淮㐮忠義民兵歸農辛未詔條明堂冗費都城疫戊子賜楊震仲諡曰節愍五月史彌逺起復右丞相旱詔决繫囚侂胄黨人羅日愿謀為變磔於市侍從兩省臺諫各舉有政績才望者二人以補郎官之闕蝗癸丑詔以戸口為殿最甲寅拘囬田㑹旱秋八月甲子行鐵錢於沿江八州乙丑安丙為四川制置大使罷宣撫司為制置司甲戌册皇太子己夘黎州蠻寇邉丙戌賑兩淮饑民九月辛丑合祭天地於明堂赦天下丙午増太學内舍生十員冬十月丁亥補京湖廂禁軍十一月張林等謀作亂不克甲午修浙西水利乙未雪以嵗饑罷宴郴州黒風峒寇李元礪作亂十二月賜李顯忠諡曰忠㐮賜朱熹諡曰文忠慶元以來權倖擅朝偽以排天下之正學黨以空天下之名流人心憤欎久矣今權倖誅殛天日開明海内翹首以觀惟新之化而聖意首舉節惠之典於文公一時學者知所趨向矣豈非吾道之幸哉乙亥詔諸州毋糴職田租是嵗諸路旱蝗揚楚衡郴吉州南安軍盜起關外諸將私役諸軍庚午嘉定三年春正月詔招諭羣盜詔戒監司守令丙午雨土癸丑雷二月黎州蠻復寇邉至冬青羌奴児結之子曳失索降丁夘配籍贓吏壬午命王居安督捕洞寇三月丁酉蠲逋負捕殺楚州賊首胡海久雨夏四月李元礪犯南雄州十一月迫贑州南安軍十二月就擒丙寅詔恤殘破州縣戊辰賑行在軍民五月詔去年旱蝗百官應詔封事兩省擇可行者以聞乙巳命督捕海寇戊申經理兩淮屯田庚戌以江陵忠勇軍𨽻御前久雨命賑貧民朱熹贈中大夫寳謨閣直學士贈䖏士蔡元定廸功郎制曰士之遇不遇命也其或擯斥於生前而獲伸於死後天理昭昭未有久而不定者爾學問有源操履無玷杜門著書初無預於世故不幸見誣亦遭逺謫今是非已定爾則殂矣其贈以官慰爾泉下死雖莫贖尚知享哉六月丁巳朔日有食之己夘詔核實軍籍秋七月辛夘禁増廣圍田癸夘定南班宗室員八月乙亥大風㧞木是月臨安府蝗詔三衙江上詣軍陞差將校必以材藝年勞冬十月乙丑詔四川總領所毋受宣撫司節制壬申雷十一月癸巳賞楚州平賊功乙巳議收浮鹽十二月丙辰詔安集流民戊午樓機罷京尹趙師􅋷罷時有武學生犯事師􅋷撻之逐出國門諸生訴之遂罷辛未嘉定四年春正月叙州蠻攻陷利店寨詔安集殘破諸州二月乙夘誅李元礪以羅世傳擒元礪功授武翼郎乞換文資乃授通直郎丙子雹辛巳罷廣西諸州牛税閏二月丁未大風三月都城疫劉世雄為沔州將謀據仙人原為亂事覺伏誅叙州蠻犯籠鳩堡夏人叛金夏人始為韃靼所攻遣使求救於金人金主允濟新立不能救韃靼至興靈而反夏人恨之遂叛韃靼國入貢金國金主允濟欲襲之金之糺軍有詣韃靼告其事者韃靼疑未信言者再至韃靼遣人伺之得其實遂遷延不進夏四月兩浙福建州縣禁折鹽酒四川關外旱禁諸軍虚數冒請四川置安邉司以經制蠻事俾李夏季允與許奕子然共領之五月戊辰親試舉人趙建大四百六十有五人眉人史公亮吕天應援李僑故事請掛冠詔循故事即致仕劉爚輪對乞開偽學禁秋七月壬戌太白晝見韃靼國兵攻金人命江淮荆湖四川謹邉備韃靼國兵與金人戰於灰河凡三日勝負未决青吉斯皇帝選精騎三千馳擊之金人大敗金帥執中以百騎奔還韃靼國兵至翠屏口金人又大敗九月攻奉聖州後二日破之進軍野狐嶺金人又敗十月韃靼兵至晋安縣距燕京百八十里八月辛丑雷九月辛酉雷叙州蠻寇邉乙亥羅世傳為其黨所殺冬十月己夘朔更定玉牒凡例十一月己酉朔日有食之癸丑賞平峒寇功十二月體訪㑹子價是月竄張鎡壬申嘉定五年春正月詔諸路通行兩浙倍役法壬申李好義以誅呉曦功賜諡忠壯韃靼國兵至居庸關金將完顔福棄關遁金主允濟以細軍五千自衞欲奔南京㑹細軍自相激厲誓死迎敵韃兵損折頗多遂斂兵二月壬午詔罷軍興以來借補官三月庚戌叙州蠻酋米在降久雨詔决繫囚丙子申嚴捕盜改官五月庚午詔諸路坑冶州以通判縣以令丞主之癸酉南安國王李龍翰卒子昊旵嗣之詔州縣見役人毋納免役錢六月己酉禁銅錢過江秋七月庚申賞降叙州蠻功戊辰雷雨毁太廟屋詔避殿減膳九月丙午太白晝見己酉續編中興禮書成庚戌遵義寨夷楊煥來獻馬辛未罷沿海諸州海船錢是月四川復𣙜石脚井鹽冬十月詔諸路總領官嵗舉將帥二人安撫提刑舉將材二人詔侍從臺諫兩省集議釐正光宗配饗功臣戊戌雷十一月壬戌日南至祀天地於圜丘大赦天下十二月蠲濠州税一年壬午詔諸路轉運司參政州縣新舊税籍蠲其横積之數收兑第五界舊㑹癸酉嘉定六年春正月宇文紹節薨詔侍從臺諫兩省官帥守監司各舉人才一二人二月丁丑太白晝見丙戌上吏部條法總類丁亥雪乙未詔宗室毋與胥吏通姻十一月參政樓鑰罷夏四月丙子章良能參知政事甲午復法科試經義五月不雨詔釋繋囚丁夘措置四川支移錢物戊辰修寛恤詔令六月諸州未决之訟詔刑部嵗終上於尚書省擇其最久者罪之丁丑董居誼使金值金國亂而囬丁亥復監司臧否守令及監司郡守舉亷吏所知法丙申詔諸軍主帥各舉堪為將帥者二三人秋八月詔諸路監司帥臣各舉所部官吏才行卓絶績用彰著者庚午知思州田宗範謀作亂夔州安撫司討平之金人弑其主允濟豐王珣立韃人攻金金國内亂詔四川謹邉備真徳秀使金中道而囬九月韃靼國兵至紫荆關距燕京二百里金副元帥舍哩執中欲誘其兵南至涿易乃聚兵擊之韃靼破涿易至皂河之内欲渡橋執中方病足乗車督戰韃兵大敗翌日再戰執中瘡甚不能出遣髙琪以糺軍五千拒之失期不至執中欲斬之金主珣以其有功諭令免死執中益其兵令出曰勝則贖罪敗則誅無赦髙琪出戰自夕至曉忽北風大作吹石揚沙不能舉目髙琪軍大潰自度必為執中所殺遂引糺軍圍執中之府突入其卧内殺之於是青吉斯皇帝留其將薩木哈圍燕京而自將所降楊伯遇劉伯林漢軍四十六都統同韃靼大軍分為三路攻取河北河東諸州郡是時中原諸路之兵皆簽往山後一帶防禦無兵可守悉簽鄉民為兵上城守禦韃靼盡驅其家属來攻父子兄弟往往遥相呼認至是人無固志所至郡邑望風而降自冬至明年春破金人九十餘郡甲辰蠲京湖逋負三省樞密院向以小使臣為之監門官至是命京朝官為之閏九月戊辰詔御史臺考課監司湖北路旱傷詔監司守令賑恤癸巳乙未凡二日大雪乃下罪已詔十一月虛恨蠻寇中鎭寨十二月蠲瓊州丁鹽錢是嵗兩浙大水賑之甲戌嘉定七年春正月丁夘朔何九齡襲秦州大敗沔州都統王大才妄啟邉釁斬之甲戌夜濠州鍾離縣北岸有三騎渡淮而南出文書一囊絹畫地圖一冊云是韃靼國遣來納地請兵守臣以不奉朝㫖卻之時韃靼國勢實已强大但居其故地而於燕雲置行省命其大臣薩木哈領其事焉丁丑雷參政章良能薨乙未黎州蠻卜籠十二骨降三月丁夘安丙同知樞密院事令日下起發赴院治事六月癸丑安同知自廣安順水赴行在至近畿除觀文殿學士知潭州丙知朝廷疑己乃上疏力辭不允乃遣官賫結局冊赴行在董居誼為四川制置使庚辰金人來督二年嵗幣壬辰詔利州路安撫節制本路軍馬夏四月癸夘蠲福建納鹽癸丑馬槱襲殺虚恨蠻庫崖等辛酉詔三衙江上四川諸軍具士馬實數以聞五月丁丑太白經天乙酉親試舉人賜袁甫等五百四人及第出身有差壬辰有司考課禄之制裒類成書以為法式六月旱丁巳置嘉定府邉丁二千人秋七月鄭昭先簽書樞密院事兼權參知政事乙亥燕京之粮金主告遷於南京夏人來議夾攻金人恢復故疆董居誼初入蜀不之報八月癸巳朔罷關外四川所増方田税癸夘復建宗學金人復來督嵗幣真徳秀請絶金人嵗幣上書曰竊聞女真以韃靼侵凌徙巢於汴此吾國之至憂也盖韃靼之圖滅女真猶獵師之志在得鹿鹿之所走獵必從之既能越三關之阻以攻燕豈不能絶黄河一帶之水以趨汴臣恐秋風一生梁宋之郊已為戰場矣使韃靼遂能如劉聰石勒之在中原則疆埸相望便為隣國固非我之利也或如耶律徳光之不能安中土則姦雄必將投隙而取之尤非我之福也今當乗金之將亡而亟圖自立之䇿乎抑幸金之未亡而姑為自安之䇿乎夫用忠賢修政事屈羣䇿收衆心者自立之本也訓兵戎擇將帥繕城池飭戍守者自立之具也以忍恥和戎為福以息兵忘戰為常積安邉之金繒飾行人之玉帛女真尚存則用之於女真强敵更生則用之於强敵此茍安之計也陛下以自立為規模則國勢日張人心日奮雖强敵驟興不能為我害陛下以茍安為志嚮則國勢日削人心日媮雖弱國僅存不能無外憂九月壬戌朔日有食之太白晝見癸亥雷久雨詔釋囚冬十月廢邛州嘉定監命四川監司郡守辭見如舊制十一月聶子述使金賀正旦黎川蠻蓄卜始降乙亥嘉定八年春正月詔舉將才戊子申嚴金翠禁二月丙午雷孝友罷蠲逋負米貸其囚繫己未雨土三月辛酉詔舉亷吏大郡嵗舉二人小郡一人旱五月辛酉韃靼國兵破燕京去年韃人圍燕京是春金國東平之役兵五次遇韃軍不戰而潰大名之兵八千至固安亦潰惟真定之兵四萬合保涿援兵一萬至旋風寨與韃兵戰凡二日粮絶而敗内外不通至是破之燕京宫室為亂兵所焚火月餘不滅辛未雨己夘命利州路招忠義人甲申詔贓吏毋減年參選秋七月庚申置三省樞密院架閣官辛酉鄭昭先參知政事曽從龍簽書樞密院事壬戌立楊巨源廟賜名褒忠旌誅呉曦之功也八月己丑賜張栻諡曰宣庚子申嚴宗子訓名法蘭州盜程彦暉求内附四川制置使董居誼却之九月辛未合祭天地於明堂赦天下乙亥申嚴浙西圍田禁甲申罷四川試法科韃靼國兵破潼關國兵自河東渡河攻潼關不能下乃由嵩山小路趨汝州遇山磵輙以鐵鎗相鎖連接為橋以渡於是潼關失守金主急召花帽軍於山東十月韃兵至杏花營距汴京二十里花帽軍急敗之韃兵復取潼關自三門析津乗河氷合布灰引兵而渡自是不復出金人專守關輔然陜西諸州間亦有為所破者燕南雄霸數州乃三關重地塘濼深阻韃兵不能入又有遼東宣撫守蕭萬據遼東七路韃兵不能下金主南遷之後累遣使詣韃靼國求和其主欲許之謂曰譬如圍場中獐鹿吾已取之矣獨餘一兎汝數年不能取盍遂捨之其臣薩木哈不從遣人諭金主曰汝欲議和可去帝號稱臣封汝為王金之羣臣不從有言於其主曰願以死雪國耻者金自稱帝至是九十有八年而失國兩河既破山東畔之金人東阻河西阻潼關地勢益蹙遂有南窺淮漢之謀矣是嵗兩浙江東西旱蝗丙子嘉定九年春正月乙丑賜吕祖謙諡曰成命諸州置馬軍司水軍二月甲申朔日有食之丙申雪辛亥東西兩川地凡四日大震三月丁丑詔舉監司夏四月戊戌秦州唐進引衆十萬來歸四川制置使董居誼却之五月癸酉太白晝見六月戊申賑浙西水西川凡三日地震黎州山崩秋七月詔以邉縣擇才不拘常法其餘並遵三年之制詔邉縣官許起復冬十一月癸亥命利路備邉十一月癸丑以宗學𨽻宗正寺丁巳雪給諸軍錢乙丑遷天水軍於舊天水縣置知軍以下官江東計度轉運副使真徳秀附奏論邉事臣竊見金人自失國南遷其勢日蹙比者韃靼與西夏并兵東出潼關深入許鄭敵庭危廹之狀見於偽詔所云近復傳聞敵兵攻圍都邑逰騎布滿山東雖探報之辭不無同異要其大勢以河南數州僅有之地而抗西北二國方張之師加以羣盜縱横叛者四起危急如此不亡何待臣謹按國史女真叛遼在政和之四年甲午嵗其滅遼也在宣和之七年乙巳嵗是冬即犯於中原臣竊謂今日天下之勢無以異政宣之時陛下亦宜以政宣為鑒夫以皇皇鉅宋八葉重光至於政宣燕安湛溺之餘紀綱蕩然無一足恃本根既撥枝葉從之於是女真得以逞其㐫殘攻陷我都城傾覆我社稷刼遷我二聖荼毒我蒸民自開闢以來外裔之禍未有若是之酷也臣嘗妄論政宣致禍之由其因有十失自蔡京倡豐亨豫大之說王黼開應奉享上之門專以淫侈蠱上心奢靡蠧國用土木之功窮極盛麗花石之貢毒遍江南甚至内庭曲宴出女樂以娛羣臣大臣入侍飾朱粉以供戲笑於是荒嬉無度而朝政大壊矣其失一也自童貫髙俅迭主兵柄敎閲訓練之事盡廢上下階級之法不行潰敗者不誅而招以金帛死敵者不卹而誣以逃亡是賞罰無章而軍政大壊矣其失二也政宣之世灾異數見火星如月徐徐南行日黯無光洶洶欲動赤氣犯斗水冒都城當時羣臣恬不知警方且以怪孽為嘉祥變異為休徵此上不畏天戒其失三也政宣之際以言為諱張根論征斂之煩散官安置李綱論大水之變逺謫監征於是薦紳不敢言矣鄧肅以進詩諷諫屏出太學朱夢説以冒言官寺竄斥偏州於是布衣不敢言矣鉗結成風馴致禍敗此下不卹人言其失四也政宣用事之臣專以毁忠忌賢為事凡累朝老成之望當代鴻碩之材不以姦黨廢則以邪説斥不以曲學貶則以異論逐排沮挫抑之餘舉國無君子矣雖欲久安得乎其失五也開國成家小人勿用而難任人蠻夷率服政宣之世京黼繼尸宰柄貫攸濫厠樞庭其翺翔臺省布列館殿非歌頌書生即膏粱子弟非奴事閹尹即翼附權臣更引迭援在廷皆小人矣雖欲勿危得乎其失六也記曰四方有敗必先知之此之謂民之父母政宣小人專為䝉蔽以欺上聽劉法敗死西陲而童貫乃以捷聞方臘破東南六郡而王黼匿不以告郭藥師反形已露而邉臣掩覆於外女真尅期入寇而大臣諱飾於中上下相䝉稔成大患至敵兵濟河而朝廷猶未之覺其失七也書曰民惟邦本本固邦寜政宣小人專務聚斂以揺根本朱勔以貢奉擾浙右李彦以括田困京東蔡京改鹽鈔法而比屋嘆愁王黼創免夫錢而諸路騷動人不聊生散為盜賊雖㣲外患亦必有蕭墻之憂其失八也詩曰無競唯人四方其訓之古者以一士寢敵謀片言折外侮政和初遣使覘國而童貫實行遼之君臣相顧竊笑已有南朝無人之譏北事既興遂付戎律以僕𨽻之才當元戎之任節制不明諸將無所稟畏庸懦不武敵帥得以慿陵未幾副之以蔡攸易之以譚禎其為駑怯又益甚焉於是女真知中國之無人而異志興矣此授任非材其失九也昔子産以蕞爾之鄭﨑嶇强國間區區一環宜無愛於晉而子産則曰大國之人令於小國而皆獲其求将何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有卒不與秦求地於趙趙欲與之虞卿曰王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣趙用其計而秦不能加蓋有國者不幸與强敵為鄰當有以服其心而不當狥其欲女真與遼國交兵雖能毎戰輙克然視吾中國之尊如髙山大海未易測其雄深何敢遽有他志不幸姦臣腐夫希功寡謀唯恐無以順適其意彼方邀吾嵗幣則予以契丹舊數而不辭邀吾燕地賦税則予以銀絹百萬而不靳至於索犒師則許以犒師欲貸粮則許以貸粮一事方酬而一事已生前請未塞而後請復起一切承順無敢或戾而南牧之師已侵尋於境上矣蓋敵人之求本無饜足徒知徇其欲而無以服其心其禍固應爾也或者唯以納張㲄結余覩為造釁之由而不知召侮取輕其漸非一雖㣲結納之事其能保盟約之不寒乎此處置失宜其失十也今一人憂勤恭儉無愧仁祖之風而羣臣盤樂怠傲乃有宣和之習東南民力耗於軍餉者十八而士卒窮悴常有不飽之嗟灾異頻仍修省之實未覩言路壅塞讜直之士弗容君子非不參用而正論未嘗獲伸小人非不欲逺而讒諂猶或得志䝉蔽之風日熾聚斂之政日滋此失未除臣恐後之視今猶今之視昔也續宋編年資治通鑑巻十四
