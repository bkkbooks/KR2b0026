body:
  text: 續宋編年資治通鑑巻六宋劉時舉撰宋髙宗六乙丑紹興十五年春正月行大朝㑹禮用黄麾仗三千三百五十人秦檜曰若非經界賦役不均遂命户部侍郎王銑先於兩浙行之試博學宏詞科湯思退王曬洪邁並賜進士出身三月親試舉人賜劉章等一百人及第出身有差夏四月彗出東方大赦五月置六部架閣官六月乙亥朔日有食之幸秦檜第乃上所賜第新成也尋書一徳格天之閣六字賜之令監司察汰縣令秋七月復利州鐵錢監寛廬光州上供八月命提舉茶鹽官兼領常平惟四川廣西以憲臣淮西京西以漕臣兼領冬十月置四川總領閏月秘書省請下諸路求遺書及先賢墨跡十二月討平䖍梅羣盜丙寅紹興十六年春正月親耕籍田三推乃止命宰執以次行五推九推之禮庶人終千畆焉仍詔守令自今毎歳之春出郊勸農毁淫祠二月罷明法科三月建武學賜秦檜家廟祭器張澄以展皇城及創修外闕澄皆告具除節度夏四月作祚徳廟加封程嬰杵臼韓厥五月詔擇監司作景鐘天子親祀上帝則用之秋七月竄張浚於連州先是浚上疏言當今事勢如養大疽遲則禍大而難測疾則禍輕而易治惟陛下謹察情偽預備倉卒庶幾社稷有安全之理檜以謂時已泰平諱言兵事令中丞何若劾之故有是命八月求蜀遺書冬十月閲新禮器撞景鐘奏新樂用皇祐故事也十一月癸酉郊備祭器設八寶如政和之儀詔復先朝居養院安濟坊漏澤園等制置御書院十二月彗出西南丁卯紹興十七年春正月禁獻羨餘詔近免税米而所過尚收力勝錢其除之遣官覈實經界二月祀髙禖三月檜改封益國公夏四月以右正言巫伋兼崇政殿説書自此臺諫與經筵相與表裏五月詔舉制科大雨雹六月詔盜賊今後不許招安秋八月趙鼎卒鼎在吉陽故吏門人皆不敢問秦檜令本軍月具鼎存亡申尚書省鼎知之乃不食而卒詔以寛剰錢充月樁九月竄吕摭檜恨頤浩不已使台州守臣魯亨求其家隂事㑹摭嫂姜氏告摭烝其庶弟之母送獄窮治其罪於是一家破矣減江浙折帛錢冬十一月辛卯朔日有食之建太一宫頒常平免役法是歳金與䝉國議和䝉國自稱祖元皇帝戊辰紹興十八年春正月賜内門名南曰麗正北曰和寧以秦熺知樞密院夏四月戊子朔日有食之親試舉人賜王佐以下三百三十人及第出身有差秦熺引嫌辭避罷為觀文殿學士五月圗景靈宫配饗功臣像趙普曹彬薛居正石熙載潘美李沆王旦李繼隆王曽吕夷簡曹瑋韓琦曽公亮富弼司馬光韓忠彦凡十有六人李顯忠上恢復之策於朝秦檜怒奏顯忠不遵稟聞奏止用申狀降官奉祠台州居住罷四川宣撫使以知成都李璆為四川安撫制置使秋八月増殿前司軍定歳糴額冬十一月知新州張棣奏胡銓語言不遜怨望朝廷自新州徙吉陽十二月賑饑民濬浙河己巳紹興十九年春正月朔上皇太后壽二月定歳賜諸軍馬額詔發川馬二百匹進御而以四千匹付江上諸軍鎮江建康荆鄂軍各七百五十江池軍各五百又以秦馬三千五百付三衙殿前司千五百馬步司各千又七百付宣撫司總計八千四百匹遂為定例三月癸未朔日有食之四川行經界法召隱士劉勉之六月下寛恤詔秋七月詔諸路提刑詣所部決獄冬十月竄辛永宗十一月壬辰郊以巫伋兼直學士院著作佐郎林機言訪聞失意之人窺伺朝廷作為私史以售其邪説請禁絶之御史曹筠奏胡寧劉章交通趙鼎毎懐異意遂罷職盖秦檜疑其不附已也金宗族大臣弑其主亶從弟亮立庚午紹興二十年春正月禁科罰罪人緡錢秦檜趨朝有挾刃於道遮檜肩輿刺之不中捕送棘寺驗治則殿前司後軍使臣施全也檜引全而問之全對曰舉天下皆欲殺金人汝獨不肯故我要殺汝詔磔於市三月秦熺特進加大學士李光貶昌化軍初到貶所嘗作私史孟堅為所親陸升之言之升之訐其事遂命曹泳究實泳言孟堅省記父光所作小史語涉譏謗送大理寺獄成光坐妄著私史譏謗朝廷罪孟堅竄峽州於是前從官及朝士連坐者八人胡寅程瑀潘良貴宗穎張燾許忻賀允中呉元許皆坐與光交通謗訕降責有差胡寅竄新州夏四月置力田科五月詔舉制科安奉中興聖統於景靈宫八月竄張浚於永州置建州社倉冬十二月以王㑹權兵部侍郎㑹秦檜妻之弟也是冬金城燕京辛未紹興二十一年春正月苗米禁折估置諸州恵民局禁額外吏三月遣使金國乞修奉陵寢迎請靖康帝歸以巫伋為祈請使夏閏四月選諸州卒補三衙親試舉人賜趙逵等四百人及第出身有差五月散利路義士秋七月除柴米税九月上謂大臣曰縁不度僧居住多有絶産其令户部撥以贍學定處州丁税額冬十月幸張俊第尋加俊太師十二月雷壬申紹興二十二年春三月王庶之子之竒之荀俱編置梅州融州葉三省坐詆休兵罪責居筠州遣官措置福建寛剰錢及鹽法夏四月簽書樞密院巫伋罷以章复代之五月襄陽大水六月詔賑水災秋七月䖍州軍亂八月章夏罷冬十一月戊申郊以徐宗説為户部侍郎宗説為檜營田産時人目之為莊客癸酉紹興二十三年夏五月詔舉制科六月以王之道通判安豐上謂近日霖雨民間有被水灾去處可下州縣檢放苗税潼川大水王之望自荆門代歸獻啟秦檜又上書秦熺秋九月乃以之望為湖南提舉冬十月以鄭仲熊為右正言仲熊能附㑹秦檜故有是除十一月右正言鄭仲熊論楊迥胡襄心向胡寅之門附㑹趙鼎俱罷燕經筵官於秘書省頒宗正司法閏十二月乙酉朔臈雪應候甲戌紹興二十四年春正月地震𣙜䕫路茶二月試博學宏詞科三月親試舉人考官以秦檜孫塤為第一後改張孝祥孝祥乃秦檜之館客也同榜三百三十餘人檜之親黨居多天下為之切齒武岡猺賊平五月癸丑朔日有食之秋七月竄程敦厚鄭仲熊言蕭振曩縁趙鼎用事自謂學出程頤藉為仕進之階責居池州是月趙俊薨俊晩年主和與秦檜意合上厚眷之八月上曰百官輪對正欲聞所未聞可令檢舉罷温柑茘枝貢冬十一月作龍圗等六閣以施鉅參知政事鄭仲熊為簽書樞密院事自秦檜專國士大夫之有名望者悉屏之逺方齷齪委靡不振之徒一言契合即登政府仍止除一㕔謂之伴拜稍出一語斥而去之無異奴𨽻皆褫其職名閣其恩數猶庶官云十二月竄洪興祖興祖嘗忤秦檜又為程瑀序論語註檜疑其託經以議已遂有是命是歳莫公晟以南丹州内附乙亥紹興二十五年春二月命諸路監司巡歴所部夏四月侍御史董徳元論參政施鉅傾邪詭秘嘗與李光交又為何鑄所引用罷為資政殿學士五月丁未朔日有食之芝生太廟罷免役錢六月朝奉郎姚岳以岳州乃判臣岳飛故地乞改之乃改為純州以湯思退為簽書樞密院事秋七月召吕愿中先是靜江有驛名秦城愿中約客共賦秦城王氣詩以侈之其不賦者劉芮李燮羅博文三人而已秦檜喜乃有是召加封李天祚為南平王八月以董徳元參知政事出内帑絹代輸户丁令四川鑄當二鐵錢臺臣論張宗元與張浚交通罷知洪州時秦檜忌浚毎臺諫官劾疏必令及之九月置茶場冬十月製靈芝瑞木等旗秦檜疾上親視疾是夕封檜建康郡王熺少師並致仕及病篤招董徳元湯思退以後事囑之以簽書湯思退兼參知政事秦檜死後贈申王諡忠獻初靖康末檜在中司以抗議請存趙氏為金所執而去天下髙之及歸驟用為相檜力引一時仁賢如胡安國程瑀張燾之徒布在臺省士大夫亟稱之未幾為吕頤浩朱勝非所排遂不復用㑹張浚與趙鼎有隙因薦為樞密使浚罷鼎復相諸執政盡逐而檜獨留既而與鼎並居相位卒傾鼎去之金人渝盟軍民皆歸咎於檜傲然不肯退又使王次翁奏留之韓世忠張浚岳飛方擅兵權檜與張俊密約議和而以兵歸俊飛既誅世忠亦罷俊在位不去檜乃使江邈論罷之由是中外大權盡歸於檜非檜親黨及昏庸諛佞者則不得仕宦忠正之士多避山林間罷兵講和而使髙宗不能成中興之業者檜之罪可勝言哉十一月癸亥郊祀封嗣濮王及安定郡王以趙逵兼普安國平王府教授十二月嚴告訐罰言者論鄭億年甘事逆臣劉豫還朝阿附權臣鄭仲熊乃權臣姻婭致身右府詔並落職億年送萬安軍以沈該參知政事時行在百司闕官甚多詔令侍從官各舉三十人務要真材實能倘不如所舉必罰無赦御史湯鵬舉論董徳元附㑹權臣罷為資政殿學士尋落職汴京火宫室盡為所焚金主亮隂有南侵之意乃謀遷汴京是歳遣長寧為留守經畫未幾大火宫室盡為所焚亮大怒降長寧為庶人尋杖之死丙子紹興二十六年春正月以張九成知温州湯鵬舉請用紹興元年例不歴外縣人不除監司不經外任人不除侍從上從之上鑒秦檜擅權之弊遂増置言事官三月罷宰臣兼樞密詔更議和好自秦檜死金人疑前盟不堅荆鄂間妄傳召張浚敵情益疑沈該請於上而有是詔稱提四川交子佛齊國入貢詔修神宗哲宗兩朝寶訓五月以沈該万俟卨為左右僕射呉秉信王綸為中書舍人諸州大辟非實有疑慮及無可憫者不得具奏沈該上中興聖語六月有星晝隕置豐儲倉秋七月彗出下詔求言雨水銀八月加封李天祚詔常平官定吏額交趾國來貢九月詔監司之職臨按一路是宜悉心布宣嚴賍吏法復命樞密院錄聖語復張浚官判洪州浚時喪母將歸塟浚念天下事二十年為和議所移邊備蕩弛且聞完顔亮簒立勢已驕悍自以人臣義同休戚不敢以居喪為嫌乃於去年遂具奏論之繼被命以喪歸蜀行至江陵㑹以星變詔求直言浚慮金數年間勢決求釁用兵而吾方溺於晏安謂金可信蕩然莫為之備沈該万俟卨居相位尤不厭天下望朝廷益輕雖在苫塊不得不為上終言之万俟卨湯思退見之大怒以為敵未有釁而浚所奏乃若禍在年歳間者或笑以為妄至冬十月言者謂張浚名在罪籍倡為異議動國是責居永州刑部郎復分左右十一月議節浮費十二月戊戌臈饗太廟定貢舉勅令格式罷提㸃鑄錢司金國主亮復修汴京丁丑紹興二十七年春正月詔侍從各薦宗室文臣京官以上材識治行者兩人特與召對二月更科舉法以辛次膺為給事中芝生太廟命孟忠厚提舉秘書省減福建鹽錢試博學宏詞科三月上謂宰執曰徽宗嘗言仁宗朝除執政大臣必先問曽歴親民否乃立改官人注縣法親試舉人賜王十朋等四百餘人及第出身有差万俟卨薨諡忠靖四月令薦官誥院鮑嚳召對而人才凡下上諭大臣曰朕不能盡識天下多士故令侍從臺諫各舉所知若不精審非朕求才之意乃罷之六月以湯思退為右僕射以趙逵周麟之為中書舍人秋七月詔監司郡守察舉縣令戒飭賍吏中書舍人周麟之言凡命令之出並從兩省或無封繳即皆畫時行下以復祖宗之成憲從之八月收諸路給餘僧牒上曰佛法朕亦未有意絶之正恐僧徒多則不耕者衆矣九月申嚴常平賑濟法冬十月以曽㡬為秘書少監進讀三朝寶訓終篇侍讀三師親奏請進讀漢書以觀得失詔可戊寅紹興二十八年春正月復給舍分書制敕法上曰守令舉職已許監司列薦而監司賢否勤惰將使誰察之宜依守令别為考察之法二月陳誠之陞為知院王綸薦興化軍布衣鄭樵學行上召對授右廸功郎其所著通志令有司繕寫投進三月辛酉朔日有食之神宗寶訓成立内外官更迭久任法詔畧曰今後侍從有闕通選師臣及第二任提刑資序曽任郎官以上者卿監郎官闕選監司郡守之有政績者並須治狀昭著及有譽望之人卿監郎官未歴監司郡守者令更迭補外任内官除詞臣臺諫係朕親擢餘並須在職二年方許邊除庶内外適均無輕重之偏職業修舉有久任之效以副朕重民事之意三省同共遵守起居舍人洪遵請以經筵官進對講讀問答等事悉行編錄以邇英記注為名從之六月有星晝隕嘉陵江溢秋七月嚴銅器禁以賀允中為吏部尚書三朝正史徽宗實錄成定兩浙江湖漕米數八月地震九月以王綱中為四川安撫制置使綱中言禦戎先務之急外國之情强則犯邊弱則請盟今而計外國之强弱盍先自擇將帥蒐士卒實邊儲備器械加我數年國勢富强彼請盟則為漢文帝犯邊則為唐太宗上壯其言遂有是命詔戒侈靡冬十月鬻没官户絶田十一月平江常湖州水己卯郊上親製樂章十二章知興元府姚仲言聞金有意敗盟竊見興元等舊有義士萬餘皆驍勇可用祗是免身丁差役不費有司錢糧乞依舊收充以時教閲奏可己卯紹興二十九年春正月朔皇太后壽八十行賀禮詔修吏部七司條法二月詔沿邊𣙜場惟存泗州盱眙兩處餘悉罷之禮部侍郎孫道夫奉使北境回言金國主亮詰以闗陜買馬非約恐將來尋釁於我當以為備校書郎孫澈言立國惟文武二道而人才不可偏廢望詔帥臣監司於本路人才使臣舉智謀可充將帥者勇鷙可率士卒者其侍從臺諫官如有所知亦論薦詔從之擢澈為監察御史吏部侍郎葉義問言有備無患陛下當密行之請防海道守淮甸遣戍卒嚴斥候揀軍牧馬此六者今日急務卒行則不及預備則有餘矣尋以義問兼權尚書大雪雨雹三月詔舉制科蠲積逋夏四月鎮江火命賑之沈介以秘書少監為賀正使黄中以國子司業充賀生辰使相先後還中言彼國治汴京必欲徙居以見迫不可不早為之備上曰但恐為離宫也中言所營悉備此不止為離宫若南徙居汴則壯士健馬不數日可至惟陛下深圖之思退大怒舊例使北還者率補從官思退乃遷介吏部侍郎而以中為秘書少監五月出内帑錢五百萬緡賜户部以佐調度以公據闗子給總司頒與按官吏八條舉薦四條曰仁恵公直明敏亷謹按察四條曰苛酷狡佞昏懦貪縱乃元祐間司馬光陳請也六月王綸使金充稱謝使綸還入見言敵國恭順和好無他上曰中外之論皆欲沿邊屯戍軍馬移易將帥為進取之計萬一輕舉兵連禍結何時而已思退曰金主亮已定寇江之計綸所見盖妄也禮部侍郎孫道夫數言武事沈該慮其引用張浚黜道夫知緜州詔戒驕惰禁賂遺以二詔立石於尚書省遣官覈實常平義倉僕射沈該罷閏月省淮西冗官秋七月李燾上續皇朝百官表復提㸃鑄錢官八月減進奉銀朱熹松子也築室武夷山以講學上聞其賢召之不至九月湯思退陳康伯為左右僕射皇太后韋氏不豫乃赦未幾太后崩冬十一月賀允中奉皇后留遺物使金令孔彦舟伴宴常例賜花允中辭曰國有大喪樂何忍聞況戴花乎使人怒欲殺之彦舟解曰兩國通好久參政勿動心也使還言金必敗盟宜為備祔殯顯仁皇后於永裕陵西十二月以張燾為吏部尚書減西和鹽價金以翰林侍讀施宜生充賀正使耶律翼副之張燾奉詔館客宜生閩人坐范汝為事奔偽齊齊廢復為金用燾以首丘桑梓語之宜生敬燾頗漏敵情燾密奏之且言早為之備亮又隱畫工於中節使密寫臨安之湖山城郭以歸既而為屏而圗已之像策馬於呉山絶頂後題以詩有立馬呉山第一峰之句聞者痛憤之庚辰紹興三十年春正月詔革場務横征吏部尚書張燾因論甲庫萃工巧以蕩上心酤良醖以奪官課教坊樂工員數百増俸給賜賚耗費不貲皆可罷上曰卿可謂責難於君明日罷甲庫諸局以酒庫歸有司減樂工數百人燾之從容補益皆此類也二月賜普安郡王瑗名瑋立為皇子加寧國節度進封建王三月以皇姪璩判大宗正寺親試舉人賜梁克家等四百餘人及第出身有差増印四川錢引楊存中建言諸重地如四川鄂渚池陽建康京口皆已宿兵嚴守獨荆南歴代用武之地而九江上流要害之地緩急不能應援請各置都統制朝廷從之夏五月以劉錡兼荆南府都統制仍分撥三衙軍及新招軍共萬人屯江州命戚方為統制詔寛租賦秋七月丁丑朔日有食之八月丙午朔日有食之金主亮將謀南侵命計女真契丹奚家三部之衆不限丁數悉簽起之凡二十有四萬以其半壯者為正軍弱者為阿里喜一正軍以一烏勒希副之又簽中原漢兒渤海十七路除中都路造軍器南都修汴京免簽外毎路各萬人合番漢兵通二十七萬倣唐制分為二十七軍遂以百户為穆昆千户為明安萬户為統軍其統軍則有正副諸軍悉以番漢相兼無獨用一色人者至是諜報亮已至汴京重兵皆屯宿泗亦有至清河口者兵部尚書楊椿言於陳康伯曰敵人敗盟因言防敵之術其一兩淮諸將各畫界分使自為守其二措置民社密為寓兵之計其三淮東劉寶將驕卒少不可專用其四沿江州郡増壁積糧以為歸宿之地康伯見上言敵謂我和好滋久而兵備弛其南牧無疑因條上兩淮守禦之計上嘉納之詔修吏部勅令格式書成陳康伯上之九月罷内侍省復召試館職法冬十月定合班儀罷諸軍内侍承受以劉珙為吏部員外郎壬戌日中無雲而雷十一月詔不得以羨餘推賞御史陳俊卿言職田折價而増直者計賍請禁止之十二月陳俊卿論湯思退其疏畧曰臣伏見十月癸亥日方遇中天無雲而有雷人情駭異臣竊謂變不虚生當有任其咎者及觀本朝慶厯八年京師一日無雲而雷震仁宗皇帝謂張方平曰夏竦奸邪天變如此亟命草詔罷之湯思退挾巧詐之心濟傾邪之念觀其所為多效秦檜盖思退之致身皆檜父子思也始以秉文衡曲意取其子孫縁此汲引以致政府檜死熺逐而湯鵬舉為御史二人素通譜系為結約貴近詭秘其迹自是安若泰山而敢肆意矣伏望陛下置之憲典思退罷以觀文殿大學士奉祠臺諫交章遂落職令臨安府印造㑹子於城内外與銅錢並行安南獻馴象以王之望統領財賦荆南知府續觱乞増戍兵乃調摧鋒右翼軍合萬人𨽻之是冬淵聖皇帝崩續宋編年資治通鑑巻六
