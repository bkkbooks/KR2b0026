body:
  text: 續宋編年資治通鑑卷十五宋劉時舉撰宋寧宗四丁丑嘉定十年春正月辛巳雷癸巳雨土乙未大風拔木二月庚申地震壬戌雪夏四月金人犯光州中渡鎮執𣙜場官盛允升殺之犯樊城都統王守中引兵戰却之金人遂分兵圍棗陽光化廬州鈐轄王辛敗之於光山縣之安昌寨殺其統軍完顔掩隨州光化軍皆以捷聞金人遁歸李珏江淮制置使趙方京湖制置使詔措置調遣仍聽便宜董居誼四川制置使命酌量緩急便宜行事久雨詔釋囚五月甲申親試舉人賜吳潜等五百二十三人及第出身有差癸卯趙方請下詔北伐遂傳檄招諭官吏軍民六月庚戌太白晝見戊午詔厲將士詔略曰朕厲精更化一意息民勍敵跨我中原天厭久矣狡兔失其故穴人競逐之豈不知機㑹可乘讐耻未雪念甫伸於信誓實重起於兵端若能立非常之勳則亦有不次之賞尚其聽命朕不食言辛未東川大水癸酉太白經天秋七月丙子朔日有食之不雨釋諸路杖以下囚甲申雅州蠻復寇邉焚碉門寨遣官軍討之庚子罷軍士淫刑八月乙丑詔監司郡守各舉威勇才略可任將帥者二人冬十月久雨十一月丁丑大風庚辰太白晝見甲申詔浙東提舉司出米十萬石賑給貧民戊戌太白經天十二月戊申以軍興故募民納粟補官乙卯詔武舉毋應文舉金人犯四川迫湫池堡陷天水軍守臣黃炎孫遁金人破白環堡迫黃牛堡至大散關統制劉雄弃關遁金人據關戊寅嘉定十一年春正月京東忠義人李全率衆來歸詔以為京東路總管戊子金人圍皂郊堡二月陷皂郊王師與戰勝負半之死者五萬人四川制置司招忠義復皂郊二月利州統制王逸等率官軍忠義人收復利州麻仲率忠義人焚秦州永寧寨詔四川忠義人立功其賞視官軍金人犯隔茅關興元都統李貴遁而軍大潰二月金人焚大散關而去金人攻陷湫池堡圍隨州棗陽軍逰騎至漢上均州守臣應謙之棄城走金人糧舟棄大清河楚州鈐轄梁招祖焚其舟京東忠義副都統沈鐸遣兵助之金副統制完顔贇包長夀遁去沔州軍士郭雄追斬贇首而還長夀僅以身免丙辰白虹貫日三月忠義人十萬出攻秦州官軍繼進至赤谷口忽王逸傳劉昌祖之命退師而忠義軍遂潰癸巳金統制包長夀合長安鳯翔之衆復攻皂郊不克引兵趨西和州劉昌祖焚西和州而遁守臣楊克家棄城去昌祖又焚成州守臣羅仲甲亦棄城去戊戌金人陷西和州至四月金人去成州又去西和州夏四月鎮江忠義統制彭惟城等敗於泗州命四川增印錢引五百萬以給軍費階州守臣侯頤遁戊午金人犯大散關守將王立遁興元都統吳政至大散關執立斬之己未犯黃牛堡吳政引兵與戰金人遁軍聲大振是冬賞吳政張成功各進三官竄劉昌祖羅仲甲楊克家以正棄城之罪五月乙亥命四川制置司招集忠義人癸未蚩尤旗見其長竟天壬辰嚴試官七等之制六月湖州水詔恤貧民秋七月乙酉修孝宗寶訓辛卯蠲四川關外諸州稅役甲午蠲光州民兵戰死之家稅役九月辛巳合祭天地於明堂赦天下十一月戊午大風壬申金人犯安豐黃口灘陜西人張羽來歸己卯嘉定十二年春正月戊辰朔召董居誼赴行在以聶子述為四川制置使庚辰金人犯湫池堡守將石宣戰却之甲申攻白環堡守將董招戰却之戊子犯成州越四日焚成州而去沔州都統張威自西和州退守仙人原庚寅犯隨州棗陽軍又破信陽軍之二寨京西諸將引兵拒之辛卯犯西和州守臣趙彥呐設伏待之金人大敗而還犯安豐軍建康都統許俊遣將拒之犯河池守將張斌遁去癸巳攻光化軍破勛山縣進逼均州圍安豐軍及滁濠光州江淮制置使李珏命池州都統制武師道忠義軍都統制陳孝忠舉重兵赴援金人不能進甲午陷鳯州守臣雷震棄城去州民與之巷戰乃夷其城乙未犯黃牛堡吳震戰死金人乘勝攻武休關二月戊戌朔金人破光山縣太白晝見壬寅圍棗陽軍京湖制置使趙方遣統制扈再興為援金人乃解圍癸卯破黃牛堡興元都統李貴遁還利路權興元府事趙希哲棄城去丁未陷興元府己酉遣殿前司軍凡八千人防捍江西庚戌曽從龍除同知樞密院事兼江淮宣撫使任希夷簽書樞密院事辛亥金人陷大安軍守臣李文子棄城去又分兵犯來州守臣蔡晋卿遣兵拒之不克而城陷沔州統制石宣擊金人於大安軍大破之金將巴圖魯棄軍走為我師所獲金人聞之遂遁去三月金人焚洋州城而歸壬子四川制置董居誼自利州遁去奪本官永州居住丁巳京湖制置使趙方遣統制扈再興等引兵三萬餘人分道出攻唐鄧州隨州忠義軍劉世興鄂州都統劉世榮各以兵來會乙丑西夏來議夾攻金人利路安撫丁焴許之乃以事聞六月丁焴以書與夏人定約三月己巳鄭昭先知樞密院事曽從龍參知政事乙亥興元軍士權興等作亂犯巴州守臣秦季槱遁凡十二日而興降丁亥太白晝見甲午金人自盱眙退師閏三月己未雷震棄城竄梅州辛酉旌吳政死節贈忠州刺史壬戌詔諭四川官軍忠義人癸亥興元軍士張福莫簡等作亂以紅巾為號四月入利州制置聶子述遁總領財賦楊九鼎為所殺由是掠閬州及果州五月逼遂寧府攝府事程遇孫棄城去福焚其城四川宣撫司命沔州都統張威捕之福入普州守臣張己之棄城去福屯於普州之石山庚午威屯兵茗山凡十四日莫簡自殺福請降威執之以歸於宣撫司誅之金人圍安豐軍及滁濠州乃分兵自光州犯黃州之麻城自濠州犯和州之石磧自盱眙至滁州之全椒來往揚州之天長真州之六合淮南流民渡江避敵諸城皆閉金人逰騎數百至東采石楊林渡建康大震命京東總管李全自楚州忠義總轄季先自漣水軍各引兵來援金人乃遁去全擊敗之於曹家莊斬其首數千獲其貴將或以為金主女壻云四月曽從龍罷鄭昭先兼參知政事安丙為四川宣撫使五月召聶子述降兩淮荆襄湖北利州路沿邉諸州雜犯死罪囚仍蠲今年租稅太學生何處恬論尚書胡矩欲與金人議和請誅之以謝天下詔舉文武可用之才六月丙子太白晝見辛巳太白又晝見西川地震丁亥金人以書招李全全却其書癸亥京東總管李全舉兵至齊州金守臣王贇以城降十一月京東路帥司言克復京東河北二府九州四十縣八月合利州東西為一路九月丙午以李大東為沿江制置使趙善湘主管淮西制置司公事賈涉主管淮東制置司公事兼節制京東河北路軍馬十一月乙亥築興元府城丁丑雅州蠻入廬山縣己卯四川宣撫司議出師取洮州招諭中原豪傑官民勸以歸附㑹乙酉金人犯鳯州之長橋乃引兵出援命罷洮州之師己丑京湖制置司遣統制扈再興等引兵六萬人分三道取中原庚寅賞茗山捕賊功庚辰嘉定十三年春正月京湖制置司統制扈再興引兵攻鄧州鄂州都統許因攻唐州不克而還金人追之遂寇樊城荆湖制置趙方督諸將大破之金人遁己亥雅州蠻復掠廬山縣戊午夏人復以書來四川議夾攻三月辛卯雨土丁巳黎州土丁叛夏四月淮東制置賈涉招諭山東兩河豪傑勸以來歸戊戌史彌逺上二祖下第七世宗藩譜系録六月癸酉親試舉人賜劉渭以下四百七十五人及第出身安丙為少保丙子以李全為左武衛大將軍季先除漣水軍忠義副都統命赴樞密院奏事未至殺之秋七月以京東河北諸州守臣空名告身付京東河北節制司以待豪傑之應者任希夷兼參知政事癸亥皇太子薨諡曰景獻八月壬申四川宣撫使安丙遺夏人書定議夾攻金人甲申復海州以徐睎稷知州事盱眙將石圭叛入漣水軍詔即以石圭為漣水軍忠義總轄九月辛卯夏人引兵圍鞏州且來趣師王仕信引兵發宕昌甲午太白晝見乙未四川宣撫司統制質俊李實引兵發下城戊戌四川宣撫司命諸將分道進兵沔州都統張威出天水利州副都統程信出長道興元副都統陳立出大散關興元統制田胃出子午谷金州副都統陳昱出上津己亥張威下令所部諸將毋得擅進兵而諸將遲疑不進壬寅質俊等敗金人於定逺城乙巳程信玊仕信引兵與夏人㑹於鞏州城下攻城不克九月信引兵趨秦州丙辰夏人自定逺退師十月丁巳朔程信邀夏人引兵共攻秦州不聽遂自伏羌城引軍還諸將皆罷兵九月甲午太白晝見金人犯皂郊堡沔州統置董照與戰敗績冬十一月斬王仕信罷張威職名以不進兵故也十一月詔刋正皇帝日厯庚戌大風壬子臨安火十二月壬申石圭叛歸韃靼辛巳嘉定十四年春正月丙戌朔雪乙未雷地震李全自山東還乃犒師庚子立四川運米賞格二月戊辰金人圍光州己巳犯五關壬申治舟於團風弗克濟金人圍黃州分兵破諸縣及漢陽軍丁丑李全棄泗州遁還甲申詔淮東京湖諸路應援淮西防守江面權殿司事馮榯援蘄黃榯遷延不進三月扈再興引兵攻唐州不克尋引所部趨蘄州李全自楚州引兵來援淮西長星見金人犯黃州守臣何大節棄城遁自沉於江金人犯蘄州守臣李誠之戰敗城陷殺其妻子奴婢然後自殺官屬多死之金人退扈再興邀擊於天長鎮金人大敗次日大戰斬首數千四月李全自臨淮追擊之殱其大半四月乙卯復置諸王宫大小學教授乙丑命任子簾試於御史臺五月甲申朔日有食之史彌逺上孝宗皇帝寶訓皇帝㑹要丙申西川地震六月甲寅朔沿江制置司置副使於鄂州丙寅立貴和為太子賜名竑封祁國公即濟王辛巳大風秋七月丁亥蒙國大將獻本朝皇帝恭膺天命之寶詔禮官詳論受寶典禮以聞詔以來年元日受寶於大慶殿辛丑趙方為京湖制置大使賈涉為淮東制置使丁未修光宗寶訓八月趙方卒參政任希夷罷壬戌宣繪同知樞密院事甲子立與莒為沂靖王後賜名貴誠即理宗皇帝九月辛卯合祭天地於明堂赦天下冬十月京東河北節制司奏復滄州詔以趙澤為河北東路鈐轄知州事甲寅以齊州為濟南府兖州為襲慶府丙寅夏人復以書來四川趣兵伐金庚午雷十一月癸未詔左翼軍受泉州節制己亥少保安丙薨京東安撫張林叛以京東諸郡降於韃靼人韃靼國使噶哈齊蘇等來計事十二月庚申鄭昭先罷閏十一月辛巳朔宣繪兼參知政事俞應符兼權參知政事殺華嶽先是嶽言時政忤時相以殿前司同正將授嶽後誣謀變殺之賑諸州水旱壬午嘉定十五年春正月庚戌朔御大慶殿受寶赦天下褒贈蘄州死事官吏官其子孫有差旌李誠之死節立廟蘄州丁巳招諭山東河北甲戌升鄂州武昌縣名夀昌軍三月賑江西旱傷夏五月庚戌太白晝見甲寅禁州縣匿囚丁巳皇子竑進封濟國公己未皇姪貴誠遷邵州防禦使壬戌知濟南府种贇等攻叛將張林於青州林遁去己巳修孝宗經武要略六月辛卯權參知政事應符薨秋七月甲子詔條畫營田八月己卯命戶部詳議義役九月辛亥宣繪參知政事程倬同知樞密院事薛拯賜出身簽書樞密院事癸丑雷大雨雹壬戌彗見辛未太白晝見冬十月丙子以忠義人收復京東州郡犒賞有差十一月戊午令京東河北路罪無輕重皆除之十二月雪寒賑臨安府貧民丁亥李全除保寧軍節度使京東河北鎮撫節制司副使癸未嘉定十六年春正月嚴贓吏法己酉皇子坻生踰月而薨丁巳雷辛酉命淮東制置司賑濟山東流民二月戊子雨土三月京東河北路鎮撫司言張林所部邢德來歸詔以德為京東東路副總管丁卯賑道州飢夏五月戊申賜蔣重珍等五百四十九人及第出身有差六月壬午淮東制置賈涉卒乙酉同知程卓薨秋八月辛巳詔州縣經界毋增紹興稅額癸未申嚴舶船銅錢禁九月庚子朔日有食之冬十一月辛亥賑太平州水十二月辛巳沿江被水州募民入米補官壬辰雷甲申嘉定十七年春正月戊戌朔録程頤後命淮東西湖北路轉運司提督營田三月癸巳蠲台州逋賦三月癸丑雪金人迫西河州聞四川制置司軍至乃引兵還夏四月辛卯賑廬州饑詔本州賑糶乙未犒李全賜李全彭義斌錢三十萬緡為犒賞將士費五月詔核實兩淮京湖四川江上諸軍之數六月丁卯朔太白晝見經天辛未皇孫銓生尋薨癸酉知西和州尚震午謀逆貶嶽州大名府蘇椿舉城來歸詔知大名府丁酉賑福建水八月乙亥罷通州天賜鹽場丙戌上不豫閏八月丁酉帝崩於福寧殿年五十七諡曰仁文哲武恭孝皇帝廟號寧宗楊皇后史彌逺立貴誠為皇子進封成國公即皇帝位尊皇后為太后垂簾聽政廢皇子竑降封濟陽郡王出判寧國府立理宗而殺濟王殆非寧宗之意也先是濟王書於几上明言楊后之事云史彌逺當决配八千里左右以告彌逺彌逺銜之時真西山兼王宫教聞其事遂力辭去臨行謂王曰大王若能孝於慈母而敬於大臣則天命必歸之矣寧宗疾革乃廢濟王其事實皇后彌逺專之吁宋一代家法最正諸后最賢傳受最明至寧宗之末楊后彌逺之惡濟邸之死理宗之立而後所謂家法之正后德之賢遂掃地矣使潘壬潘丙之謀成則彌逺將何所容其身哉然理宗之立猶能撑拄五十年而後亡不可謂非幸也續宋編年資治通鑑卷十五
