body:
  text: 續宋編年資治通鑑巻八宋劉時舉撰宋孝宗一癸未隆興元年春正月壬申朔改元詔觀察使以上各舉三人令三省樞宻院詳定格式謀畧沉雄可任大計寛猛適宜可使御衆臨陣驍勇可鼓士氣威信有聞可守邊郡思智精明可治噐械已上五等令曽立軍功觀察使以上不以在任閒居並隨類指陳實迹薦舉通習典章可掌朝儀疏達民事可任郡寄諳曉財幣可裕民力將身亷潔可律貪鄙詞辯不屈可備奉使已上五等令非軍功觀察使以上薦舉以史浩為右僕射同平章事兼樞宻使張浚樞宻使都督江淮軍馬陳俊卿改都督府㕘贊軍事仍知建康府時金将富察圖移屯虹縣蕭琦屯靈壁浚謂必為邊患當及時掃蕩四月張浚入奏事詔浚先圖兩城浚乞降一年嵗幣以應副使用詔發見樁管嵗幣銀赴都督府絹續次支降五月史浩罷以不興師之議詔親征命張浚都督荆襄浚命李顯忠出濠州以趨靈壁敗其都統蕭琦邵宏淵圍虹縣降其統軍富察圖穆大周仁於是乘勝克宿州浚恐盛夏人疲召顯忠等還金元帥赫舍哩志寧率兵至顯忠與戰連日未决金人死亡者過半諜報金人大興河南之兵將至㑹宏淵與顯忠不相能而顯忠又私其金帛不以犒士士憤怨遂潰而歸金人亦退浚時在盱眙去宿州不四百里傳金人將至乃渡淮入泗州撫將士已乃還維揚上疏待罪六月下罪已詔詔張浚貶秩改宣撫使陳俊卿唐文若邵宏淵李顯忠降罰有差浚留維揚乃大飭兩淮守備上復命浚奏事浚因乞骸骨上見奏謂栻曰雖乞去之章同上朕待魏公有加不為浮議所惑上對近臣未嘗名浚獨曰魏公初浚以符離之役改都督為宣撫陳俊卿言恐人情觀望號令不行八月仍復都督上有意恢復是役不利乃議講和吕中曰建炎以來十四處戰功皆未有符離之一舉者葢向者因其來而後與之戰今則堂堂之陣正正之旗徃而征之所謂先人有奪人之心非不得已而後戰已孝宗謂數十年無此克捷胡銓謂四十年未有此舉金人縁此震慴知吾君有大有為之志知廟謨有出不意之竒知邊鄙有折衝敵愾之將王十朋又謂陛下用兵為祖宗陵寢暴露而舉為徽宗欽宗復仇而舉為中原弔民伐罪而舉奈何王師偶失小利而幸災樂禍者横議紛起矣夫自宣和靖康以來為金所欺為和所誤為奸臣所罔曽不一悔而一欲用兵少有䘮敗上下翕翕以為危亡之立至不獨為之罷大臣咎論者而朝廷之議且又為之一變紹興間浚初為都督也韓岳張楊皆擁重兵劉光世一軍本皆羣盜因罷帥而叛借令失謀未至不可為國而朝廷已如無一兵之可恃今符離之役李顯忠邵宏淵進兵淮北藉令潰散不過失其所下之城邑而朝廷已如强㓂之將至至今言戰之失謀常以此藉口浚竟以此沮於當時甚哉任責之難而得謗之易也嚴贓吏法三月雨雹省官吏員減貴戚俸夏四月詔舉遺逸詔行寛恤張震自殿中侍御史除起居郎上曰張震知無不言言皆當理令載之訓詞限選人改官每嵗八十員上舉進士賜木待問以下五百餘人及第出身有差五月嚴交遺禁申禁銷金鋪翠以王十朋為侍御史胡銓入對言陛下除䑓官得人矣辛亥天申節詣徳夀宫上夀六月庚申朔日有食之秋七月以虞允文為湖北京西制置使允文言荆襄之地平原廣袤無山水之限隔故三國之後以至南北之分皆以兵為險道路錯出不以數計宜益兵以重荆襄為恢復之計湯思退為右僕射同平章事兼樞宻使太白晝見旱蝗詔近臣條上闕政許自今郡守須以二年方許移易詔曰比日飛蝗益多又聞諸路州縣風水為災朕避正殿減常膳二三大臣其盡修省監司郡守各務身率戢奸禁暴平寃察獄所在災傷依條賑卹檢放如有不以聞者重置憲典以龍大淵曽覿知閤門事大淵為樞宻承㫖覿帯御噐械去冬諫議劉度首論待小人不可無節潜邸舊僚宣召當有時盖指二人也三月復上䟽有毋使䙝御干預樞宻乃除二人閤門盖解樞屬也復奏不報七月詔議應敵定論先是金遣布薩忠義與赫舍哩志寧經畧四川地為我師所敗於是檄盱眙軍云既有通和之意自宜各守爾土封疆邊臣以聞張震率同列論敵人必將盡収故疆使我失諸將之心盡取舊人使我失中原之望盡如故禮使我沮義士之氣盡罷兵屯使我壊兵屯之䇿上乃下詔畧曰敵人來索故疆從之則不忍屈辱不從則邊患未巳中原歸正人源源不絕納之則東南力不能給否則絕向化之心宰執侍從臺諌各宜指陳定論以聞於是翰林學士洪邁給事中金安節中書舎人唐文若起居郎周必大共議謂宜嵗遺金繒如前日之數稍歸侵地如海泗之類殿中侍御史張震以為海州控扼海道陜西地多險要不可棄受册禮絕歸附不可有權工部侍郎張史陳良翰以為不用舊禮然後可和其餘亦繼有論列而宰執獨無奏章史浩云先為備守是為良規議戰議和在彼不在此倘聽淺謀於一時興不教之師敵去則論賞以邀功敵至則斂兵而遁迹使彼無辜之赤子皆為横死之遊魂取快一朝含寃萬世浩復陳招納三弊一謂棄實而取名二謂舎近而謀逺三謂見利而忘害又請辭宻院職許之吕中曰此壬午應敵之議也名曰應敵實則議和戊午之議和之已定也壬午之議和之未定也秦檜外則交敵内則要君其議已定於三日思慮之時既定而猶議之是特欲塞衆人之口耳今敵方索故疆取舊人爭舊禮其從與否未决也然和議已定之時上自宰執下至有司外至諸將皆爭言其不可是當時人倫尚明人心尚正也今和議猶未定此正諸公陳大義之秋也而洪邁金安節唐文若周必大共為一議張震自為一議張闡自為一議陳良翰自為一議言和者多言不可和者少豈非士大夫為檜所蠱其議論反不如前日之正也春秋許九世復仇而再世遽不問乎今不過論禮之輕重地之取予幣之多寡以為和議之成與否而君父不共戴天之仇則置而而不問也惟張震張闡之論近正而宰執獨無表章以聽謂和之自我耳史浩立備守之說不過遷延以就和耳此張浚之志所以不獲伸也九月盧仲賢使金先是八月金副元帥赫舍哩志寧以第三書來通和好其書云故疆嵗幣如舊即止兵上以付督府答書畧謂海泗唐鄧等州乃正隆渝盟之後本朝未遣使之前得之至於嵗幣固非所較第兩淮凋瘵之餘恐未能如數命盧仲賢擕書使金而上戒勿許四郡而執政命許之仲賢至宿州金懼之以威乃言歸當禀命許四郡遂以敵書來定四事一叔姪通書之式二唐鄧海泗之地三嵗幣銀絹之數四叛臣俘虜之人事聞於上上大悔悟先是浚累䟽言敵强則來弱則止不在和與不和在我自當為攻守之計可也而陳康伯湯思退周葵洪邁等既以為敵意欲和以是贊我使軍民少就休息因謂為自治之計以待中原之變而圖之是萬全之計也使敵勢誠弱我勢漸强何求不得而臺諫官議論紛然力詆臣等專欲求和以茍圖目前之安於是侍從之間以至百執事之臣交章來上謂今日之事惟當用兵不當言和是皆不量事力爭欲交兵政以利害不切於已敢為大言逮其誤國則將去之南山之南北山之北惟幸和議或變乃皆軒然而喜爭言我曽論此以邀高爵美名曽不思社稷之重豈同戲劇而生民肝腦塗地誰與任其咎哉執政急於求和遂遣盧仲賢持書報金浚復言仲賢小人多妄不可委信已而仲賢果以許四州辱命上怒仲賢下大理寺議罪思退等乃大倡和議十一月宰臣陳康伯等言金人來通和朝廷遣盧仲賢持書報之其所論最大者三事我所欲者削去舊禮彼亦肯從彼所欲者嵗幣如數我不深較其未决者彼欲得唐鄧海泗州而我以祖宗陵寢欽宗梓宫為言未之與也今欲遣王之望龍大淵為通問使副命下之日議論洶湧乞召張浚歸國持重咨訪仍命侍從臺諌集議上從之詔議講和吏部尚書凌景與韓仲通余時言路彬同議以為名分既正則當講和當遣使當與嵗幣而四州疆土當與祖宗陵寢及欽宗梓宫兩易之黄中金安節同議以為如世稱姪國號不加大字及用再拜二字未得穏當四州不可與寧少増嵗幣欽宗梓宫以下原本闕将士聞之而奮金人聞之而遁是自符離既潰之後其規模又如此也然浚之規模始沮於秦檜再沮於史浩三沮於湯思退之徒至是陳康伯亦主和議豈非天乎五月復環衛官詔近來環衛乆不除授非所以儲材而均任也可依舊制以材畧有聞堪任將帥及乆勤軍事暫歸休逸之人並為環衛官更不除換只令兼領以節度使即領左右金吾衛將軍承宣使即領左右衛上將軍又有左右驍衛武衛屯衛領軍衛監門衛千牛衛上將軍左右金吾以下諸衛大將軍諸衛将軍之類朝參依正官班次宗室不在此制仍不差戚里及非戰功之人上幸大教場犒賞戍還諸軍六月甲寅朔日有食之秋七月江東浙西水命賑之雨雹詔災異數見江淮水澇避殿減膳令朝廷䟽陳闕失八月魏杞以宗正少卿充通問使先是上命湯思退與金書許割四郡求減嵗幣之半至是命杞再使金以書不如式卻之又求割商秦地及歸正人且求嵗幣二十萬杞以聞上命只依初式再易書嵗幣亦如其數吕中曰壬午之議和之未成者也癸未之議和之已成者也和議之未成則諸臣當論和與不和之是非而當時僅有張闡張震二人不主和耳今和議既成之後所以集議者但論嵗幣之増不増地之削不削歸正人之遣不遣邊戍之撤不撤耳而諸臣猶有許之増幣許之割地許之還歸正人者其曰世仇不可和者僅有張闡胡公銓二人而止盖靖康之禍日逺日忘秦檜之毒日久日深後生晩軰不念前猷遂以東南為正統之地以忍耻事仇為義理之常嗚呼二聖之痛今四十年矣平王東遷四十九年忘復仇之義此春秋所由作也以理之公是非論則固决不可和矣以事之實利害論則和有害而無一利胡銓所謂養兵之外又増嵗幣民力益困一也唐鄧海泗之人一旦與之是致之死地二也海泗今日之藩籬失則兩淮不可保大江不可守三也絕中原之望四也竭吾膏血以奉敵五也秦檜力排不附和議之士九十餘人或死瀕海或死謫籍今日和議成則不附時議者或陷前日之禍六也前日之和卒有海陵之變敵不可信七也敵必復如前日盡索歸正人與之則反覆生變不與則敵不肯但已八也秦檜當國二十年迄今府庫無旬月之儲自此復和殆有甚焉九也李文靖嘗謂王旦切勿與敵講和况今國勢委靡而復倡和議使上下解體溺於鴆毒十也前日之議以公是非言之也今日痛哭有十之䟽又以實利害言之也斷以是非之公㕘以利害之實是和無一事可者當時不悟何哉張浚薨浚許國之心白首不渝終身不主和議遺命付二子曰吾嘗相國不能恢復中原盡雪祖宗之耻即死不當𦵏我先人墓左塟我衡山足矣疾革呼栻等於前問國家得無棄四郡乎且命作奏乞致仕而薨後五年贈太師諡忠獻魏公之忠貫日月既有議之者然早嵗晩節有不可曉者二力攻李綱而寧與汪黄同朝維揚之變國㡬危矣曽微一言聲時宰之咎一不可曉也力引奸檜使至得政而寧與趙元語不相下二不可曉也洪景盧指殺曲端趙哲而失秦陜諸州又不若斯二者之為重矣吕中議曰嘗觀國家自有中原之禍以來終始主戰者浚也終始主和者檜也以浚主戰而不免有富平之敗酈瓊之叛符離之潰以檜主和而江左少康二十年是以當時與議者寧為檜而不為浚㳺談者寧慕檜而不慕浚無他檜之所為與人之私心合也然千載而下言及檜則人皆思食其肉以快天地神人之憤言及浚則人莫不以手加額效林宗而慕李膺者也以此見忠義者人心之所同浚之所為又與人之公心合也彼富貴利逹飄風過耳而端人正士英風常存是浚之身雖死而浚之心未嘗不行於後世也九月以王之望參知政事交趾來貢詔令後命官犯自盜枉法賍罪抵死除籍没家財外取㫖出内帑金和糴賑濟金人以未如所欲為辭遂分兵南侵乃命湯思退督師江淮楊存中同為都督胡銓轉對為上言曰金不可和臣恐再拜不已必至稱臣稱臣不已必至請降請降不已必至納土納土不已必至輿櫬輿櫬不已必至如晉帝青衣行酒而後為快今日舉朝之士皆婦人也金既得此四郡專事殺戮上意中悔思退懼宻諭以重兵脇和上聞有敵師乃命建康都督王彦屯照闗范禁備淮李寳備江又命思退都督思退辭不行冬十月詔輔臣夕對十一月詔諭沿邊將士畧曰朕祗奉慈訓嗣有基業永念祖宗陵寢朝獻路絕黎元塗炭屯戍未休朕為人之後而不能報上世之憤為人之君而不能拯斯民之厄故食不知味寢不安枕未嘗以尊位為樂也特以戰爭之役肝腦塗地不忍南北之人枉罹非命朕自即位以來兩發聘使冀尋舊盟而鄰帥主兵及境弗納逮行人再徃始則立式要求繼則廹脅囚辱朕以兵隙難開隠忍自屈仍遣魏杞銜命復行不校禮文書辭並不愛四郡割以與之乃渝原約又求商州且索臨陣俘虜之人變詐無厭必欲尋釁初無休兵結懽之意今使命逗留議論不决積粟出船包藏罔測朕以太上聖意不敢重違而宰輔羣臣前後屢請已盡依初式再易國書嵗幣成數亦如其議在我可從無一顧惜若彼堅欲商秦之地俘降之人則朕有以國斃不能從也時敵將布薩忠義自清河口渡淮守將魏勝戰死劉寳自楚州王彦自昭闗南遁上猶未之知也而降是詔矣詔諭歸正官民詔云朕遣使約和首尾三載北帥好戰要執不回自盧仲賢初議則有畫定四事叔姪通書之式唐鄧海泗之地嵗幣銀絹之數及先是歸附之人朕志在好生寧甘屈已書幣土地一一曲從唯念名將貴臣皆北方之豪傑慕中國之仁義削去左袵投戈來歸與夫軍士人民厭厥異方喜我樂土朕知其設意欲得甘心斷之於中决不復遣前後書辨再三峻拒故彼逞忿無厭入我邊境若朕利於和好之速成不顧招懐之大信曲從所欲驅廹北歸則與淮北之民同為魚肉矣爾等當思交兵釁隙職此之由視之如仇共圖掃蕩高官厚賜自有明科傳之子孫永保寜泰天地鑒照朕不食言侍御史尹穡乞置獄取不肯撤備及棄地者劾其罪度和議决成所指凡二十餘人由是擢穡為諫議大夫言者論湯思退急於和好之成自壞邉備罷築夀春城散弓弩營兵撤修海船毁折水櫃不推軍功賞典及撤海泗唐鄧之戍又言思退宻欲召敵議和詔責居永州遂行至信州憂悸而死㕘政周葵聞太學有欲相率伏闕者奏以黄榜禁之重置典憲繼而太學生張觀宋鼎葛用中等七十餘人上書言湯思退王之望尹穡約議金人宜斬之以謝天下王抃使金軍併割商秦地許歸被俘人惟叛亡者不與餘誓目畧同紹興世為叔姪之國減銀絹五萬易嵗貢而為嵗幣金皆聽許詔擇日親征吕中議曰是役也名曰戰而實則和也不惟吾速於和而敵國亦速於和矣敵速於和故屢稱重兵以脅和吾亦速於和故新復之地不暇惜俘獲之醜不暇問但一於和而已正名分減嵗幣雖稍異於紹興之時然紹興因戰勝而後和未至如今日之茍和也此湯思退之罪也思退乃檜之死黨檜之主和雖隂與敵約然未至於宻諭敵以兵而脅和者也與檜異議者雖加貶竄亦未至興大獄劾二十人不主和之罪以成其議者此又因秦檜固位之心而使之也大明當天隂焰自熄思退之奸不得以盡行其志矣然以事勢觀之炎興之初肩背方患之時也尚可急投之以所常用之藥隆興之時半體已非其有矣故言和不可言戰亦不可痛已定則將至於忘時已過則遂至於改非有已成之規模不可為也故嘗謂炎興之敵奉辭以討之可也隆興之敵正名以絕之可也正名矣而又務實則大仇可復而成宋高宗所未為之志矣以陳康伯為左僕射錢端禮賜出身簽書樞宻院閏月詔館職無限員崔臯敗金人於六合十二月赦沿邊諸州洪适為賀生辰使龍大淵副之雨雹乙酉乾道元年春正月辛亥朔郊郊祀多用冬至冬至近晦改用正月遵藝祖故事也罷陜西轉運二月賑浙西饑雨水詔避殿減膳陳康伯薨康伯之初相也上皇宣諭曰自卿輔政中外翕然無有異論卿靜重明敏一語不妄發真宰相也諡文恭改諡文正三月令沿邊措置屯田詔舉制科四月金使奉國書始謂上為宋皇帝云先是國書大宋去大字皇帝去皇字書用君臣之禮有再拜等語金使至則起立問金主起居降坐受書奉使者自同陪臣館伴之屬皆拜其來使至是始稱上為宋皇帝止為叔姪之國易嵗貢為嵗幣減十萬之數地界如紹興之時而餘地廣不能改上終身憤之其後屢請還河南陵寢地改受書禮金人卒不從盖上有志復仇無能輔其志者呉璘來朝尋封普安郡王判興元府五月蠲減征斂李若水使金充賀上尊號使六月降姚岳官秋七月詔諸路監司帥臣銓量守臣守臣體訪知縣以聞鑄當二錢八月立皇長子愭為皇太子大赦文武官守臣辭見並令上殿諸路釐務總管鈐轄都監並同郴盜李金平九月立太子妃錢氏冬十月方滋使金充賀正旦使金使來賀㑹慶節十二月以洪适為僕射兼樞宻使汪澈除樞宻使丙戌乾道二年春正月雷限軍額三衙江上四川大軍新額總四十一萬八千人殿前司七萬三千人馬司三萬歩司二萬一千建康五萬池州一萬二千鎮江四萬七千江州一萬楚州武鋒一萬一千平江府許浦水軍七千鄂州四萬五千荆南二萬興州六萬興元一萬七千金州一萬一千其後増損通不減四十餘萬衣糧約二百緡可養一兵是嵗費錢八千萬緡二月賑兩浙江東饑三月賜蕭國梁以下及第出身有差僕射洪适罷夏四月雨水除浙西圍田㕘政葉顒罷六月兩浙市舶司官吏請給過於所収遂罷乾道新書成詔舉制科秋八月竄林安宅九月地震嚴賍吏法以黄濟為司農少卿少監汪大猷請以䑓諫侍從舉奏置簿錄之時備觀覽詔舉將帥之有智勇材能者冬十月減饒州嵗貢金額命講讀官進言雨雹十一月修祥曦殿記注汰老弱兵吕中曰養兵以自困兵多以自禍不用兵以自弊此本朝之弊政未有如中興之甚者也祖宗竭天下之財以養天下之兵固前世之所未有而今日竭一方之財以養天下之兵又祖宗之所無有朝廷以諸州上供錢以養大兵而諸郡人以其充當用度又盡以養廂禁土兵羣校貴將統領統制之屬坐縻厚禄而兵未嘗有一日之用國未嘗有强大之形敵未嘗有摧破之驗而徒以已困於兵耳十年生聚十年教訓者此勾踐之規模也閉關息民務農講武三年而後出師者諸葛亮之規模也乾道之間知老弱之當汰矣然積㡬十年不用兵則强者自弱壯者自老平日皆為養無用之兵矣十二月以葉顒魏杞為左右僕射簽書蒋芾兼㕘知政事陳俊卿同知兼權參政詔宰相兼制國用使參政同知國用事洪适言今三省所先發中書省畫黄宰執書押既完當制舎人書行然後過門下而給事中書讀如給舎有所建明則封黄具奏以聽上㫖惟樞宻院既得㫖即畫押過門下而中書不預則封駁之職恐有所偏望詔樞宻院凡已被㫖文書並關中書門下依三省畫黄書讀以示慎重出命之意從之然樞宻院機速事則不由中書直闗門下省謂之宻白丁亥乾道三年春詔戒理官謹獄㑹子流轉不行給降度牒及助教帖召人作價全以㑹子進納令兩淮通行銅錢㑹子二月賜諸將兵書夏四月利州東西復為一路以呉璘為安撫兼四川宣撫兼知興元府尋薨璘上遺表曰願陛下無棄四川無輕出兵不及家事人稱其忠追封信王諡武順五月賑泉州水災安奉太宗真宗玉牒六月命知院虞允文宣撫四川尋奏房州義士金州保勝軍七千餘人明年又奏興元洋州義士共二萬三千有竒且因農隙時徃來教閲無衣糧之費而四師之勢壯矣皇后夏氏崩諡安恭秋七月皇太子愭薨諡莊文閏月􅓖安恭皇后於赤山以劉珙為翰林學士八月禁兵官交結内侍大霖雨冬十月成都路旱十一月丙寅郊以雨而雷望祭於齋宫金使賀㑹慶節詔戒因循茍且誕謾奔競之弊僕射葉顒魏杞以郊祭雷變罷奉祠以陳俊卿參知政事劉珙同知樞宻院命近臣指陳得失戊子乾道四年春正月籍荆南義勇民兵八千四百有竒每嵗於農隙時教閲一月二月蠲福建鹽錢給僧牒助四川總司以蔣芾為右僕射至五月以母䘮而去位王炎賜出身簽書樞宻院事雨雹大雪三月詔舉制科夏四月賑綿洪等州饑進呈欽宗實錄并帝紀五月詔諸路常平司每嵗如合賑濟即約所用及見管米斛多方措置六月置度支都籍秋七月踈决罪囚王悦知衢州愷悌慈祥中夏闕雨禱曰乞為三日之霖願減十年之算竟以是卒百姓巷哭為之立祠詔贈龍圖閣八月行乾道厯冬十月蔣芾起復右僕射芾辭乞終䘮詔從之陳俊卿右僕射十一月大閲於茅灘上親擐甲胄指授方畧命三司合教為三陣戈甲耀日旌旗蔽天六師驩呼犒賞有加焉十一月召魏掞之入對上曰治道以何者為要掞之奏治道以分臣下邪正為要掞之議論可采賜進士出身除太學錄續宋編年資治通鑑巻八
