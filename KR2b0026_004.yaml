body:
  text: 續宋編年資治通鑑卷四宋劉時舉撰宋髙宗四乙卯紹興五年春正月朔日有食之上在平江詔宰執條上攻守策李綱言陛下勿謂敵馬退遁為可喜而以僣偽未誅仇敵未報為可慮勿以保全東南為可安而以中原未復赤縣神州至今淪喪為可恥勿以諸將屢捷為可賀而以軍政未修士氣不振尚使強敵得以潛逃為可虞則中興之功可指日而俟守備之宜則當料理淮甸荆襄以為籓籬當以淮南東西及荆襄置三大帥屯重兵以臨之東路以揚州西路以廬州荆襄以荆揚為帥府淮東路則以江東路財用給之淮西路則以江西路財用給之荆襄則以湖北路財用給之徐議營田使之贍養假以歲月則籓籬成守備之宜莫大於是矣然後可以議攻戰之利亦當分責於諸路大帥謂如淮東西之帥則當責以收復京東京西路荆襄之帥則當責以收復京西南北路川陜元帥則當責以收復陜西五路此事雖若落落難合然在陛下聖意先定於中而以至誠不倦決斷行之蓋無不可成之理至於擇將之方治兵之政車馬器械之制號令賞罰之權兵家皆有成法無待於言而戰陳之間因敵決勝臨事制度者兵無常形又不可豫圗也臣願竊以為獻者在勿失機會而已若夫措置之方則臣願先定駐蹕之所今鑾輿未復舊都莫如權宜且於建康駐蹕控引二浙襟帶江湖運漕財穀無不便利臣昨於建炎初建議幸關中為上襄陽次之建康為下者以天下形勢言之也然淮南有籓籬形勢之固然後建康為可都願陛下與二三大臣熟計之綏懷之略則臣願先為自治自強之計使陷溺之民知所依告益堅戴宋之心上謂宰執曰恢復之圗所宜愛日仍先求人才有人才則天下之事無不舉然用人才要在進君子退小人趙鼎曰敢不奉詔金人自六合北歸張浚遣王進追之敵衆潰墮淮河而死又崔德明敗之於盱眙以韓世忠劉光世張浚為淮東西江東宣撫使而劉光世遣酈瓊復光州罷教官試二月王居正為兵部侍郎嶽飛入見以淮西功加以崇寧信節度上如臨安詔臨安守臣仍舊帶浙西安撫以趙鼎張浚為左右僕射浚兼都督諸路軍馬以嶽飛為荆湖襄陽路制置使討楊么吳璘復秦州命張浚視師江上至鎮江召韓世忠親諭上旨使舉軍屯楚州以撼山東至建康撫張俊軍至太平州撫劉光世軍軍士無不踴躍命近臣編類奏疏偽齊犯信陽軍守臣許繼明死之嶽飛至賊退命李迪知軍就戍之修紹興會計録凡天下賦入之數官吏之數養兵之數出納皆具焉以參知政事孟庾沈與求兼樞密院事薩里罕與偽齊慕容洧欲犯秦州吳枚遣朱玠分道伺敵牛皓與敵戰於瓦谷吳死之罷福建鑄錢閏二月置總制司措置財用命孟庾兼領之其後東南諸路歲收總制錢七百八十餘萬緡而四川不與焉上開講筵以朱震范仲與專講春秋左氏傳孫近唐懌仍講論語孟子鄭滋胡交修讀三朝寶訓上尋以御書無逸為圖置講殿又御書尚書賜趙鼎曰尚書所載君臣相戒敕之意政欲共由此道以成功耳上又書車攻詩賜輔臣曰當與卿等日日勉勵以修政事攘外侮趙鼎請三衙見管人數依舊例立為轉員之法時殿前司有兵九百餘人馬步司各六百餘人而已韓世忠移屯楚州上以手札勞之李綱上建炎時政記令諸州通判印賣田宅契紙總制司請應鉛場坑治令𣙜貨務依茶鹽印造文引許客人算請夏四月汰諸路監司七人詔鄉村五保為一大保通選保正於免役令中去長字始改紹聖法楊時卒諡文靖時趙鼎尊程頤之學一時學者皆聚於朝然鼎不及見頤故有偽稱伊川門人以求進者亦蒙擢用是月太上皇崩於五國城兵部侍郎司馬朴與通問副使朱辨在燕山聞之服衰朝夕哭金人義之而弗問太廟成遣太常少卿迎神主於溫州五月初上謁太廟詔都督行府措置屯田何蘚使金胡寅上疏言女真者驚動陵寢戕伐宗廟劫質二帝塗炭祖宗之民乃陛下仇也自建炎丁未至於紹興甲寅所謂卑辭厚幣以問安迎請為名而遣使者不知幾人矣知二帝所在見二帝之面者誰歟得女真之要領者誰歟因講和而能息敵兵者誰歟臣但見丙午而後通和之使歸未息肩而黃河長淮大江相次失險矣臣但聞去年來使者還國酋豪帖服國勢奠安形於草奏傳播逺近曽未數月而劉豫稱兵犯順矣女真者知中國所重在二帝知中國所恨在劫質知中國所畏在用兵則常示欲和之端增吾所重平吾所恨匿吾所畏而中國坐受此餌既久而後悟也天下其謂自是改圗必矣何為復出此謬計也耶茍曰姑為是豈有修書稱臣厚費金帛而成就一姑息之事也茍曰以二帝之故不得不然則前效可考矣況歲月益久敵情益閟必無可通之理也適觀何蘚之事恐和説復行國論傾危士氣沮喪所繫不細遂具陳奏陛下憲天聰明灼見忠志曲賜褒諭以來衆言使天下忠義之士皆知陛下雪恥復仇之意用賢才修政事厲兵選將駸駸北向以為迎二帝之實大計一定邪説不行中興可期宗社之福豈特微臣忝竊恩詔以為今日美談而已上曰藝祖創業至勤朕取子字行下鞠於宫中以慰藝祖在天之靈得子修之子伯琮育於宫中賜名瑗時年九歲遣置資善堂於行宫欲令就學命監司分慮囚以盛暑故也六月行統元厯併省鑄錢司旱上曰亢陽如此朝廷政事闕失更宜講求湖寇楊么據洞庭遂為劇寇官軍陸襲之則入湖水攻之則登岸曰有能害我除是飛來浚為上疏不先去么為腹心害將無以立國請自行浚至湖南會嶽飛兵至賊將楊欽以三千人降飛乘勝急攻其水寨么窮蹙赴水死遂平浚自湖南轉由兩淮會諸將議防秋召和靖處士尹焞秋七月薦饗太廟以王彥知荆南府令宰執謹擇守令八月試博學宏詞科録趙普後追貶章惇蔡卞偽齊陷光州親試舉人初定黃中為首選用仁宗故事不以貴胄先天下擢江洋為第一川陜類試第一人依殿試第三名推恩九月趙鼎上神宗實録淮寧宣撫遣將華旺復光州冬十月張浚入見以席益為四川制置使以李綱江西制置大使以嶽飛河北京西招討使偽齊犯漣水韓世忠敗之祫享太廟十一月令州縣造户帖出賣民間自行開具地宅田畝間架之數立為定價凡六等期一季足其錢令督府樁管録顔真卿後上出宫人趙鼎曰節省之道始於宫庭此陛下盛德也以任申為中書舍人胡寅論不當遣使而張浚自江上還奏使事兵家機權不用其説寅復奏疏言其無益者大約謂庚戌而後不遣使敵兵亦不來及癸丑年遣使則鈎引敵人入國曽不旋踵又曰去冬下詔罪狀劉豫名其為賊今豫豈肯賔吾使人達之於金哉所謂無益皆此類也獨有一説使陛下難處者以二帝為言耳然自建炎改元以來使命屢遣無一人能知兩宫起居之狀謦咳之音者況今歲月益久金必重閟惟懼我知之今以金為父兄之仇絶不復通則名正而事順他日或有異聞在我理直易為處置若通使不絶則金握重柄歸曲於我名實俱喪非陛下之利也使或有知二帝所在一見慈顔宣達陛下孝思之念雖歲一遣使竭天下之力以將之亦何不可之有其如艱梗悠邈必無可達之理乎以此揆之則以二帝為言者理不難處也臣聞善為國者必有一定不可易之計正其大義不徼幸以為之今日大計則當明復仇之義用賢才修政事息民訓兵以俟北向更無他策倘或未可惟是堅守若夫二三其德無一定之論必恐不能有為至於何蘚之行非特無效決須取辱臣所見如此豈得以張浚有言而自抑也寅既與浚異議乃以父病不及迎侍乞湖南小郡命知邵州十二月改神武為行營護軍罷鎮撫使吕祉請侍從官免輪面對如有已見即許依舊例請對從之劉子羽熊彥詩川陜撫諭使是歲金主烏竒邁死阿固達孫亶立是冬蒙國叛金蒙國在女真之北在唐為蒙兀部亦號蒙古丙辰紹興六年正月上在臨安詔寬恤命賑濟張浚復出視師命韓世忠自承楚以圗淮陽劉光世屯秀州以相北軍張俊練兵建康為進屯盱眙之計楊沂中鎮精兵為後翼嶽飛進屯襄陽以窺中原於是國威大振二月置交子務尋罷之襄陽府路改京西南路韓世忠敗偽齊兵於淮陽三月初收官誥綾紙錢以韓世忠為京東淮東宣撫處置使嶽飛湖北京西宣撫副使張浚於諸大帥中獨稱世忠與飛可倚以大事故並用之李綱入對上疏九十六其論中興及金人失信襄陽形勝與和戰朋黨五事皆利害之大者上嘉勞久之夏四月嚴考校監司守令法偽齊陷唐州判官唐舉臣推官張從之死之賜功臣號訓宗室名復翰林侍讀學士劉光世破偽齊劉龍城五月賑湖南飢收免丁錢金星犯畢占法當有邊兵以戒守邊者六月以王庶知荆南府地震詔罪已求言嚴贓吏法秋七月黜內侍馮益劉光世復壽春府張浚奏東南形勝莫重於建康實為中興根本請聖駕臨建康撫三軍而圖恢復上從之九月上如平江偽齊分道入寇初劉豫因尼瑪哈得立知奉尼瑪哈而已蔑視他帥至是請兵於金宗盤沮之聽豫自行而遣烏珠提兵黎陽以觀釁劉光世時駐廬州以為難守張俊駐泗州亦請益兵衆情恟懼張浚以書戒俊及光世曰賊豫之兵以逆犯順若不𠞰除何以立國平日亦安用養兵今日之事有進擊無退保趙鼎等請上親書付浚大略欲退師還江南為保江之計浚奏若諸將渡江則無淮南而長江之險與敵共淮南之屯正所以屏蔽大江使賊得淮南因糧就運以為家計江南其可保乎今淮西之寇正當合兵掩擊況士氣益振可保必勝者一有退意則大事去矣又嶽飛一動襄漢有警復何所制願朝廷勿專制於中使諸將不敢觀望上乃手書報浚曰非卿識髙慮逺何以臻此浚奉詔異議稍息光世已舍廬州而退浚即星馳至采石遣人諭光世之衆曰若有一人渡江即斬以徇仍督光世復還廬州冬十月劉光世遣王德酈瓊敗敵將崔臯於霍丘敗敵將賈澤於正陽敗敵將王遇於前羊市劉猊至淮東為韓世忠之軍所阻不敢進復還順昌麟乃從淮西繫三浮橋而渡於是敵衆數十萬已次於濠壽之間江東宣撫使張俊拒之即詔併以淮西屬楊沂中為俊統制官浚遣沂中至濠州與俊合敗猊前鋒於越家坊猊孤軍深入恐三師掩其後欲令麟守合淝而後進沂中至藕塘與猊戰賊衆大敗橫尸滿野麟聞猊敗亦望風而潰光世乘勝追襲皆捷孔彥舟圍光州聞猊敗亦引去北方大恐四川增印錢引旌死節十二月趙鼎求去折彥質罷陳公輔請禁伊川學丁巳紹興七年春正月上在平江復樞密副使何蘚使還言道君及寧德皇后上仙上號慟終日不食以秦檜為樞密副使王倫奉迎梓宫使二月癸巳朔日有食之詔舉制科上徽宗廟號以嶽飛為湖北京西宣撫使時淮東宣撫使韓世忠江東宣撫使張俊皆以立功而飛少事張俊甚謹與俊討李成俊賴飛成功及飛以列將拔起世忠俊皆不平及飛破楊么而俊益忌之於是飛與俊隙始深矣三月上如建康飛因扈駕以行入見疏論恢復秦檜時為樞密副使主和議忌飛成功沮之召胡安國劉光世以言者論其退師幾誤事罷兵柄張浚以王德統其兵德與酈瓊等夷不相下大譟詣督府訴德浚召德還為督府都統制夏嶽飛奉詔詣督府議事張浚曰淮西之兵復以王德為都統仍命吕祉以參謀領之如何飛曰德與酈瓊故等夷不相下吕尚書雖通才不習軍旅不足以服其衆浚曰張宣撫如何曰飛之舊帥也然其人暴而寡謀且酈瓊之素所不相服曰然則楊沂中爾飛曰沂中視德等耳豈能御此軍哉浚艴然曰浚固知非太尉不可也飛曰都督以正問飛飛不敢不以正對豈以得軍為念耶屬以母喪奪情既與浚忤即日上章乞解兵柄以終喪步歸廬山廬於墓側以張憲權管軍事浚怒乃命參議官張宗元為宣撫判官監其軍上詔飛還軍凡數四飛力辭詔屬吏造其廬起之乃入見以淮西之軍新易大帥乃命張浚視師淮西命吕祉撫諭淮西諸軍祉簡倨自處不通將士之情酈瓊叛逼祉北行將渡河祉下馬立棗林下謂曰劉豫逆臣我如何見之此處是我死地更不去也瓊令人縛祉上馬又翻身落馬大罵曰我不比你幾個負國賊我不去又謂其下曰爾軍中豈無一個英雄劉豫逆臣不要隨酈瓊去從逆不是好事衆皆環立不行瓊恐衆心動搖生變乃遣人殺祉以其衆降豫八月以張俊為淮西宣撫使置司盱眙楊沂中制置使劉錡副之置司廬州以朱松為校書郎九月張浚竄永州以趙鼎為左僕射大饗明堂冬十月開講筵上曰頃臺諫好以朋黨罪人如罷一相則於所薦不論才否一時俱黜非所以惜人才厚風俗也復四川茶馬司閏月以尹焞為祕書郎詔舉監司郡守言者謂江西大旱李綱修城民不以為便遂罷職十一月張俊入見十二月詔韓世忠移屯鎮江朱松上疏曰淮淝東南之屏蔽而無故撤之非計之得也王倫還言金人許還梓宫及皇太后又許還河南諸州上大喜副使朱辨因以表附倫歸金人以劉豫不能立國廢之齊立八年而亡交趾李陽煥死子天祚嗣綦毋謹和尚嘯聚於三水鎮有船四十屠三水鎮焚海安等鹽場劉領時為廣州參議官帥所部兵捕之遂殺綦毋謹和尚捕逐餘黨海道遂清以領知郴州戊午紹興八年春正月上在建康將還臨安參政張守謂建康自六朝為帝王都且據會要以經理中原依險阻以捍禦強敵陛下席未及暖今又巡幸百司六軍有勤動之苦民力邦用有煩費之憂願少安於此以繫中原民心趙鼎以為不可守求去出知婺州秦檜議以王倫使金請和左正言辛次膺力言國恥未雪義難講好面陳及上疏者六七不從乃以母疾求去以次膺為湖南提刑六月王倫偕金使來諭金主許和七月命再使詔曰大金遣使至境朕以梓宫未還母后在逺陵寢宫闕久稽汛掃兄弟宗族未得會聚南北軍民十餘年間不得休息欲屈已就和在廷侍從之臣其詳思所宜條奏來上編修官胡銓上疏以為陛下一屈膝則祖宗廟社之靈盡淪異域祖宗之赤子盡屬他人朝廷宰執盡為陪臣異時敵人無厭安知不加我以無禮如劉豫也哉夫三尺之童至無知也指仇讎而使之拜則艴然怒堂堂天朝相率而拜仇讎曽無童稚之羞而陛下忍為之耶奉使王倫誘致此使以詔諭江南為名欲臣妾我執政孫近附會秦檜臣義不與檜等共戴天區區之心願斷三人頭竿之藁街然後羈留金使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死耳寧能處小小朝廷以求活耶書上連貶竄以胡世將為四川安撫制置使趙鼎言中原有可圗之勢乞召諸將進兵上曰今須與金議和梓宫與太后淵聖皆未還若不與和無可還之理蔡州亳州來歸二月上如臨安遂定都焉胡安國致仕諡文定以王庶為樞密副使三月秦檜為右僕射吏侍晏敦復退而有憂色曰姦人相矣封李天祚交趾郡王録胡瑗後夏四月命王庶視師江淮庶素有威嚴庶坐壇上自大將三衙以下雖身任使相悉以戎服步由轅門庭趨受命拜賜而出時嶽飛與庶書曰今歲若不舉兵當納節請間庶稱其壯節五月給貧民養子錢以張燾為兵部侍郎六月復六路經制發運使尋罷之上以亮隂不臨軒參以四川類試人賜黃公度二百九十人及第試博學宏詞科朱震卒録司馬光後彗出西方八月修徽宗實録以李光參知政事光有人望欲藉光名以鎮厭耳參政劉大中與趙鼎合議以為屈已和戎不可檜怒令蕭振言其罪出知處州振謂人曰如趙丞相不必論蓋欲其自為去就也十月趙鼎罷出知紹興府王庶論金不可和檜恨庶乃落職豫祠十一月曽開以議和事不便忤檜罷禮部侍郎以勾龍如淵附會和議除御史中丞施廷臣力贊和議除監察御史金使張通古來議和以詔諭江南為名言先歸河南地徐議餘事提舉洞霄宫李綱上疏言臣竊見朝廷使王倫使金國奉迎梓宫往反屢矣今倫之歸與金使偕乃以詔諭江南為名不著國號而曰江南不云通問而曰詔諭此何禮也臣在逺方雖不足以知其曲折然以愚意料之金為此名以遣使其邀求大略有五必降詔書欲陛下屈體降禮以聽受一也必有赦文欲朝廷宣布頒示郡縣二也必立約束欲陛下奉藩稱臣稟其號令三也必求我賂廣其數目使我坐困四也必求割地以江南為界淮南荆襄四川盡欲得之五也此五者朝廷從其一則大事去矣金人變詐不測貪婪無厭縱使聽其詔令奉藩稱臣其志猶未巳必繼有號召或使親迎梓宫或使單車入覲或使移易將相或使改革政事或竭取賦稅或朘削土宇從之則無有紀極一不從則前功盡廢反為兵端以為權時之宜聽其邀求可以無後悔者非愚則誣也校書郎許欣因入對奏疏略曰金人始南侵也固嘗云講和矣靖康之初約肅王至大河而還已而挾之北行訖無音耗河朔千里焚掠無遺復破威勝隆德等州淵聖常降詔書謂金人渝盟必不可守是歲又復深入朝廷制置失宜都城遂陷敵情狡甚懼我百萬之衆必以死爭也止我諸道勤王之師則又曰講和矣乃邀淵聖出郊次邀徽宗繼往追取宗族殆無虛日傾竭府庫靡有孑遺公卿大臣類皆拘執然後偽立張邦昌而去則是金人所謂講和者果可信乎此已然之禍陛下所親見今徒以王倫謬悠之説誘致敵人責我以必不可行之禮而陛下遂以屈已從之臣是以不覺涕泗之橫流也韓肖胄使金是歲金伐蒙為所敗續宋編年資治通鑑卷四
