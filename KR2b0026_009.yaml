body:
  text: 續宋編年資治通鑑巻九宋劉時舉撰宋孝宗二己丑乾道五年春正月以徐子實充措置兩淮屯田官罷制國用司中書舍人汪滔言按中書舍人於制駁有誤糾其論奏而給事中又所以駁正中書違失近年給舍列銜同奏非神宗官制之意詔制置非經兩省書讀不行三月賜鄭僑以下及第出身有差命參政王炎宣撫四川夏四月詔恤流移五月置言事籍詔有司議獄以法不得任情重奏裁六月戊戊上御便殿錄孔氏後賜孔璨官八月朔日有食之以陳俊卿虞允文為左右僕射允文嘗有恢復中原之議而俊卿持重卒與允文不合人有議允文所為虛誕竟不效九月復監司避本貫法令諸路監司分上下半年廵按所部冬十月賑温台水十一月諸州通判許監司列銜保奏監司郡守令侍從䑓諌西省各舉京朝官以上三人十二月張栻入對時虞允文以恢復自任栻言欲復中原之地必先收中原百姓之心欲得中原百姓之心當先有以得吾境内百姓之心降㑹子收兩淮銅錢庚寅乾道六年春正月上召黄中中入見因復以正心誠意致知格物為上精言之又言比年以來言和者忘不共戴天之仇固無久安之計言戰者復為無顧忌大言又無必勝之䇿必也暫與之和而亟為之備内修政理而外觀時變則庶乎其可上皆聽納除為兵部尚書兼侍讀詔免丁錢二月詔均役法限用抑游手務農桑三月省諸書吏員罷淮東總領所併歸淮西以史正志為户部侍郎江浙荆湖淮廣福建等路都大發運使置司江州罷四川安撫制置司歸宣撫司夏五月進呈四朝㑹要上皇玉牒僕射陳俊卿罷時虞允文始相建議使金以陵寢為請俊卿面奏以為未可又上䟽曰陵寢誠臣子之痛憤然在今日彼方以本朝意在用葬多方為備若更為此以速之彼或先動則吾之事力不辦不知何以待之况使者既行中外疑惑果得所請猶為有名茍或不從殊失國體上意為釋而允文復申前議俊卿即杜門上䟽以必去為請出知福州陛辭猶勸上逺佞親賢修政事以攘外侮泛使未可輕遣允文遂遣使竟不獲其要領詔革茍且誕謾等習詔給舍䑓諫言事閏月行錢㑹各半法范成大使金祈請山陵及受書二事金復書略云和好再成界山河而如舊緘音遽至指鞏洛以為言既云廢祀欲伸追逺之懐止可奉遷即俟刻期之報至若未歸之旅柩亦當並發於行塗抑聞附請之辭欲變受書之禮於尊卑之分何如顧信誓之誠安在自紹興和戎受書之禮金使捧書陞殿北面立榻前跪進上降榻受書以授内侍完顔褒初立宰相陳康伯與爭遂令伴使取書以進及乾道再和循舊例上意頗悔之明年遣趙雄賀金生辰附國書云惟列聖久安之陵寢既難一旦而驟遷則靖康未返之衣冠豈敢先期而獨請載復諄諭之意詳及受書之儀盖今叔姪之情親與昔尊卑之體異金使其臣宣諭宗廟初講和日宋朝來請徽宗梓宫今日講和自當來請欽宗梓宫父子同歸以時奉祀去年使來却妄請鞏洛山陵上國止許奉遷今因聘使輙稱久安陵寢難以驟遷靖康靈柩亦難獨請向來已許遷送今反辭以為難於義安在無一語及受書事六月張栻入對上曰卿知敵國事乎對曰不知也上曰金國饑饉連年盜賊四起栻曰金人之事臣雖不知然境内之事則知之詳矣比年諸道嵗饑饉民貧而國家兵弱財匱小大之臣又皆誕謾不足倚仗正使彼實可圖臣懼我之不足以圖彼也復奏䟽曰臣竊謂陵寢隔絶言之至痛然今未能奉辭以討之又不能正名以絕之乃使卑詞厚禮以求於彼則於大義為已乖而度之事勢我亦未有必勝之形夫必勝之形當在於蚤正素定之時而不在於兩陣决戰之日今日但當下哀痛之詔明復讐之義修徳立政用賢養民選將帥練甲兵以内修外攘進戰退守之事通而為一且必治其實而不為虛文則必勝之形隠然可見矣上為改容歎息吕中曰孝宗有恢復之志置恢復局覽華夷圖建國用使開都督府立奉使司兵自偏禆而下各有長記將自凖備而上又有揭帖江北諸城浚陴増隍沿淮分戍鼔聲逹於泗潁葢無一日不為恢復之事實以乾淳之時與紹興之時不同紹興復仇之時仗義而行可也然機豈易乘哉必吾之事力十倍於紹興而後可開禧不知此所以有浪戰之失也九月更役法復置武臣提刑十一月壬午郊十二月大閲於白石罷發運司復淮東總領所辛夘乾道七年春正月朔加上太上帝后尊號帝曰光堯夀聖繼天體道太上皇帝后曰夀聖明慈太上皇后上取尚書中所載敬天事編為兩圖以自警名曰敬天復鑄錢司二月立皇子恭王惇為皇太子大赦以皇子愷判寧國府進封魏王張栻入對講葛覃詩三月皇太子納妃李氏復將作監申嚴閉糴禁夏四月詔舉制科賑楚州饑劉琦起復同知樞宻院安撫荆襄琦辭免以皇太子尹臨安府秋七月賑湖南江西饑蠲淮浙丁錢鹽絹又十月罷紹興府宗正行司十一月䇿制科十二月立閤門官輪對法依文臣館職輪對壬辰乾道八年春二月改僕射名為左右丞相以虞允文梁克家為之以曽懐參知政事以張說王之奇並簽書樞宻院事三月賜黄定以下及第出身夏五月福建鹽行鈔陳俊卿帥閩移書于宰執曰鹽福建惟上四州可售餘地狹民貧不便立宗室銓試法秋七月罷廬州屯田兵八月泗州水九月定江西舊鹽鐵錢額命虞允文宣撫四川冬十一月詔鬻官田申嚴定諡賜諡法癸巳乾道九年春正月以王之奇知揚州淮南安撫使詔監司守臣革朋比茍且之弊福建鹽復官賣法二月命監司條便民事夏五月朔日有食之皇太子免尹臨安江西洪吉饒信等五郡水灾命賑之詔朱熹安貧樂道亷退可嘉特與崇道觀秋八月詔興水利九月進呈中興㑹要太子令上玉牒賑合州饑冬十月丞相梁克家出知建寧府乃以曽懐為右丞相以張說知院鄭聞參政以沈燮同知尋復以姚憲為簽書十一月朔日有食之陳升卿賜出身除監察御史戊戌郊詔明年改元淳熙旌節行漢州什邡縣陳敏政五世同居旌表門閭十二月廣西鹽復官賣法甲午淳熙元年春二月交趾來貢賜國名安南封李天祚南平國王三月省文武階左右字出爵募民賑濟夏四月訓宗室名詔舉制科六月詔議祫饗東嚮之位右丞相曽懐罷先是䑓官詹亢宗季棠交章論列他事因中懐謗遂求退且乞辨明誣謗大理寺根究無實乃貶責亢宗及棠而復相懐續言者又論㕘政姚憲與亢宗等通謀陷懐以取相位乃罷憲十一月懐以疾辭乃除職奉祠九月曽覿開府儀同三司幸玉津園宴射冬十一月甲申日有食之以龔茂良㕘知政事以葉衡為丞相十二月修吏部七司法是嵗淮南復分為東西路乙未淳熙二年春三月親試舉人以詹騤為首有蜀人楊甲對䇿言恢復之志不堅者二事其一謂嬪妃滿前聖意幾於惑溺其一謂䇿士之始其及兵者不過一言是以談兵革為諱論兵革為迂也上覽對不說置之第五夏四月降劄子付兩淮總司五月燕輔臣於玉津園上曰朕嘗觀無逸篇見周公為成王歴數商周之君享國久逺真後世龜鑑葉衡等奏曰陛下能以無逸為龜鑑真社稷宗廟無窮之福也六月定補外帯職格罷四川宣撫復制置使竄蔣芾王炎張說秋七月彗出西方詔四川制置司存撫闗外四州及金州上津沿邊諸處歸正等人八月湯邦彦使金請河南陵寢地明年夏四月邦彦使金至燕金人拒不納旬餘乃命引見夾道皆控弦露刄之士邦彦怖不能措一詞而出上大怒詔流新州自是河南之議遂息不復泛遣使矣吕中曰孝宗嘗謂輔臣曰今世士大夫微有西晋風作王衍阿堵等語士大夫諱言恢復不知其家有田百畝内五十畝為人所强占亦投牒理索否士大夫於家事則人人甚理㑹得國事則諱言之當時士大夫薫蒸於和議之中一至於此獨虞允文建議遣使以陵寢故地為請其議壯矣以八陵之曠祀中原之久隔固臣子之至痛决不可和矣不幸而奸臣已許之和則請復陵寢故地當争於講和之中不當爭於和議已定數年之後彼雖仁義不足而㐫狡有餘豈可以虛言動哉求之不已必至用兵度之事勢則我未有勝彼之實其患有不可勝言者况中原之地吾不能正大義以取之乃卑辭厚禮以求之其於大義已乖矣此金之所以反得以義責我也越之行成於呉也葢忍耻以志仇讎之復而非恃和以自固也卒之二十年早朝宴罷卧薪嘗膽未嘗一日忘㑹稽之耻故雖屈辱於一時迄能伸其志於後日今徒為卑辭厚禮之事而不能為臥薪嘗膽之規模隆興以來稱叔姪之國則朝廷動色相賀而自壬午至丙寅四十五年間所爭者僅受書之儀而已此我朝虛文之弊也九月丞相葉衡罷閏月賑兩淮饑嚴因任法詔常平司每嵗奏所部㓙歉冬十月朔加上太上尊號曰性仁誠徳經武緯文太上皇帝齊明廣慈太上皇后十一月上為太上皇帝預慶七十於立春日詣徳夀宫行夀禮大赦詔強盜賍法比舊法増一倍定罪併左藏南庫封樁庫丙申淳熙三年春三月丙子朔日有食之進呈上皇日厯夏四月詔舉監司郡守雨雹竄葉衡於郴州言者論葉衡昨任宰輔不能正身竭誠日惟沉酣於酒殉私背公之罪乃竄於郴州五月以柴瑾為殿中侍御史以朱熹為秘書郎辭不至上問魏掞之安在龔茂良奏已物故乃贈宣教郎直秘閣秋七月以鄭鑑為校書郎詔奬建康留守劉珙賑濟有方八月詔御史六察各揚乃職䑓綱益振可令特遷兩官九月遣官㸃磨三總所財計是秋合婺州等水冬十月録繫囚立貴妃謝氏為皇后上謂執政曰若要革弊當從宫禁始上曰鬻爵非古制也自今除歉嵗民願入粟賑饑取㫖補官外其餘住罷十一月癸丑郊詔諸州軍守臣於文武臣内選差十二月以袁樞所編通鑑紀事賜東宫令與陸贄奏議熟讀曰治道盡於此矣監司因行部受諸郡折送悉以賍論安南李天祚死子龍翰嗣丁酉淳熙四年春正月行淳熙厯令諸州置財用都厯雨雹二月幸太學行釋菜禮幸武學傅伯夀言從祀於文宣王者皆當時門弟或歴代之名儒固無可議武成之廟所從祀者出於開元銓次失於太雜太祖去白起之像高宗黜韓信而陞充國黜李勣而升李晟去取之間皆所以示臣子之大節也然王翦無異白起而彭越臣節不終亦同韓信王僧辨雖平侯景又連和於齊呉明徹雖取河南然為周所俘不能死節韋孝寛楊素慕容恪長孫嵩慕容紹宗宇文獻王猛斛律光于謹或本無躬行之實或屈節僣偽之邦豈足多錄若夫尹吉甫之伐玁狁召虎之平淮夷皆有周之名將陳湯之斬單于傅介子之刺樓蘭馮奉世之平莎車班超之定西域皆為漢之雋功在晋則謝安石祖逖在唐則王忠嗣張巡皆闕而不錄宜詔有司討論使知夫抑矯枉之行者所以崇至徳黜不終之節者所以正君臣去嗜殺之暴者所以勸仁義而為勸沮者大矣尋詔武成王廟升李晟於堂上降李勣於李晟之次仍以曹彬從祀幸秘書省賜省官宴上賦七言律詩坐者皆屬和給僧牒助四川總領司措置備邊三月以史浩為醴泉觀使兼侍讀幸玉津園宴射夏五月福州建劍水命賑之謝廓然賜出身除殿中侍御史龔茂良罷先是茂良退朝曽覿當道不避茂良奏曰臣固不足道所惜者朝廷大體上遣中使諭覿詣政府謝茂良取其直賔官撻之御筆宣問施行太遽㑹柴瑾論奏不行得㫖補外或指瑾為茂良同年未㡬謝廓然除御史中書舍人林光朝繳還詞頭忤上㫖改除工部侍郎力求去出知婺州光朝乃茂良同里亦自引疾乞罷出知建康令内殿奏事手䟽六事論恢復之具曰天意曰人事曰財賦曰將帥而所以用之者曰謀曰時既退臣僚論茂良擅權亂常上親灑宸翰諭以體貌大臣之意章再上始落職臣僚復以四事誣謗茂良尋責寜逺節副安置英州明年卒於貶所立三省宻院奏審法秋七月嚴蜀茶禁立待補太學試法每正解一名取待補五名九月丁酉朔日有食之閲蹴毬於選徳殿紹興水冬十二月大閲於茅灘戊戌淳熙五年春二月雨土三月以史浩為右丞相十一月罷上親試舉人以姚穎為第一夏四月雨土詔今後差給事中一員立一司專一看詳五月罷創立塲務六月詔舉御史知興州呉挺言張震守環州後為敵所破死節贈觀察使仍於西和州立廟限四川總司錢銀㑹子額利州復分東西路以程挺為西路安撫兼知興州程价東路安撫兼知興元秋八月詔民間兩税除折帛折變日有常制外當輸本色者毋以重價强之折錢有違者按劾以聞九月幸秘書省陳俊卿入對時曽覿以使相領京祠王抃知閣兼樞宻院都承㫖甘昇為入内押班三人相與盤結士大夫爭附之於是鄭鑑為館職袁樞為宗主簿因轉對數為上言之至是俊卿入對因論覿抃招權納賄薦進人才而皆以中批行之壊朝廷之紀綱廢有司之法令敗天下之風俗累陛下之聖慈上因是踈覿七年疽發背死吕中曰方曽覿與龍大淵始用事也劉度爭之去胡沂爭之去張震周必大又爭之去上皆以朋黨疑之及陳俊卿一言而即出二人於外矣俊卿既去而曽覿復來劉恭父言之張敬夫言之龔茂良重言而得貶而覿與王抃甘昇之寵自若也及俊卿一言而復疎曽覿而棄之矣於是見君子退則小人進君子盛則小人衰也於此見大人能格君心之非而人主之論相當求其正已不當求其適已當求其可畏不當求其可愛也於此見孝宗之英明一時之奸邪霧翳終不能以滓穢太清也以趙雄為丞相王淮為樞宻使編光堯慈訓十二月弛沿江漁禁己亥淳熙六年春正月大社令葉大亷請乞詔内侍省遇有宣索之物並先次經由令同憑由司上曰此良法也可依四川制置使胡元質奏諸州上供金銀絹三色乞將太寧監鹽課増羨措置蠲免九州民間科買以蘇民力上從之雨雹㕘知政事錢良臣奏臣昨任淮東總領日失舉茹驤改官今以賍敗法當同坐詔覽良臣所奏乃欲以身行法國有常憲朕不敢私勉從所請可鐫三官上幸佑聖觀皇太子從召少傅侍讀史浩少保曽覿入侍佑神觀即上儲宫也置酒從容上曰元良侍側保傅從游太子謙恭仁孝二臣老成忠賢朕心甚樂顧謂皇太子曰近日資治通鑑已熟别讀何書對曰先以經為主史亦不可廢詔求言知南康軍朱熹上䟽言天下之大務莫大於恤民恤民之本又在人君正心術以立紀綱今日民間時以税重為苦正縁二税之入朝廷盡以供軍而州縣無復贏餘則不免於二税之外别作各色巧取於民今民貧賦重若不計理軍實去其浮冗則民力决不可寛惟有選將吏覈兵籍可以節軍費開廣屯田可以實軍儲練習民兵可以益邊備今日將卒之選率皆膏粱子弟厮役凡流所得差遣為費已是不貲到軍之日惟望裒斂刻剥以償債負總餽餉之任者亦皆倚負幽隂交通貨賂其所驅催東南數十州之脂膏骨髓名為供軍而輦載以輸權倖之門者不可以數計然則欲計軍實以紓民力必盡反前之所為然後乃可革也授將印委利權一出於朝廷之公議則可以絶苞苴請託之私而刻剥之風可革務求忠勇沉毅實經行陣之人則可以革輕拔非才之弊而軍士畏愛蒐閲以時竄名冗食者不得容於其間又擇老成忠實通曉兵農之務者使領屯田之事付以重權責其久任則可以漸省諸屯坐食之兵稍省州郡供軍之數軍籍既覈屯田既成民兵既練州縣事力既行然後可以禁其苛斂責其寛恤庻凡窮困之民得保生業無復流移漂蕩之患矣三月賑淮東灾雨雹詔漕臣舉職夏五月郴宼平六月求四川遺書以其不經兵火所藏官書最多也秋九月辛未大饗明堂復合祭奉太祖太宗配冬十月加封李龍翰十一月雨土庚子淳熙七年春二月頒釋奠儀張栻卒栻就胡宏學宏告以孔門論仁之㫖栻之言曰學莫大於義利之辨義者本已之所當為非有為而為此栻請學之要也初栻在朝召對數次栻所言大抵皆修身恤民務學畏天與夫抑僥倖屏䜛諛故不悅者衆病且死作遺表曰再世䝉恩一心報國天命至此厥路無由願陛下親君子逺小人信任防一已之偏好惡公天下之理永清四海克鞏丕圖四方賢士大夫徃徃出涕詔禁洛學秘書郎趙彦中䟽畧云士風之盛衰風俗之樞機繋焉且以科舉之文言之儒宗文師成式具在今乃祖性理之説以浮言游詞相高士之信道自守以六經聖賢為師可矣今乃别為洛學飾怪驚愚外假誠敬之名内濟虚偽之實士風日弊人材日偷望詔執事使明知聖朝好惡所在以變士風從之三月詔舉制科迎太上帝后宴大内夏五月頒淳熙新書六月令試刑法科兼經史秋八月湖南帥臣辛棄疾所置飛虎軍詔撥𨽻歩軍司旱九月詔常朝宰臣免宣名詔印㑹子百萬緡均給江浙代納旱傷州縣月樁錢冬十二月黎州五部蠻犯邊續宋編年資治通鑑巻九
