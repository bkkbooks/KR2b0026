body:
  text: 續宋編年資治通鑑卷一宋劉時舉撰宋高宗一丁未建炎元年五月庚寅朔即位于南京大赦改元其詔略曰惟孝弟可以動天惟憂勤可以成務惟恭儉可以富民惟兢畏可以保國惟大公可以悅人惟至仁可以安衆惟來讜論屏側言可以達聰惟近正人逺寵佞可以成德庶幾降監俾復父母宗族朕將謹視舊章不以手筆廢朝令不以內侍典兵權容受直言斥去浮靡非軍功無異賞非戎備無僝正尚慮羣臣狃于故習有以竒巧獻有以祥瑞聞大臣蔽賢有舉非實臺諫懷匿有言不盡凡此之屬必罰無赦中興大事記曰天下之勢者在人主一動念一轉手之間耳觀此一詔則高宗惻然之心實然之政真足以轉移天心而感動人心矣而不以手筆廢朝令不以內侍典兵權尤足以懲崇觀之積弊而去靖康之亂根也又詔戒厚斂除弊政赦盜賊治贓吏録忠義昭智勇以汪伯彥同知樞密院黃潜善為中書侍郎以右僕射召李綱赴闕汪黃自謂有攀附之勞虛相位以自擬及自外召綱二人由此與綱忤綱行至太平州疏曰恭儉優於天下興衰撥亂之主非英哲不足以當之惟其英故用心剛足以決大事而不為小故之所搖惟其哲故見善明足以任君子而不為小人之所間中興大事記曰嗚呼天之愛人甚矣有感于人事之變而迫于氣數屈伸消息之不齊然後不得已而降殃咎焉然是氣之屈于此也則必有以伸于彼其消于今也必有所息于後是以天將降非常之禍于斯世則必為之預出非常之人以禦之使夫國家猶有所依而立生民之類不至于糜爛泯滅而無餘是則理勢之必然而天之所以為天者其心固如此也若李公者其天之所出以禦宣和靖康之禍而開建炎紹興之業者歟當上即位之初誤國之臣不可用僞命之臣不可用張趙之德望未孚天下人望之所歸者李公一人而已上不自內用汪黃而自外召綱則高宗之志主于恢復可見矣觀上未即位時與公書云王室多故乘輿蒙塵方今生民之命急于倒垂諒非有不世之才何以成協濟之功則髙宗屬意于公久矣遄為汪黃所擠才七十五日而去位豈天意未欲恢復耶尊元祐皇后孟氏為太后元祐皇后初無失德哲宗廢于熙寧之時徽宗復于元符之際後羣臣以元符元祐並后非古制又復廢居瑤華宫至是乃正尊位中興大事記曰前世嘗罹母后之禍而我朝高曹向孟之屬仁宗后曹氏英宗后高氏神宗后向氏哲宗后孟氏獨享母后之福既留宣仁以開元祐之治復留元祐以開炎興之運此固天意然亦祖宗修身齊家之效也遙上孝慈淵聖皇帝尊號遙尊母韋氏為宣和皇后立邢氏為皇后又詔改宣仁皇后謗史播告天下于是追貶蔡確蔡卞邢恕中興大事記曰當靖康元年二月敵退之後士大夫爭法新舊辨黨邪正識者以譏其治不急之務今高宗即位首詔改宣仁謗史不幾復蹈前轍耶曰不然張敬夫謂此乃撥亂反正之宏綱古今人心之天理蓋我朝之治元祐為盛母后之賢宣仁為最當熙豐小人相繼用事之後使非繼以元祐則中原之禍不待靖康而後見當京師失守之時使非元祐之治在人耳目又何以開炎興之運哉此宣仁之功也章蔡初意不過欲去元祐之人耳而至於變元祐之法又慮元祐之人復用也而至誣以廢立之罪謗及宣仁一念之私燎原滔天可畏哉罷耿南仲言者謂陛下欲進兵京城為南仲父子所沮上曰南仲誤淵聖天下共知朕嘗欲手劍擊之命安置南雄又論主和誤國罪李邦彥及吳敏蔡懋李棁宇文虛中鄭望之李鄴竄於嶺南望之鄴皆使敵請割地者中興大事記曰金人自攻陷太原以來即以講和割地為餌李邦彥吳敏唐恪諸人皆墮其計蓋小人始者惟以拓地邀功及敵人已入中國小人無功之可邀則惟幸和之可成故政和之開釁者即宣和求和之人而宣和之求和者即靖康賣國之人也此小人以和誤國尤甚于敵人之以和誤我也耿南仲既以和誤淵聖猶以和沮高宗緩兵此小人之尤者上至欲手劍之此高宗之初心未為汪黃所誤之時也觀此則後日遣使議和者皆非其本心矣置御營司以黃潜善汪伯彥兼使副中興大事記曰國朝兵權隸于三衙本之樞府樞府有發兵之權而無握兵之權三衙有握兵之權而無發兵之權今本復三衙而别置御營司分委之樞府而置御營使其後專掌兵權樞府不得而預議者以本朝故事分為兩府又制御營使是政出於三此趙鼎所以舉行故事以正西府之權范宗尹所以兼樞密使而罷御營使宜也置直州茶鹽司張叔夜從淵聖北遷道中惟時飲湯義不食其粟至白溝河御者曰界河矣乃仰天大呼明日扼吭死何㮚至敵中不食而死孫傳後不知所終中興大事記曰靖康之難能死節者前有李若水後有張叔夜二人而已敵再犯闕勤王之師無一至者獨叔夜以孤軍入衛其忠已足稱及北遷之後猶不食其粟不入其境則終始之義無憾矣李若水嘗主車駕出城者也使其不死亦在誤國諸人之數惟其一死之明白昭晰故誤國之罪盡釋而言忠義者亦首稱焉若何㮚孫傳身為大臣乃引其君以降敵求生其不忠不義無父無君孰大焉使其能為若水之死已不足以贖誤國之罪而乃死于敵庭則其死不足言矣論者猶以二子不屈于僞楚為忠夫屈于大而不屈于小不屈于前猶或有益不屈于後復何補哉金人陷河中府權府事郝仲連及其子致原死之張所言亟還京城者有五利奉宗廟保陵寢一也慰安人心二也係四海之望三也釋河北割地之疑四也早有定處而一意于邊防五也又曰國家之安危在乎兵之强弱與將相之賢不肖而不在乎都之遷與不遷也誠使兵弱而將相不肖雖云渡江而南安能自保上欲以其事付所㑹所言黃潜善兄弟奸邪不可用潜善引去上留之乃竄張所于江州六月李綱入見置檢鼓院竄張邦昌于潭州尋賜死竄從張邦昌者王時雍徐秉哲吳訏莫儔李維顔博文孫覿王紹李回等有差中興大事記曰朱文公謂李綱入來方成朝廷者正謂此也公之十議一一施行而議僣叛議受僞命一章獨不下綱曰此刑政之大者蓋為臣之罪莫甚于僣叛莫大于從僞此而不誅何以正朝廷何以示百官何以曉天下何以懲戒後世之事君者上未遽行者以祖宗不忍殺大臣也邦昌忍于易姓忍于負宗社王時雍之徒忍于覆國忍于事異姓茍可以謀身者皆無所不忍若使覆宗社而無誅宗社何罪焉棄主事僞而無刑彼盡忠守節者何辜哉然綱之議雖行而公之謗愈多矣綱去之後朱勝非以敵犯維揚而欲立邦昌後蓋勝非邦昌友壻也未一二年間僞命之臣亦驟然擢用而為宰相臺諫者矣可勝嘆哉復公主號宗澤聞黃潜善等復倡和議上疏言河之東北陜之蒲解此三路者祖宗基命之地奈何輕聽姦邪附敵者張皇之言遂自分裂今日之事正宜與敵不共戴天今即位已四十日矣未聞有所號令今但見刑部指揮不得覘報赦文于河東河北陜之蒲解茲非新人耳目也是欲蹈東晉既遷之覆轍裂王者一統之疆土為僞霸耳為是說者不忠不孝之甚臣雖駑怯當躬冒矢石為諸將先上壯之以宗澤知開封府尋命留守東京澤至京時盜賊縱橫澤下令曰為盜者贓無輕重並從軍法由是盜賊屏息人情相安黃潜善白上遣傅雩為祈請使未行朝論遣重臣以取信改命周望為通問使未行李綱為上言今日之事內修政事外攘強敵使國勢日强則二聖不俟迎請而自歸不然雖車蓋相望卑辭厚禮終恐無益今所遣使但當奉表兩宫致思慕之意可也上乃命綱草二帝表付雩因獻二帝衣各一襲且致書於尼瑪哈置賞功司每縣添武尉一員李綱請置沿河淮江帥府要郡以備控扼帥府帶安撫要郡帶鈐轄次要郡領兵馬都監皆武臣為之副大率自川陜廣南外總分為十九路自帥府外要郡三十九次要郡三十八總為兵九十六萬七千五百人非要郡不與焉又別置凌波等水軍皇長子生賜名敷李綱為上言登極赦獨遺河東北而不及勤王之師乃大赦罷職田封吐蕃嘉勒彭後李綱上三議一曰募兵二曰買馬三曰募民出財助軍費且言熙豐間內外禁旅五十九萬今禁旅單弱何以捍强敵而鎮四方故莫若取財于東南而募師于西北若得數十萬付諸將以時練之不久皆成精兵此最為急務于是詔陜西河北各募三萬京東河東各募二萬仍創驍勝壯捷忠勇義成龍武虎威折衝果毅定難靖邊凡十號每號四軍每軍二千五百人李綱又言步不足以勝騎而騎不足以勝車乃請以車制頒于京東西路使制造而攻習之諫議宋齊愈入對以綱招軍買馬勸民出財助國非是上重北遷龍德宫器玩悉為都監王球所竊及是內侍陳烈以其餘寶器來上皆遐方異物李綱諫上亟命碎之秋七月命王淵劉光世韓世忠張浚分討羣盜時羣盜蜂起如淮寧之杜用山東之李昱河北之丁順王善楊進皆擁兵數萬不可招而拱州之黎驛鞏州之魚臺亦有潰卒數千為盜光世斬李昱淵殺杜用丁順等皆赴河北招討司自劾盜益衰皇叔士培復洺州省冗官詔修京城略曰朕將親督六師以援京城及河東河北諸路已奉迎隆祐太后津遣六宫及衛士家屬置之東南朕與羣臣獨留中原應在京屯兵聚糧修樓櫓治器具令留守司趣辦之東京留守宗澤造戰車千二百乘又據形勝立二十四壁于城外駐兵數萬沿大河鱗次為壘結兩河山水寨瀕河七十二里命十六縣分守之上表曰今敵人尚熾羣盜方興比聞逺近之驚傳已有東南之巡幸恐增四海之疑心謂置兩河于度外因成解體未諭聖懷不報又上疏曰陛下回鑾汴京是人心之所欲妄議巡幸是人心之所惡又不報澤又抗疏極言祖宗二百年基業陛下奈何棄之以遺強敵今陛下一歸王室再造中興之業復成如以臣為狂率願延左右之將士試一諭之不獨謀之一二大臣天下幸甚澤每疏奏上以付中書省潜善伯彥笑以為狂張慤獨曰如澤之忠義若得數人天下定矣二人語塞李綱言今縱未能入關猶當適襄鄧以示不忘中原之意今冬無虞車駕還闕天下之勢遂定而近議論紛紜謂陛下將幸東南然臣恐中原非復我有上曰但欲奉迎太后及六宫往東南耳朕當與卿留中原乃命綱草詔頒之兩京詔修鄧州城朝臣皆以為不可中書舍人劉珏言臣聞近臣有欲幸南陽者密邇中原易以號召四方此固然矣然今日兵弱財單陳留諸郡新創于亂千乘萬騎何所取給南陽城惡亦不可恃夫驕兵敵之長技而不習水戰京城天險前據大江可以攻守東南久安民力富盛可以待敵時伯彥潜善皆主幸東南故士大夫來附其議中興大事記曰李綱請寺滎陽宗澤請幸京城汪黃請幸東南三者不同然京城之䇿為上况宗澤數月間城築已增固樓櫓已修飾壟壕已開浚寨柵已羅列義士已團結蔡河五丈河皆已通流陜西京東西河東北盜賊皆已歸附又非靖康戰守無備之比失此一機中原絶望矣周之失計未有如東遷之甚也然李綱之請又在宗澤規模未成之前故其謀請先幸襄鄧以係中原之望西鄰關陜可以招兵北近京畿可以進援南逼巴蜀可以取財貨東達江淮可以運穀粟俟兩河就緒即還汴京亦可也而汪黃待高宗以乳嫗護赤子之術曰上皇之子殆將三十人今所存惟聖體不可不自愛重故建為幸東南之䇿不知我往敵亦往上如揚州而敵亦至揚州上如鎮江而敵亦至鎮江行幸所至即為邊面譬如泉流不知所届矣以李綱黃潜善為左右僕射兼御營使張慤副之以劉光世為左司都統制綱為上謀以乘輿幸南陽上許之黃潜善與汪伯彥乃力請幸東南上意中變于是綱所建白上多不從數日遂有並相之命自古君子小人並用其終也君子必去小人必留蓋至是中興之規模一變矣罷四道總管府宋齊愈抵死初齊愈在圍城中自外至㑹所寫張昌二字至是鞫于御史臺獄具賜死或言齊愈論李綱不已故綱以危法中之中興大事記曰宋齊愈之罪當從王時雍等之例貶而竄之可也何至是耶洪芻陳沖王及之死綱尚救其死而獨不救宋齊愈綱于是失政刑矣中興之初大臣有一事之當理則足以興起人心有一事之稍非亦足以抑遏人心此所以來張浚之疏也浚素與齊愈友而又潜善客也以潜善而忌李綱是以小人而忌君子也以張浚而攻李綱是以君子而攻君子其可乎豈非張浚初年之見耶詔迎太廟神主赴行在仍命東京留守宗澤移所居敵使于别館澤上奏曰臣不意陛下復聽奸臣之語浸漸望利為退走計營繕金陵奉元祐太后仍遣官奉迎太廟木主棄河東河北淮南陜西七路生靈如糞壤草芥略不顧惜又令遷敵使别館優加待遇不知二三大臣于敵人情欵何如是之厚而于國家計謨何如是之薄也臣朴愚必不敢奉詔詔答曰卿彈壓强梗保護都城深所倚仗但拘留金使未達朕心澤猶不奉詔又請上回鑾詔賜澤襲衣金帶元祐太后發京師將如揚州河朔之民憤于凌虐自結巡社乃定河北忠義巡社法召譙定伊川先生之高弟也張浚論李綱買馬之擾招兵之暴優立賞格乃更為奸乃落職奉祠中興大事記曰初論水災于宣和之時而為宣和大臣所斥建守城之䇿陳邀擊之謀于靖康之時而為靖康大臣所擠建炎之初公為首相慨然以修內攘外為己任而為潜善伯彥所沮一人之身而三定大䇿乃三受重謗然謗之所至名亦隨之使公之言用于宣和之初則都城必無潰迫之憂用于靖康則國家必無顚覆之危而後之用于建炎則中原不至于淪沒也以高宗即位之初召于貶所而任以台衡待之非不專而公亦以一身任天下之重邊防軍政已略就緒中山之功未成而謗書滿篋矣公之去就甚輕而關于天下之安危者甚重綱在位則措置兩河兵民稍集綱去則兩河無兵而強敵橫矣綱在位則僞臣叛黨稍正典刑綱去則叛臣在朝而政事乖矣綱在位則必主幸襄鄧之䇿必從宗澤還京之疏綱去則維揚有警而翠華南幸矣當時猶以靖康京城之禍建炎維揚之禍歸咎于綱小人之無忌憚一至于此哉綱薦張所招撫河北傅亮經制河東至是所言乞置司北京俟措置就緒即渡河而權北京留守張益謙奏以為招撫不當置司北京亮亦言經制司兵十萬人河外皆敵兵乞權置司陜府潜善頗沮又以兵少不如勿遣罷之綱言潜善力沮三人所以沮臣使不安戰臣每鑒靖康大臣不和之失凡事必與潜善等議而後行不謂彼乃設心如此乞歸田里陳東上疏詆潜善伯彥不可任李綱不可去歐陽徹亦上書詆用事者黃潜善汪伯彥奏論之並坐狂直棄市詔如淮甸冬十月上如揚州十一月張浚論李綱括馬招兵勒納之非且及于易詔令以庇翁彥國之罪捐金帛以資張政傳亮之費竄鄂州中興大事記曰張浚平生忠肝義膽不與秦檜共事不與敵俱生而初年之見反黨汪黃而攻李綱不已何哉使其反攻李之筆而攻汪黃豈不快公議哉善乎胡安國之疏曰賞罰政事之綱必先核實而核實必自大臣與臺諫始渡江以前所任相其賢否則有公論矣而言者獨攻綱為甚一言而罷相再言而罷職又再言而放于邊鄙又再言而投諸海島施于綱者亦甚峻矣然人心未服則以所毁亂真而不核實有如昔防江復令招刺諸州勸納發招討司未有以為非者在綱行之則謂失人心在他人行之則獨以為可此不核實者一也自仲尼大聖猶待三年有成而乃責綱以一時未聞報政孫覿常草降表貶薄二聖死有餘責得貶輕矣乃以為杜塞言路此不核實者二也綱既放斥于鄂渚澧陽之後若如言者所論國家宜少安矣而李成張遇丁進縱橫淮甸所在如織此不核實者三也敵陷京城邀請二帝乃何㮚操權郭京用事綱與逺貶不預戰守之謀而因欲黜綱前日回鑾之功指以為罪此不核實者四也綱本以建州禦敵守城之䇿為孝慈皇帝所知擢與機政而以為欺君要功不貸之罪此不核實者五也劫寨之事人以為姚平仲講于帷幄种師道李綱之所不與也而乃謂綱之用心欲置公于何地以激怒為不貸之罪此不核實者六也胡安國之疏如此然以親而庇翁彥國之罪以怒而抵宋齊愈之死此又不待核實而綱有餘責矣大臣之用心不可不公如此王倫使金與傅雱俱留金國詔非經三省密院不行十二月置講讀官上嘗取孟子論治道之語書之座右分路類省試以待親䇿以楊時為工部侍郎時入對首言自古聖賢之君未有不以典學為務以君德在是故也尋命兼侍講金分三道南侵尼瑪哈自雲中下太行將由河陽渡河攻河南斡里雅布與其弟烏珠自燕山內渡河攻山東羅索與其副薩哈自同州渡河攻陜西以燕山軍圍汴宗澤有備千里之地無糧可因遣兵保護汴梁以俟大軍北渡敵聞之斷河梁而遁羅索至河中府官軍扼河西岸不得渡乃由韓城犯長安蒲津軍潰尼瑪哈既犯河陽據泛水引軍而來命萬户尼楚赫分軍犯京西中原大震攻河南留守孫昭逺戰不利擁兵南去為叛兵所害少尹阮駿死之圍棣州守臣姜剛之拒守圍二十七日不拔而去又陷同州守臣鄭驤赴井死又陷長安帥臣唐重及楊宗閔桑景詢曹謂郭忠皆死之先是重度敵至以書别其父堯臣曰忠孝不兩立義當死國其父報之曰汝能捐軀徇國吾含笑入地矣陷濰州守臣韓浩死之又陷青州臨淄知縣陸有常死于陳知益都縣張侃千乘縣丞丁興宗亦死之千乘縣市民率土軍射士保甲及濵州亂兵葛進等擊敗之敵棄青濰而去又陷潁昌府守臣孫默死之又陷秦州引兵犯熙河陷鳯翔府又陷唐州掠其城而去又陷蔡州汝陽縣令郭贊罵敵死之又陷淮寧府守臣向子褒死之又陷均州金人攻掠陜西京東陷同州長安泰州鳯翔唐蔡淮寧均州八郡不能攻者汴京棣州乃棄青濰而去中興大事記曰祖宗百年廉恥禮義之化其所以涵養士大夫者至深逺矣然以熙寧以來羣小相師滅理窮欲六十年士大夫沈酣之餘心志潰爛不可收拾宜其禍變危迫而皆不知以為憂敗衄迎降而皆不知以為恥棄君叛父奉敵稱臣而皆不知以為辱也而兩河之帥守主將其為睢陽許逺顔真卿者不可勝數是雖人之秉彛不容泯沒亦祖宗所以涵養斯文之澤也所可惜者朝廷規模不立措置乖方當建炎之初河北惟失真定等四郡河東惟失太原等六郡其他固在也胡舜陟四鎮之說不行乎前李綱招撫經總之事復沮于後故當時無連橫合從相援之勢金兵方盛又非一州之所能敵既破一州又取一州使忠臣義士守孤城以待盡非金殺之也實朝廷殺之也觀徐徽言奏使土豪復故地使之世襲而金憚之則胡舜陟李綱之計不行豈不惜哉以劉珏為吏部侍郎衛膚敏中書舍人劉觀給事中是年八月杭州軍亂九月建州軍亂十一月密州軍亂十二月吉州軍亂戊申建炎二年春正月上在揚州金人陷鄧州安撫范致虛遁劉汲出戰死之括民間金幣如收括京城之法掠鄧汝金房四州之民以歸盜張遇焚真州尋陷鎮江王淵招降之山東羣盜蜂起潜善伯彥皆蔽匿不以奏及盜焚真州去行在六十里上亦不聞內侍邵成章上疏言二人之罪必誤國上怒詔成章不守本職轉言大臣竄吉州盜丁進犯夀春府守臣康允擊却之詔后族勿除從官太學生魏祐上書論潜善伯彥誤國十罪二月金人犯東京澤聞之曰滑州衝要必爭之地失之則京城危矣以鋭卒五千授張撝撝至滑州與金迎敵又遣王宣以五千騎往援未至撝再戰死之後二日宣至滑州與敵大戰敵夜濟河復邀擊之殺傷甚衆即命宣知滑州敵不敢犯其境金人遣兵自鄭州抵白沙驛距京才十里都人甚恐澤方與客對奕寮屬請議守禦之䇿澤不應諸將退布部伍撤弔橋披甲乘城都人益懼澤聞之命解甲歸寨曰何事張皇時劉衍劉達各將車二百乘在鄭滑間澤益選精鋭數千助之令張燈如平時民始安堵又遣部將李景良閻中立郭俊民領兵萬餘赴滑鄭遇敵大戰而敗中立死之郭俊民降敵景良遁去澤捕得景良斬之俊民與金將史姓者持書招澤澤謂俊民曰汝失利就死尚為忠義鬼今乃為敵游說何面目見人耶捽而斬之謂史姓曰上屯重兵近甸我留守也有死而已何不以戰試我而反以兒女語脅我耶又斬之澤三上表請上回鑾表曰京師乃太祖太宗一統之本根願以二百年基業為意早賜回鑾則天下皆知一人來歸盜賊屏息強敵寢謀臣若誤國一子二孫甘被顯戮翁彥國為經制使籍民輸建康修城磚數百萬其人踰䖍吉南安諸郡陸負水運率千錢致兩磚江西提刑留侑勸民出私財助國乃督責州縣以等第厚賦於民欲以求進民苦于此役知洪州胡直强奏罷之市易務乃熙寧初置及是言者以為所入不償所費遂罷之復端明殿樞密直學士募振華軍于河南北淮南以六萬人為額中山府自靖康末受圍至是三年乃陷陳亨伯冒圍入城固守呼總管使括城中兵擊敵部將沙振以衆寡不敵乃害亨伯後諡忠節三月以司馬光配饗哲宗石濠縣李彥先復陜州即以彥先知州事金人圍陜不克乃攻虢州陷之金人犯涇原吳玠敗之夏四月罷巡社金人復陷洺州士培奔大名府自二帝北狩兩河州郡外無應援內絶糧儲並為敵所取惟中山慶源保莫祁洺冀慈相保久而陷之馬廣聚鄉兵保慶源五馬山陰迎信王榛以歸奉榛總制諸山寨先以奏付宗澤以聞遣馬廣入見以信王榛為河外兵馬都元帥加廣為元帥府都總管潜善伯彥終以為疑廣行復令聽諸帥臣節制廣知事變遂以其軍屯大名五月詔擇日還京正字馮楫獻書于潜善力言未可恐金人再來或不可當宗澤招撫河南羣盜聚城下又募四方義士合百餘萬纍疏請上還京又言丁進有衆數十萬願守京城李成願扈從還闕即渡河勦敵沒角牛楊進等衆百萬亦願渡河且請修龍德寶録宫以備迎奉二帝不報澤請上還京至是凡二十餘疏言甚切又澤聞王彥聚兵太行山即以彥制置兩河彥所部勇士萬數面刺八字號八字軍彥方治軍約日越太原澤又上疏欲合諸將渡河潜善忌澤成功從中沮之因憂鬱成疾中興大事記曰自古未有內外不相應而成功者有張仲孝友主于內而後吉甫得以專征于外孔明欲出師于外則必任禕允于內建炎之初綱在內澤在外此正天生二人以開中興之治也使二人得盡行其志則必復君父之讎雪宗廟之恥伸神人之憤惜夫綱相則澤之志行綱去則澤之忠沮蓋汪黃二人既用事于中則宗澤安能措手于外二人既主幸東南之議則宗澤還京之請雖二十疏而何益縱使渡河而北指日成功亦安免後患哉嗚呼東京之地宗廟在焉陵寢在焉為人子孫烏可置祖宗而不問為人父母烏可棄遺黎而不思且向也元帥府方開之始宗澤請解京城之圍而伯彥等則謂不可使敵知元帥所在今也還京之請屢上而汪黃則謂上皇之子三十人今所在者惟聖體耳自外而觀汪黃之計可謂忠矣宗澤之計可謂危矣以義而論則君父不可視之如路人中原不可棄之如土梗天祚吾宋則將有主矣天所興者誰能敗之此豈汪黃乳嫗護赤子之術所能為哉澤之志不獲伸于前又不獲伸于後徒使後之人聞出師未捷身先死長使英雄淚滿襟之嘆而為之致無窮之恨科舉復以詩賦兼取金帥自鳯翔之敗涇州之敗尼瑪哈焚掠西京取平陸渡河以歸雲中羅索遂自馮翊渡河破潼關陷同華陜以歸於是知延安王庶遣將斷河橋又遣將屯龍水峽斷其歸路敵遂遁陷冀州權州事單某死之先是將官李政備守有方纍擊退金人一日敵已登城火其門政以重賞募死士撲之俄有數十人皆以濕氊裹身躍火而進大呼力戰敵遂敗走城賴以存政死而城失守賀師範戰于八公原死之敵陷相州守臣趙不試同家屬赴井死又陷德州都監趙叔皎死之又陷濟南府守臣劉豫降又陷東平府守臣權邦彥棄母遁又陷大名府守臣張益謙轉運裴億降敵曰城破乃降何也皆以提刑郭永不從為辭敵遣騎召永入尼瑪哈曰沮降者誰永曰不降者我敵欲用之永罵曰無知犬豕恨不醢爾以報國何說我以降乎敵并其家害之諡勇節陷延安府守臣劉選遁通判魏彥明死之先是敵陷府之東城而西城猶堅守敵知曲端與王庶不協併力攻鄜延庶在坊州乃自當鄜州來路遣龎世才等當延安來路庶御下太嚴曲端為都統常曰設曲端誤我亦當斬之端銜其語端駐兵于邠州庶趣其進兵不動庶退龍坊敵遂乘虛陷延安陷濮州守臣楊粹中及杜績死之又陷開德府守臣楊棣及楊彭年死之城中殺戮無遺宇文虛中為祈請使楊可輔副之劉誨王貺為通問使明年春金人並遣歸虛中曰奉命北來祈請二帝二帝未還虛中不可歸于是獨留金國張慤薨許景衡薨復閩浙市舶官增諸路役錢六月建州葉儂殺妻子縱火突城而出陷福州其後趙哲招降之秀州軍亂命張浚討平之秋七月宗澤卒澤為黃潜善所沮憂憤成疾疽發于背將沒無一語及家事但連呼過河者三遺表猶贊上還京云後諡忠簡召謝克用孫覿以杜充為東京留守盡反澤所為兩淮豪傑皆不為用中興大事記曰此澤去而東京之地不可守也宗澤在則盜可使兵杜充用則兵皆為盜矣充守東京則敵至維揚充守建康則敵至明州以充繼澤何異以淵代逖以姜維而續孔明之事功李綱罷而汪黃相于內宗澤死而杜充守于外天下事可知矣翟進在西京與敵夾河而戰屢破之充酷而無謀士心不附諸將多不安之馬廣王彥既還朝餘稍稍引去判官宗穎請歸持服楊進叛攻掠汝洛忽遣騎犯翟進營進墜馬為所害鑄御寶者三一曰皇帝崇國祀之寶二曰天下合同之寶三曰書詔之寶趙子砥歸自燕山得上皇御書以進且言金人講和以用兵我國斂兵以待和吾國與金國勢不兩立其不可講和明矣往昔契丹主和議女真用兵十餘年間竟滅契丹今復蹈其轍譬人畏虎以肉餧之食盡終于噬人若設檻穽以待之然後可以制虎矣已而賜對遂命知台州御史馬伸劾黃潜善汪伯彥不謹詔令廣市私恩黜陟不公政令不一壅塞言路毁法自恣妨功害能過則稱君善則稱已强狠自專務收軍情等罪詔伸言事不實責監濮州酒稅促使上道死于中路天下寃之親試舉人賜李易以下四百五十人及第密州獻芝草詔却之冬十月河北制置使王彥自東京赴行在上召見彥見潜善伯彥力陳兩河忠義民引頸以望王師願因人心向順大舉北征掎角破敵收復故地言極憤激大忤二人之意降㫖除閣門宣贊舍人免對知沛縣李膺言昨來經制司酒漕稅契頭子等錢所收至微所得至多倘復行之為利不細乃復經制錢十一月更四川茶法初成都府路轉運趙開言請罷𣙜茶及令漕司買馬朝廷擢開主管川陜茶馬開至成都效政和都茶場法即給茶引使商人即園户市之每斤所過征一錢往征一錢有半置合同場以譏其出入重私商之禁號合同場為茶市交易者必由市而引與茶必相隨違者抵罪至四年冬置馬踰二萬匹引息錢至一百七十萬緡壬寅郊祀昊天上帝奉太祖配就江都縣築壇行事十二月金人陷襲慶府有欲發孔子墓者誅之以黃潜善為左僕射汪伯彥為右僕射是時李綱既去宗澤已死大權入手二小人為相其事可知決幸東南無復經理中原之意中興大事記曰始也獨相綱已為汪黃所不悅繼而綱與潜善同相則必為潜善所排綱于此時懲宣和大臣不和之咎且欲與潜善共事豈知君子小人必無共事之理既並相汪黃而高宗猶望其同心然小人之同不過同惡相濟爾夫人主所職在論相而小人因革大臣用舍有不與焉詔百官言事吕頤浩上備禦十事續宋編年資治通鑑卷一
