body:
  text: 續宋編年資治通鑑編年類提要臣等謹按續宋編年資治通鑑十五卷宋劉時舉撰時舉里貫無考其結銜稱通直郎户部架閣國史實録院檢討兼編修官宋季三朝政要載史嵩之父喪去位詔以右丞相起復時舉為廪學生有與王元野黃道等九十四人上疏力爭一事其始末則未之詳也是書所記始髙宗建炎元年迄寧宗嘉定十七年當成於理宗之世而書末附論一條稱理宗撑拄五十年而後亡不可謂非幸云云其言乃出於宋亡以後似非時舉原文按舊本目録後有書坊題識一則稱是編繫年有考據載事有本末增入諸儒集識三復校正一新刋行云云則書中所附議論有元時刋書者所增入非其舊矣其中紀載雖以簡約為主或首尾未具於事蹟間有脫遺然如論張浚不附和議而不諱其黨汪黃攻李綱引秦檜之罪辨李綱之被謗逺謫而不諱其庇翁彥國陷宋齊愈之失褒貶頗協至公無講學家門户之見卷端有朱彛尊題詞稱其過於王宗沐薛應旗所撰殆不誣云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀續宋編年資治通鑑原序宋中興通鑑一十五卷通直郎國史院編修官劉時舉編史嵩之喪父以右相起復時舉為京學生與王元野黃道等九十四人太學生黃愷伯金九萬孫翼鳯等百四十四人武學生翁日善等六十七人宗學生趙子寰等三十四人上書爭之是亦慷慨之士也觀者嫌其太略然以視王宗沐薛應旗所撰斯條理過之矣小長蘆七十九老人朱彛尊題
