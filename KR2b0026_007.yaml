body:
  text: 續宋編年資治通鑑卷七宋劉時舉撰宋髙宗七辛已紹興三十一年春正月甲戌日有食之用牲於社丁丑雷癸未夜風雷雨雪侍御史汪徹言春秋魯隱公時大雨雷電繼以雨雪孔子以八日之間再有大變謹而書之今一夕之間二異交至隂盛也今臣下無姦萌戚屬無乖剌而又無女謁之私意者殆為敵國乎願陛下敕大臣當謹於備邊也丙申大雨詔賑給貧民楊存中罷兵權以趙密代之俊卿論鎮江都統制劉寶軍律不嚴裒刻過度乃責寶散官安置復給僧牒二月秦熺卒三月以何溥為翰林學士兼尚書以陳康伯朱倬為左右僕射上聞金人決欲敗盟乃令兩淮諸將各畫界分使自為措置置民社增壁積糧以吳璘戍武興姚仲戍興元王彥戍漢陽李道戍荆南田師中戍鄂渚戚方戌九江李顯忠戍池陽王權戍建康劉錡戍鎮江壁壘相望而襄陽獨未有備乃以吳珙以西兵三千戍襄陽吳珙尋被朝命襄陽不能自保則令退守荆渚珙以書遺大臣言荆南為吳蜀之門户襄陽為荆州之籓籬上流號為重地若棄之不守是自撤其籓籬也況襄陽依山阻江沃壤千里設若侵犯據山以為巢穴如人扼其咽喉守其門户則荆州可以髙枕而眠矣若欲保守荆州當自襄陽為扞守之計詔求言五月詔監司一歲按屬吏四人失按者議罰金遣使髙景山王全來賀正因道亮意求淮漢之地且言亮以九月北巡指取將相近臣議事當於八月至其國大率皆慢辭也并以淵聖皇帝凶問至上率羣臣發哀成服廟號欽宗陵曰獻陵內侍張去為隂阻用兵之議且陳退避之策或妄傳有幸閩蜀之計上意雅欲視師陳康伯奏曰敵國敗盟天下共憤今日之事有進無退若聖意堅決則將士之氣百倍願分三衙禁旅助襄漢兵待其先發然後應之俊卿言張去為竊威權撓成算乞斬之又屢薦張浚可用上曰陳俊卿敢言除兵部侍郎六月中丞汪徹言軍旅將起費用方繁宜條其不急以徇今日之務從之以劉錡為江淮浙西制置使節制逐路軍馬又以汪徹為湖北京西宣諭使置司鄂州又命李寶以舟師屯江隂防海道以杜莘老為殿中侍御史莘老入見上曰知卿不畏強禦故有此授自是用卿矣罷教坊彗出角金主亮徙汴亮行至南薰門外而雨暴至至承天門迅雷大風甚恐亮以劉萼為淮南統軍將二萬衆歷唐鄧以瞰荆襄又以張中彥為西蜀道統軍王彥章副之將五萬衆據秦鳳以窺巴蜀蘇保衡統水軍完顔正嘉努副之由海道將趨二浙餘兵亮自將焉八月竄王繼先籍其家金主亮母病亮往視之問以所苦母曰吾無他疾以皇帝逺征江南是吾病也亮大怒曰非朕母乃梁宋國王之小妾也遂命伊克雅蘇弒之劉錡進屯揚州命遣將王剛以五千人屯寶應又詔劉錡及王權李顯忠戚方各隨地分措置沿淮三處河口嚴為隄備時權在建康顯忠在池州方在江州九月辛未大饗明堂罷合祭奉徽宗配金將喀齊喀將五千餘騎入鳳州界侵黃牛堡守將告急於吳璘璘馳至殺金平遣將援之彥堅令軍用神臂弓射却敵吳璘又遣别將至寶雞渭河夜劫橋頭大寨破之乘勝破秦州即拜璘為陜西河東招討使以張超權光化軍超甫及郡金兵數百忽突入城超閉譙門令從者率郡人巷戰敵死者數千人乃引去金兵犯信陽軍告急於德安府先是成閔遣趙樽屯德安樽曰信陽德安之表裏即引兵赴之敵騎引去金主亮以其右丞李通為大都督內赫阿斯罕副之令先造浮梁於淮水之上亮自將南侵亮兵號百萬氊帳相望鉦鼓之聲不絶逺近大震冬十月朔詔親征四川宣撫使吳璘檄契丹西夏髙麗渤海韃靼諸國及河北河東陜西京東南路等諭金人渝盟劉錡自揚州進屯盱眙軍時錡病猶未巳尋自盱眙軍引兵次淮隂縣留劉汜貟錫守盱眙金人將自清河口放船入淮錡列諸軍於運河岸以扼之給諸路僧牒登仕告身市軍儲先是李顯忠提兵在壽春安豐之間欲回軍廬州徐觀其變至謝步聞敵已渡淮自峽山路渡大江以歸敵遂陷安豐及蔣州蔣即光也初避敵諱改焉而戚方自淮西引兵南渡初劉錡遣王權將兵迎敵逗遛不進再檄權往壽春權不得已僅發軍至廬州戍守故敵得渡橋以濟權棄廬州而遁敵兵至尉子橋姚興以一軍三千人力戰權置酒仙宗山上擁兵自衛不前興殺敵數百以無援而沒知廬州龔濤遁權退保和州尋又棄和州先奔采石陷無為軍守臣韓髦遁亮既渡淮令萬户蕭琦以十萬騎自花黶鎮由定逺縣取滁陽路至揚州琦至藕塘駐軍數日先以百餘騎犯清流關官軍無與敵者遂長驅入關直抵滁州守臣陸亷棄城去而蕭琦自滁州引兵至瓦梁扼滁河不得渡執鄉民歐大者問之大因記紹興十一年韓世忠以數百騎往定逺縣駭敵而回至瓦梁盡毁民居以為浮橋恐敵人效之乃答以有路自竹岡鎮可徑至六合縣琦從之俾為鄉導遂迂路半日故六合居民皆得逃去敵得城不入徑自山路趨揚州攻陷之知通州程邦弼聞揚州破即棄城遁敵退復還自講遷後樊城不修築翟貴王進以兵二百戍焉時吳珙在襄陽敵騎三千忽至欲奪浮橋徑至城下張訓通以百騎巡綽與敵遇擊之會繫橋未成敵不得濟二將引兵出戰俱死焉士卒半淹入江中至晚敵少挫其鋒遁去王權之敗報至中外大震上召楊存中同宰執對於內殿上諭以欲散百官浮海避敵陳康伯曰不可存中亦請率先將士北首死敵上喜遂定親征之議時有欲遣使詣敵以緩師者敷文閣待制曽幾聞之上疏曰遣使請和增幣獻城終無小益而有大害為朝廷計自嘗膽枕戈專務節儉整軍經武之外一切置之如是雖北取中原可也且前陛下降詔諸帥傳檄數金人君臣如罵奴𨽻爾何辭復與和也耶乃命義問視師以中書舍人兼權直虞允文參謀軍事檢討洪邁校書馮方並參議軍事義問至鎮江權立行府以楊存中為御營宿衛使左僕射陳康伯奏時當雨雪戰守諸軍暴露乞加優恤上乃詔總領所人各支絹一匹家屬在營者給以薪炭之直康伯等曰此誠受陛下挾纊之賜也吳挺向起敗敵於德順軍吳璘所遣也王師抵城下有秦世輔者與其父出降敵執其母妻招之世輔欲還其母云還亦死不還亦死等耳不若善事趙天子敵盡殺其母妻而不從也統制官朱勇被執不屈遇害髙師中力戰死之璘尋又遣王中正敗敵於治中寨又敗之於照城坡錡敗敵於皂角林初金人既得揚州即遣兵逐劉錡來爭瓜洲渡錡命部將賈林仲吳超等拒之於皂角林貟琦陷重圍下馬死戰數合部將王佐以步卒百有四人往林中設伏敵既入張弩俄發敵以運河岸仄非騎兵之利稍稍引去遂大敗之斬統軍髙景山俘數百人錡在瓜洲四日無不戰錡恐人心不固乃遣人自鎮江取妻子以安人心至是有詔令錡專防江上會錡病已劇遂肩輿渡江留劉汜以千五百人塞瓜洲渡方亮之南也枚數本朝諸將問其下孰敢當之者皆隨姓名而答如響至錡則莫有應者乃曰朕自當之順昌之役時亮年十八以萬户從軍錡之勝烏珠之敗亮所親見也故其出師也欲自當錡而卒不果紹興乙亥敵使館都亭驛與其副飲酒其副不肯飲訶之曰酒中安得有劉四廂何不飲有使敵者見其廏卒怒詈馬之不食草者亦云蓋其威名素著於南北云先是寶舟師至東海縣時敵兵已圍海州寶麾兵登岸敵驚出意外亟引兵於是魏勝出城迎寶寶遣辨士四人招納降附時山東豪傑王世修輩皆各以義旗聚衆爭應為援寶與子公佐引舟師至密之膠西石臼島而敵舟已出海口泊唐島相距止一山候風即南不知王師之猝至也寶伺敵未覺遣其將曹洋黃端禱於石臼神祈風助順忽風自南來衆喜爭奮引帆握刃俄頃過山薄敵鼓聲震蕩敵驚失措敵帆皆以油纈為之彌亘數里忽為波濤捲聚一隅窘促淆亂無復行次寶命以火箭射之煙焰隨發延燒數百有不及者猶欲前拒寶命健士躍登其舟以短兵擊刺殪之舟中其餘簽軍皆中原舊民脫甲而降者三千餘人獲酋首完顔正嘉努等六人斬之惟統軍韓保衡未發舟不可獲其餘自經死得獻議造舟人倪詢等皆淮浙姦民且為敵鄉道者又獲其統軍印與偽詔文書器甲糧斛以萬計寶欲乘勝以進而聞金亮已濟淮遂旋師駐東海視緩急為援遣小舟奏捷既至上命降詔奬除寶清海節度沿海制置使兵部侍郎陳俊卿言敵擾淮甸幾兩月矣前日瓜洲雖失利不旋踵而有捷音既而李寶舟師又大捷此天祐聖德敵宜滅也但荆襄為吳蜀之咽喉敵自春以來種糧草於唐鄧修營寨於西京蓋欲窺伺屬吾有備遂改圗兩淮而其糧草為王師所焚今敵騎盡過淮東恐其知成閔之師順流東下必留二三萬騎往來兩淮而出吾不意復窺荆襄願詔大臣與上流諸將謀所以守之又王師分戍長江巨海備衆而隙多今惟患兵少宜於閩廣厚賞以募舟師此皆不可緩也於是上乃命寶措置舟師十一月以吳芾為殿中侍御史芾言今日之事有進無退若有葸縮之計則大事去矣陳俊卿間為上言浚忠義且兼知文武可付以閫外臣素不識浚雖聞其嘗失陜復散淮師而許國之心白首不渝今杜門念咎老而練事非前日浚也願陛下勿惑讒謗雖未付以大柄且與一近郡以係人心庶緩急可以相及上納其言是春許浚自便俊卿又屢言浚可用上曰卿欲用浚為何官俊卿曰此在陛下上曰浚才疏使之帥一路或有可觀若再督諸軍必敗事俊卿曰人皆以浚為可用陛下何惜不一試之上首肯之時浚責居永州除建康府先是劉錡病篤葉義問以李橫代之趣令過江時敵以重兵直搗瓜洲橫引諸軍迎戰汜提本部兵先走橫以孤軍不可當亦遁失其部統制印而敵鐵騎掩至江上魏俊王方戰死柳林中皆金瘡被體汜性驕傲不習軍事至是卒敗金亮為內變所撓於是親統細軍駐和州之雞籠山臨江築壇刑馬祭天必欲由采石而渡朝廷詔王權詣行在以李顯忠代之命虞允文趣顯忠交權兵時顯忠未至王權所留水軍車船咸在而諸將未有統屬允文自建康來因使人督之敵舟漸近我軍用海鰍船迎擊士皆死鬬敵舟多沉溺遂不能濟敵縱火自焚其舟走瓜洲渡邵宏淵先亦敗敵於真州之胥浦橋是時王宣又遣汲靖敗敵於蔡州之確山敵犯陜州任天錫敗之成閔淮東路制置兼京西河東淮北四路招討使吳拱湖北京西路制置兼京西北路招討使李顯忠淮西路制置兼京畿西路淮北路招討使亮已聞李寶由海道入膠西焚其戰艦而荆鄂成閔諸軍方順流而下亮愈忿乃回揚州召諸酋約三日畢濟過期盡殺之初亮肆虐既久宗族大臣悉被斥而舊臣如張通古孔彥舟輩亦皆坐死國人莫有固志及將用兵又借民間稅錢五年民益怨憤於是中原豪傑並起大名王友直濟南耿京太行陳俊倡集義衆而契丹之後耶律沃赫亦興於沙漠諸軍已有殺亮之謀矣及葛王裒立有傳赦文至軍中者人心益搖於是諸酋遂相與定謀弒亮而歸裒然所謂紫茸細軍者衛之甚嚴酋衆因謂細軍曰淮東子女金帛皆逃在泰州我輩急渡江汝輩何不白帥主往取之細軍欣然共請亮從之於是細軍去者過半乙未諸酋集兵萬餘人控弦直入亮寢帳左右諸兵散走諸酋射帳中矢下如雨亮即死并殺其妃侍與謀事者十餘人紫茸軍陷泰州統制王剛遁十二月金人來議和且移牒云正隆失德無名興師兩國生靈枉被塗炭已從廢殞見議班師各務戢兵以圗舊好上曰大酋既已誅夷餘皆南北之民驅迫而來彼復何罪今即日襲逐可使隻輪不返然多殺何為但檄諸將迤邐集師會京畿收復故疆撫定吾人足矣陳康伯請率百僚稱賀上曰未須爾候到汴京與羣臣共慶茨湖在漢江之南與光化軍相對至是金人以舟渡欲攻襄陽會風勢不利不得著岸兵校史俊登舟麾却之李顯忠敗之於全椒楊欽尋敗之於洪澤鎮而顯忠又敗之於楊林渡翼日金兵乃退戊申上親征湯思退為行宫留守先是上曰此行中宫及內人不往止與建王行頒令遍識諸將爾赦新復州軍起居舍人權直學士院劉珙草制略曰兹強敵之干誅幸上天之悔禍爰整徂征之旅坐揚耆定之功元惡就屠餘黨悉潰重念中原之衆久淪異域之風頭顱難保於淫刑閭里悉空於重斂宜推在宥咸與維新自江上用兵珙獨在禁林一時詔檄多出其手詞氣激烈讀者感厲上至無錫縣宰執奏淮東金人已遁去淮西尚餘三萬衆據和州陳康伯等依旨撰到招安旗榜不惟諸國之人雖女真亦一概與補官上曰彼雖敵國亦人也比引見所招捉到金人朕亦悉貸死蓋首惡止完顔亮一人耳若概殺之朕不忍為也是歲籍鄉兵於是知荆南府續觱請復義勇民兵其法取於主户之雙丁每十户為甲五甲為團甲團皆有長又擇邑之豪為總者歲於農隙教以武事而官給其糧其後隸於籍者至七八千人又武昌令薛季宣亦求得故陜西河北弓箭手保甲舊法五家為保五保為甲六甲為隊隨地形便則合為總不以鄉為限總首副總首領焉官族亡族富族皆附保蠲其身俾輸財供總之小用諸總必有射團民暇則集無蚤暮之節盡禁蒲博獨許以擊刺角勝五日更至縣庭閲其尤者勞賞之旗幟總别為色諸鄉皆置樓盜發伐鼓舉烽以為號召瞬息遍百里葛王裒至燕京渤海軍立葛王裒於遼陽聞亮死遂入燕京乃諡亶為閔宗以亮為海陵王諡曰煬壬午紹興三十二年春正月朔戊辰日有食之上至建康張浚迎謁道左衛士見浚復用至以手加額浚見上言國猶身也元氣充則外邪逺朝廷元氣也用人才修政事治甲兵惜財用皆壯元氣之道上嘉納之復升江隂縣為軍黃中請太廟遷翼祖神御而祔欽宗詔依二月以虞允文為川陜宣撫使允文奏云今防秋在近而官軍分戍捨德順一帶地廣兵稀入寇之路不一如官軍在德順守七盤𣙜山之險而秦隴一帶通仙人原者不一見今仙人原全無官軍守關又如官軍在鳳州守散關和尚之險而南山子午谷一帶路通洋州者不一見今南山亦無官軍守關見與吳璘商量措置御史吳芾言建康可以控帶襄漢經理淮甸大駕宜留建康以繫中原之望若還臨安則西北之勢不能相接時以欽祔廟乃還臨安金人犯汝州吳珙遣將擊走之王庶又敗之於虢州東言者謂淮揚合肥蘄陽襄陽為四鎮以在江北者為屬城各招弓箭手二萬人人授良田百畝增城浚隍農戰交修依陜西沿邊故事行之又京口建康九江江夏公安建為五帥各屯二萬人列置烽燧益修樓船輔以天險之阻此為長久之計詔益就措置閏二月吳璘復大散關先是金人既失秦河等州乃堅守大散關以扼王師璘遣楊從儀等攻下之遂分兵據和尚原敵退守寶雞縣璘尋又遣姚仲攻德順軍未下璘恐士有惰志即自秦馳赴率數十騎繞城傳呼城中之人欲識璘面不發一矢敵氣自索既戰又為我軍所敗遂遁去璘入城父老擁拜馬首幾不可行三大將之出也興州路得秦隴環原熙河蘭會洮州積石鎮戎德順軍凡十二郡金州路得商虢陜華州凡四郡獨敵以重兵扼鳳翔故大散關之兵未得進金人陷河州驅老弱數萬屠之選強壯數千充軍焚蕩其城而去祔欽宗於太廟十一室劉錡卒三月遣使措置堡寨屯田洪邁以中書舍人假翰林學士充賀登位使金人陷懷寧府守臣陳亨祖登城督戰中流矢死其母及家五十餘人皆死之是春淮水溢中有赤氣如凝血夏四月詔近臣陳防秋事宜詔以楊存中為兩淮宣撫使以劉珙不書録黃卒罷乃命張浚措置江淮浚出入將相三十年素為士卒所畏愛至是復總軍政皆樂為用汪徹宣諭荆襄還除參知政事張震為殿中侍御史張子益大敗金人於石湫堰陳俊卿申嚴出軍逃叛法時復議和以三招討司結局而為三衛司而命成閔主管殿前衙司李顯忠馬軍司吳珙步軍司復熙州六月賜皇太子瑋名眘立為皇太子追封皇兄子稱為秀王丙子上內禪皇太子即皇帝位太上皇帝居德壽宫大赦赦文云凡今者發政施仁之目皆得之問安視膳之餘天下誦之以龍大淵為樞密副都承旨求直言詔百官輪對召張浚浚入見賜坐降問除江淮宣撫使張震奏近日有飛蝗自江東入湖州界秋七月詔曰敵人來索故禮從之則不忍屈辱不從則邊患未巳中原歸正又源源不絶納之以東南力不能給否則絶向化之心宰執侍從臺諫各宜指陳定論以聞命汪徹視師湖北京西珙還張掄使金回見張浚具言金不禮我使狀且令稱陪臣浚謂不當復遣使而史浩議遣使報金以登寶位浚請毋庸再遣竟遣珙行至境金責舊禮不納而還戊申地震大風拔木八月上太上皇為光堯壽聖皇帝皇后為壽聖太上皇后追册皇后郭氏九月封皇子愭鄧王愷度王惇恭王上初御經筵講尚書周禮進讀三朝寶訓詔舉監守郡守冬十月吏部侍郎凌景夏言側聞仁宗慶厯三年命王洙歐陽修編定勳臣名次得二百四家徽宗再編勳臣一百一十六家臣願明詔添入元祐靖康建炎以來有合籍記者編纂成書子孫咸有甄録詔委編修聖政所接續編纂以王之望為川陜宣撫使詔館職學官祖宗設此儲養人才朕亦欲待方來之秀不可定員陸遊尹穡召對稱旨並賜出身十一月限內侍員以二百人為額十二月令諸路帥臣監司具部內知州臧否連銜同奏史浩論樞密院合令宰臣兼使事乃以陳康伯兼樞密使命近臣條陳時務金人以璘之精兵皆在德順遂力攻之會張浚再起宣撫江淮將命諸將出犄角之師且遣舟師自海道搗山東以分其勢時朝論主和上以手札命璘罷德順軍屯寮屬交諫曰奈何退師璘以主上初政有詔不敢違倉卒引退金人乘其後正軍三萬得還者僅七千人偏禆將佐所存無幾上尋悔之續宋編年資治通鑑卷七
