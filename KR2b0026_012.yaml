body:
  text: 續宋編年資治通鑑巻十二宋劉時舉撰宋寜宗一乙夘慶元元年春正月丁亥蠲兩淮租税黎州蠻寇邊詔兩浙淮南江東路荒歉諸州收養遺棄小兒以隂雨賑濟行在貧民尋詔釋大理三衙臨安府兩浙路杖以下囚丙辰白虹貫日二月詔兩浙諸州勸民耕墾荒田詔帥臣監司嵗終考郡守臧否以聞趙汝愚罷相右正言李沐奏乞罷趙汝愚政柄以尊安天位杜塞姦源是日汝愚竟出浙江亭待罪詔宣押赴都堂治事沐又再上書汝愚遂罷相章穎徐誼上疏乞留汝愚李祥楊簡坐汝愚黨並罷太學生楊宏中等六人上書竊見諫官李沐論前相趙汝愚所為乖戾隨即罷去若慮陛下父子之際懐不自安故黜汝愚以安天下亦未為過如沐所言則以為汝愚自居同姓數談夢兆專政擅權欺君植黨殆將不利於陛下以此加詆其實不然汝愚之去中外咨憤而言者以爲父母歡呼䝉蔽天聽一至於此章穎發於中激力辨其非即遭斥逐既而祭酒李祥博士楊簡相繼抗論毅然求去一旦祥有補外之命惡其與簡扶植正論潔身而去極力擠排同日報罷六館之士拂膺憤怨涕泣而相告曰使二人者茍有一毫為已之私豈肯自附於已去之宰相而犯虎豹九關之怒哉今李沐自知邪正之不兩立而公論之不直於已乃欲盡覆正人以便其私必託朋黨以罔陛下之聽臣以二人之去若未足惜殆恐君子小人消長之機於此一判則靖康已然之騐何堪再見陛下獨不念去嵗之事乎人情驚疑變在朝夕當是時假非汝愚出死力定大議使陛下得以成夀康皇帝揖遜之志行孝宗皇帝未舉之喪雖百李沐罔知攸濟當國家多難汝愚方位樞府秉兵柄指揮操縱何向不可尚不於此時為利今朝廷清明上下定安乃有異志乎願陛下念汝愚之忠勤察祥簡之非黨灼李沐之囬邪竄李沐以謝天下還祥簡以收士心詔宏中等罔亂上書扇揺國是各流五百里中書舍人鄧馹言臣仰惟國家開設學校教養士類徳至渥也自建太學以來上書言事者無時無之累朝仁聖相繼天覆海涵不加之罪甚者押歸本貫或他州聽讀而已紹熈間有布衣余古上書狂悖若以指斥之罪坐之誠不爲過太上皇帝始者震怒降㫖編管已而臣寮論奏竟從寛典陛下今日編管楊宏中等六人若以扇揺國是非之則未若指斥乗輿之罪大也以六軰言之則一夫爲至寡也聖眀初政仁厚播聞睿斷過嚴人情震駭所有録黄未敢書行是日有㫖李沐除右諫議大夫劉徳秀除右正言知臨安府錢象祖捕諸生押送貶所未㡬馹罷出知泉州侂胄既誅有㫖褒録上書之士宏中衜皆循一資端朝仲麟各免文解一次傳已死以束帛賜其家吕中曰父有天下傳歸於子此古今之常也後世以人臣往往貪天之功以爲已力非小人之尤者乎嘗聞哲廟之立本宣仁保祐之賜與諸大臣建請之功羣憸矯誣乃以定策歸功蔡確而上謗宣仁下累王珪遂為元祐大臣不可解之祸其往轍可鍳矣今我寜考纂承大統盖慈福宫定計於内趙忠定諸臣効賛於外侂胄何人夤縁戚里蒙蔽朝廷既攘奪其功掩為已有猶且附㑹言章竄之於必死之地亦獨何心哉然則確與侂胄其罪俱不勝誅矣余端禮兼參知政事四月為右丞相京鏜知樞宻院事己夘雨土三月丙戌朔日有食之庚寅太白經天命侍從等官集議江南松江諸州行鐵錢利害條具以聞夏四月丁巳太府寺丞吕祖儉上疏乞留汝愚併論朱熹彭龜年不當逐語侵韓侂胄故也中書舍人鄧馹封還録黄詔祖儉志在無君其罪當誅姑從竄斥乃安置韶州尋改吉州都城大疫詔戒勵風俗時知名之士罷斥相繼人情洶洶韓侂胄患之侍御史楊大法右正言劉徳秀乃乞降詔以國是尊君中道等事訓飭在廷有不如詔者重置典憲詔乃直學士院傅伯夀所草也伯夀則奴事侂胄𨽻人蘇師旦致身通顯至是草詔以詆善類丙午置廣惠倉詔諸路提舉司置修胎養令劉徳秀上言邪正之辨無過於真與偽而已彼口道先王語而行如市人所不為在興王之所必斥也昔孝宗垂意規恢首務核實凡虛偽之徒言行相戾者未嘗不深知其奸臣願陛下以孝宗為法考核真偽以辨邪正詔下其章庚午徳秀又劾國子博士孫元卿太學博士袁燮國子正陳武皆罷去司業汪逵入劄子辨之徳秀以為狂言逵亦罷己未復置臺諫言事簿庚午詔三衙江上諸軍主帥將佐舉自代一人嵗舉所知二人癸酉命韓侂胄為樞宻都承㫖固辭乃拜保寜軍節度使提舉萬夀宫初徐誼嘗告汝愚以節度使畀侂胄汝愚不許至是建節秋七月丁酉御史中丞何澹上䟽論專門之學流而為偽空虚短拙變詐沽名願風厲學者專師孔孟不必自相標榜詔榜朝堂後七日吏部郎官麋師旦亦建言請考核真偽未㡬遷左司員外郎時有張貴謨者指論太極圖説之非澹又上䟽論在朝之臣大臣既熟知其邪正之迹然不敢白發以招報復之祸望明詔大臣去其所當去者吕中曰我朝自王安石以新經破舊説凡學校科舉之間皆以王氏之經從事士用新進國尊新法而天下自是多事矣孝宗皇帝崇尚伊洛之學一時明師大儒相繼而奮張栻在湘朱熹在閩吕祖謙在浙皆推明是學以續孔孟正脉之傳天下學者翕然從之得其統者互以傳授凡巖谷草野之問皆出一轍學校科舉取人士大夫立身事君無不源流於是學之中涵養陶成士習粹美自小人用事摧靡道學而名之以偽海内之士瀾倒風從不惟禮義亷耻有所不顧而學士大夫之衣冠亦更變以趨時未幾異説横興兵端驟起非朝廷慨然鋤去大奸以復正學幾為東南不可解之祸師道不立其流弊乃至此哉曩者紹興之前一時風俗之好尚為士者喜言時政為吏者喜立功名誠不能無所偏而執事懲之過甚遂一舉而厭薄之稍自好者斥以偽學欲自立者號以朋黨從是世俗毁方為員變真為佞而流風之弊有不可勝言者矣何澹復力攻趙汝愚乃落職罷祠十一月責授寜逺軍節度副使永州安置徐誼坐言汝愚亦貶南安軍明年汝愚卒於永州汝愚既責道過衡州已病又為守臣錢鍪所窘遂自服藥而卒天下寃之訃聞有㫖追復元官許歸葬中書舍人汪義端繳還復官之命從之時有廸功郎趙師古者上書乞斬汝愚事雖不行然侂胄之黨以汝愚有定策功惟恐其復進故當時謂汝愚不死事固不可知也己亥太白晝見八月己巳詔内外諸軍主帥條將佐士卒器械船艦可用與否及控扼防守之策以聞都城水以久雨决繫囚冬十月乙丑陞潜藩府以秀州為嘉興府舒州為安慶府嘉州為嘉定府英州為英徳府十一月己酉雨土戊戌加上帝后尊號夀聖隆慈備福太皇太后尊號加惠慈二字太上皇帝聖號曰聖安仁夀太上皇后尊號曰仁夀命宰執大閲庚戌何澹言薦舉弊是月詔諸司連銜薦舉十二月朱熹上䟽辭職名詔依舊秘閣修撰仍舊宫觀丙戌慶元二年春正月戊子雷庚寅余端禮為左丞相京鏜為右丞相鄭僑知樞宻院事謝深甫叅知政事何澹同知樞宻院事京鏜自上登極與侂胄深交遂為執政劉徳秀論留正四大罪其首云已招引偽學以危社稷乃落職罷祠韓侂胄本武人志在招權納賄除不附已而已不能巧為説以擠善類也而士大夫嗜利無耻或素為清議所擯者乃敎侂胄言凡相與為異者皆道學人也隂疏姓名授之俾以次斥逐或又為言名道學則何罪當名曰偽學盖謂貪黷放肆乃人真情其亷潔好修者皆偽也於是憸壬險狠猥薄無行之徒利其説之便攘臂奮袂以攻偽干進而學禁之祸酷矣二月知貢舉葉翥倪思劉徳秀奏論文弊上言偽學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞將語録之類盡行除毁是科取士稍渉義理悉見黜落六經語孟中庸大學之書為世大禁矣六月張釡請申禁偽學中書舍人汪義端引唐李林甫故事以偽學之黨欲盡除之一時號為君子無不斥逐太皇太后聞而非之乃詔臺諫給舍論奏毋及舊事務在平正以副朕救偏建中之意御筆既出韓侂胄及其黨皆怒時劉徳秀為諫長與察官張伯垓等上疏言繼自今舊奸宿惡或滋長不悛臣等不言則誤陛下之進用言之則礙今日之御札若俟其敗壊國事如前日而後進言則徒有噬臍之悔三者皆無一而可望下此章播告中外令舊奸知朝廷紀綱尚在不至放肆從之尋詔改不必更及舊事為不必專及舊事自是侂冑與其黨攻治之志愈急矣御筆之出也黄黼為殿中侍御史獨上言治道在黜其首惡而任其賢使賢者不失其職而不才者無所憾故仁宗嘗曰朕不欲留人過失於心此皇極之道也至於前事有合論列事體明證有關國家利害者臣不敢不以正對䟽奏黼竟徙他官未幾罷去而姚愈遷殿中侍御史八月丙辰太常少卿胡紘建言比年偽學猖獗圖為不軌近元惡殞命羣邪屏迹或者議取前日偽學之姦黨次第用之望宣諭宰執權住進擬後二日遷知起居舍人十一月監察御史沈繼祖奏朱熹剽竊張載程頥之餘論以喫菜事魔之妖術以簧鼓後進張浮駕誕私立品題收召四方無行義之徒以益其黨伍相與餐麄食淡衣裒帶博或㑹徒於廣信鵝湖之寺或呈身於長沙敬簡之堂潜形匿迹如鬼如魅及不忠不孝不仁不義不公不亷等乞褫職罷祠其徒蔡元定佐熹為妖乞送别州編管詔朱熹落秘閣修撰罷宫觀竄元定於道州侂胄欲論朱熹無敢先發者胡紘鋭然任責物色無所得經年醖釀章疏乃成㑹建禮樂之議遷太常少卿紘遂以藁授繼祖云吕中曰治平以前臺諫之所彈擊出於議論之公熈豐以後臺諫之所彈擊出於觀望之私王吕用事其所惡者蘇軾孔文仲也故李定謝景温為之鷹犬章蔡弄權其所惡者元祐諸君子也故張商英來之邵為之鷹犬秦檜賣國其所惡者岳飛張浚也故万俟卨何若為之鷹犬今侂胄擅命其所惡者非道學之名儒乎而李沐沈繼祖輩之所彈劾一則曰偽學二則曰偽黨是亦侂胄之鷹犬耳復置編修勅令所提舉官三月己亥皇弟柄封呉興郡王孝宗之喪上實以嫡孫行三年服監察御史胡紘言皇帝為孝宗喪當服期詔侍從百官議釋服吏部尚書葉翥等言請以六月六日大祥禮畢皇帝及百官並從吉服七月一日皇帝御正殿饗祖廟將來禫祭令禮官檢照累朝禮例施行四月庚戌詔羣臣所議雖合禮經然非朕追慕之意丙午上慶元㑹計録傅伯夀言國子生員多濫請自今職事官期親釐務官子孫乃得試補從之夏四月甲子余端禮罷壬申何澹參知政事葉翥簽書樞宻院事乙亥増置監察御史一員五月不雨辛夘賜舉人鄒應龍四百九十有九人甲午減諸路折帛和買錢三年建華文閤奉藏孝宗皇帝御集甲辰改慈福官為夀祠宫六月乙丑令監司帥守各於嵗終以所部縣令分臧否上中下三等合平而為七次春上奏頒之考功取㫖陞擢丙子皇子埈生至八月薨追封兖王諡曰冲惠秋七月丙戌以生皇子詔諸路死罪囚釋杖以下流人吕祖儉等量移内郡太學生楊宏中等各押歸本貫聽讀戊子劉徳秀請付檢正都司考核守臣所陳便民五事取其近情合理者以聞八月戊戌韓侂胄特加開府儀同三司萬夀觀使九月丁亥復分利州為東西路冬十月戊申上冊寳於慈福夀康宫辛亥冊皇后韓氏甲戌大閲十一月庚寅上詣夀康宫上太上皇帝寛恤詔令壬辰京鏜上孝宗淳熙寛恤詔令韓侂胄為其父韓誡請諡誡乃神宗外孫也娶憲聖皇后女弟積官横行承宣使未嘗更歴事任時黄唐為考功郎言其不可因求去遂命館職官一員暫權考功遂諡誡曰忠定丁巳慶元三年春正月壬寅樞密鄭僑罷謝深甫兼知樞密院事二月神宗玉牒髙宗實録成大理司直邵裒然請詔大臣自今權臣之黨偽學之徒不得除在内差遣詔下其章復紹熙陞差將校法委主帥選擇審覈保明三月建東華門竄内侍王徳謙上即位徳謙驟遷承宣使是春徳謙求建節上許之徳謙乃薦呉宗旦為刑部侍郎直學士院宗旦為徳謙草制且引天寳同光故事為比臺諫交章遂寢其命言者以宗旦交結徳謙坐追三官又劾徳謙為人求官贓以鉅萬計嘗以導駕燈籠自奉服食擬乗輿獄未成降為團練使使居撫州十二月安置汀州禁浙西圍田詔有司奏讞議罪不當者論如律夏四月丙午雨土旱乙丑雨雹閏六月甲戌内出銅器付尚書省毁之民間並赴官收賣甲子論留正共引偽學之罪貶邵州大奚作亂秋八月戊子復置嚴州神泉監甲午均諸路職田九月壬寅以旱詔四川制置縂領諸司蠲放民賦乙丑令帥臣監司臧否郡守詔監司部守薦舉改官並於奏牘前甘結聲説非偽學之人秋當大比漕司前期取家狀必欲書以不是偽學五字時有柴中行為撫州推官獨申漕司云自幼習易讀程氏易傳未委是與不是偽學如以為偽不願考校士論壯之十二月知綿州王沇乞置偽學之籍仍自今曽受偽學舉薦關陞及刑法亷吏自代之人並令省部籍記姓名與閒慢差遣從之偽學黨逆得罪者凡五十九人宰執四人趙汝愚留正王藺周必大待制以上十三人朱熹徐誼彭龜年陳傅良薛叔似章穎鄭湜樓鑰林大中黄由黄黼何異孫逢吉餘官三十一人劉光祖吕祖儉葉適楊芳項安世沈有開曽三聘㳺仲鴻呉獵李祥楊簡趙汝讜趙汝談陳峴范仲黼汪逵孫元卿袁燮陳武田澹黄度張體仁蔡幼學黄灝周南呉柔勝李􅐉王厚之孟浩趙鞏白炎震武臣三人皇甫斌危仲壬張致逺士人八人楊宏中周端朝張衜林仲麟蒋傅徐範蔡元定吕祖泰太學生削何澹名治其罪冬十一月癸酉雷丙申赦十一月辛丑上孝宗徽號加紹統同道冠徳昭功八字是日太皇太后崩於慈福宫詔報期明年加諡憲聖慈烈皇后癸夘日南至祀天地于圜丘赦天下壬子車駕自慈福宫還大内十二月丙子始御正殿丁丑紹興府以太后殯宫故蠲貧民身丁折帛絹綿錢甲申雨土詔銓試依舊制二人而取一革樞密院以密白補官戊午慶元四年春正月京尹趙師􅋷除工部侍郎侂胄妻早死有四妾皆封郡夫人其次十人亦有名位去嵗有獻北珠冠四枚者侂胄喜以遺四夫人而十人慍侂胄患之師􅋷時守臨安亟出十萬緡市北珠為十珠冠乗侂胄入朝未歸遣人致饋十人者大喜分持而去侂胄歸十人者咸來致謝遂以翼日都市行燈羣婢皆頂珠冠而出明日語侂胄曰我曹夜來過朝天門都人以為稀有咸聚觀焉郡王柰何不與趙大卿轉官耶翼日又言之故有是命侂胄嘗與衆客飲南園過山莊指其竹籬茆舍而謂曰此真田舍間氣象所惜者欠鷄鳴犬吠耳少焉有犬嘷於叢薄之下亟遣視之京尹趙侍郎也侂胄大笑其後京尹坐他事罷諸生為詩誚之有也曽學犬吠村莊之句即指此也丙寅葉翥同知樞密院事七月罷丁夘兩浙江淮荆湖四川民流詔有司舉行寛恤之政二月辛未詔兩省侍從臺諫各舉所知一人毋舉宰執子弟親黨三月己丑以憲聖殯宫之役蠲臨安紹興府租税有差經筵進讀三朝寳訓夏五月己亥韓侂胄為少傅賜玉帶以朝己酉詔禁偽學禁女冠毋入大内秋七月罷𣙜茶丁逢入見極論元祐建中調停之害且引蘇轍任伯雨之言為證時薛叔似葉適坐汝愚黨久斥皆起家為郡故逢有是言宰執京鏜何澹大然之翌日除軍器監八月久雨命决繫囚丙子謝深甫知樞密院事兼參知政事許及之同知樞密院事庚辰白氣亘天丙戌以太上皇帝聖躬清復詔詣夀康宫上夀九月壬寅太白晝見癸夘太白經天京鏜上重修勅令格式申明詔頒天下是月詔造新厯冬十二月丙戌再蠲臨安府身丁錢是嵗育宗室與愿于宫中己未慶元五年春正月蔡璉誣告趙汝愚定䇿時有異謀乃議送大理侂胄欲問彭龜年以實其事中書舍人范仲藝謁侂胄語之曰章確之權不為不盛然至今得罪於清議者以同文之獄故耳相公胡為蹈之侂胄曰某初無此心京鏜劉徳秀實主其議既而臺諫官連䟽有請詔以累經赦宥於是彭龜年追元官勒停曽三聘追元官而璉補進義副尉乙夘果州學官王莘罷辛酉初命漕臣無出身者勿差官考試壬戌建玉堂二月乙丑胡紘罷庚午雪癸酉白氣亘天乙酉諫議張釡劾劉光祖佐逆不成蓄憤懐姦欺世罔上五罪詔光祖落職房州居住先是光祖撰涪城學記有世方以道為偽而以學為棄物夫好惡出於一時是非定於萬世學者盍謹所先入以待豪傑之興此語聞於朝乃有是命三月罷監司臧否郡守之制戊申四川行對補錢引法夏四月用察院程松言詔大理評事已改官未歴縣人並令親民一次著為令五月壬辰朔新厯成戊戌親試舉人賜曽從龍等四百十有二人及第丁酉以久雨民多疾疫命臨安府賑恤之壬子命諸州學置武士齋舍六月丁逢罷是夏盜竊太廟金寳秋七月癸丑劉徳秀罷甲寅禁髙麗日本商旅博易銅錢八月癸亥白氣亘天辛巳太廟太祖夾室柱生芝上過夀康宫上太上皇帝夀戊子立沿邊諸州武舉取士法冬十月丙子金使來賀瑞慶節陳自强上政目三十事十一月己丑詔復右司一員十二月庚午建安仁宅惠濟倉庫於廣東水土惡弱諸州以給士大夫之罪而不能歸者是月編慶元寛恤詔令賑諸州水灾庚申慶元六年春正月己亥皇子坦生二月詔諸路雜犯死罪以下囚釋杖以下以皇子生故也己丑雨土戊寅上太上皇帝玉牒乙酉雪閏二月庚寅京鏜為左丞相謝深甫為右丞相何澹知樞密院事兼參知政事乙巳留正致仕辛亥呉曦以殿前都指揮使為昭信軍節度使詔許用前宰執舉狀為職司以待執政之子弟焉三月甲子朱熹卒熹以去年四月致仕至是卒於建陽之考亭熹平居惓惓無一念不在於國聞時政之失則寂然有不豫之色語及國勢之未振則感慨以至泣下然謹難進之禮則一官之拜必抗章而力辭厲易退之節則一語不合必奉身而亟去其事君也不貶道以求售其愛民也不狥俗以茍安故其與世動輒齟齬自筮仕以至屬纊五十年間歴仕四朝仕於外者僅九考立於朝者四十日道之難行也如此然紹道統立人極為萬世宗師則不以用舍而加損也自熹故其道愈久而愈彰其學愈久而愈盛亦可見此理之在人心未嘗冺也辛未幸聚景園夏四月辛亥奏院鄧友龍請毋用偽黨除察官初置資善堂小學敎授五月旱詔求言壬申雨丁丑詔三省樞密院㸔詳封事擇其可行者以聞丁亥夀仁太上皇后崩諡曰慈懿壬辰趙善義呉旴使金為告哀使戊申同知許及之以母喪去位秋七月丁夘陳自强簽書樞密院事自强入都欲求諸州學官闕不遂居逆旅其主人為侂胄拂茶自强因曰我嘗識儀同先生主人曰官人求闕不遂盍見儀同乎自强曰吾貧旅費垂盡聞見儀同所費不少安能辦之主人曰俟語次試為拈出句餘無耗一日自强方悶坐有直省官持呼召來者約來日午後至府相見自强莫知所謂及往則侍從官以次畢集謁入傳令先召自強侂胄命設坐於堂上鄉之再拜次召從官同坐從官踧踖莫敢居上者侂胄徐曰陳先生老儒沉没可念坐客唯唯明日連章薦其才遂除太學録未踰年遷秘書郎入館甫半嵗除御史中丞入臺半月餘遂秉政八月戊寅太上皇帝違豫乃赦天下丁亥太上皇帝崩孝宗之喪趙汝愚當國始令羣臣服白凉衫皂帶以治事逮終䘮乃止論者以為是及光宗之喪禮部侍郎陳宗召復請百官以日易月禫除畢服紫衫皂帶以治事從之乙未日中有黒子丁酉左丞相京鏜薨贈諡文穆其子沆請避家諱改文忠議者謂未當改諡莊定鏜與劉徳秀最為兇險侂胄未顯時二人與之深交及用事侂胄所為暴虐皆二人敎之云壬寅皇太子坦薨追封邠王諡曰冲溫九月己未雷辛未合祭天地於明堂赦天下進士吕祖泰上書論韓侂胄其言略曰道與學自古皆恃以為國也丞相汝愚今之有大勲勞者也立偽學之禁逐汝愚之黨是將空陛下之國而陛下不之悟即陳自强何人也徒以侂胄童孺之師而躐致禁從陛下舊學之臣若龜年等今安在哉蘇師旦平江之吏胥周筠韓氏之厮役人人皆知之今師旦以潛邸隨龍周筠以皇后親屬俱至大官不知陛下在潜邸時果識所謂蘇師旦者乎椒房之親果有厮役之周筠者乎其自尊大而卑陵朝廷一至於此也願陛下亟誅侂胄及蘇師旦周筠而罷遂陳自强之徒故大臣在者獨周必大可用冝以代其任不然事將不測書出中外大駭侂胄怒㑹方行明堂禮故未及問復五日以祖泰上書狂妄坐决杖配欽州冬十月以韓侂胄為太傅癸巳在選侍郎費士寅請歴十五考以上無贓私罪犯者聽免職司舉主一員從之辛丑雨土十一月癸丑朔宗室與願除福州觀察使改名曮令資善堂授書己未皇后韓氏崩癸亥皇子増生丙寅上太上皇帝諡曰憲仁聖哲慈孝皇帝廟號光宗東北地震十二月癸未朔皇子増薨乙酉日中有黒子至癸巳乃滅辛丑權殯光宗於永崇陵癸夘祔光宗於太廟詔改明年為嘉泰元年乙巳蠲臨安紹興府民賦縁殯宫之役也己酉呉曦為太尉是冬括關外營田租不足是嵗封樁庫錢百萬緡賑諸州水旱辛酉嘉泰元年春正月戊午申嚴福建私鹽之禁壬戌右丞相謝深甫等薦士三十有五人詔籍記中書以待選擇丁夘禁鈐轄按閲受餽戊辰雪庚午以葛邲配饗光宗廟庭二月壬辰開資善堂癸巳監察御史林采言偽習之成造端自必大宜加絀削以周必大降官為少保依舊職致仕自朱熹獲罪黨禁益譁稍稱善類斥逐無遺至薦舉考校皆為厲禁姦貪狼籍暴慢恣肆之徒紛紜並起填塞要塗士知修飭守亷隅者例取姍侮或及於禍一時從逰特立不顧者屏伏丘壑依阿㢲懦者更名他師過門不入甚至變易衣冠狎逰市肆以自别其非黨詔修光宗實録乙未續修吏部七司法己亥四川初試敎官辛丑雨土三月丙寅雨雹戊寅臨安大火以姜特立為寜逺軍節度使夏四月辛巳下詔自責辛夘龍州蕃部冦邊詔戒風俗戊戌以潜邸為開元宫五月旱求言監太平惠民局夏允中者嘗建言當令侂胄平章軍國重事如文彦博侂胄聞之乃上疏乞致仕丙子雨丁丑雨雹六月丙午太白經天乙夘何澹罷甲子陳自强參知政事兼同知樞密院事張釡簽書樞密院事八月釡罷乙丑賜龔頤正出身己巳以呉曦為興州都統制兼知興州先是呉氏世職西陲列聖皆留其子孫於中朝侂胄欲握兵權乃遣曦入蜀八月言者以官冗㤙濫請因娶宗女授官者仍舊法終身止任一子兩府使相不得以郊㤙奏門客文學歸正官不許添差極邊初官不許求辟大使臣丁憂解官遇覃㤙不得遷秩著為令從之陳自强兼知樞密院事張巖參知政事程松知樞密院事先是松知錢塘縣侂胄有愛姬小故而出松聞之亟召女儈以八百千市之既而供饋之禮甚謹數日侂胄意稍解召之則知為松取矣侂胄怒松聞之亟上謁曰頃聞有郡守赴闕者欲得斯人懼逺方小吏不識事體他日有忤鈞顔我為王取之爾姬既入姬具言松所以謹待之禮侂胄大喜即日躐除太府寺丞遷諫議大夫松尤無耻又市一妾獻之名松夀侂胄遣問之曰柰何與大諫同名答曰欲使疵賤姓名常逹鈞聽耳侂胄憐之遂除同知樞密院事丙戌詔百官復議鐵錢利害九月辛亥決浙西圍田己夘雨土甲戌纂集孝宗朝典禮冬十月以光宗憂免瑞慶入貢丙戌以韓侂胄定䇿事迹付史館丙寅太白晝見十一月始命刑部得薦舉外任人十二月庚寅復免臨安府身丁錢是嵗諸路旱賑之占城國入貢獻馴象二續宋編年資治通鑑巻十二
