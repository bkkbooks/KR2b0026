body:
  text: 續宋編年資治通鑑卷十二宋劉時舉撰宋寧宗一乙卯慶元元年春正月丁亥蠲兩淮租稅黎州蠻寇邊詔兩浙淮南江東路荒歉諸州收養遺棄小兒以隂雨賑濟行在貧民尋詔釋大理三衙臨安府兩浙路杖以下囚丙辰白虹貫日二月詔兩浙諸州勸民耕墾荒田詔帥臣監司嵗終考郡守臧否以聞趙汝愚罷相右正言李沐奏乞罷趙汝愚政柄以尊安天位杜塞姦源是日汝愚竟出浙江亭待罪詔宣押赴都堂治事沐又再上書汝愚遂罷相章穎徐誼上疏乞留汝愚李祥楊簡坐汝愚黨並罷太學生楊宏中等六人上書竊見諫官李沐論前相趙汝愚所為乖戾隨即罷去若慮陛下父子之際懷不自安故黜汝愚以安天下亦未為過如沐所言則以為汝愚自居同姓數談夢兆專政擅權欺君植黨殆將不利於陛下以此加詆其實不然汝愚之去中外咨憤而言者以為父母歡呼蒙蔽天聽一至於此章穎發於中激力辨其非即遭斥逐既而祭酒李祥博士楊簡相繼抗論毅然求去一旦祥有補外之命惡其與簡扶植正論潔身而去極力擠排同日報罷六館之士拂膺憤怨涕泣而相告曰使二人者茍有一毫為已之私豈肯自附於已去之宰相而犯虎豹九關之怒哉今李沐自知邪正之不兩立而公論之不直於已乃欲盡覆正人以便其私必託朋黨以罔陛下之聽臣以二人之去若未足惜殆恐君子小人消長之機於此一判則靖康已然之驗何堪再見陛下獨不念去嵗之事乎人情驚疑變在朝夕當是時假非汝愚出死力定大議使陛下得以成夀康皇帝揖遜之志行孝宗皇帝未舉之喪雖百李沐罔知攸濟當國家多難汝愚方位樞府秉兵柄指揮操縱何向不可尚不於此時為利今朝廷清明上下定安乃有異志乎願陛下念汝愚之忠勤察祥簡之非黨灼李沐之回邪竄李沐以謝天下還祥簡以收士心詔宏中等罔亂上書扇搖國是各流五百里中書舍人鄧馹言臣仰惟國家開設學校教養士類德至渥也自建太學以來上書言事者無時無之纍朝仁聖相繼天覆海涵不加之罪甚者押歸本貫或他州聽讀而已紹熙間有布衣余古上書狂悖若以指斥之罪坐之誠不為過太上皇帝始者震怒降旨編管已而臣寮論奏竟從寬典陛下今日編管楊宏中等六人若以扇搖國是非之則未若指斥乘輿之罪大也以六輩言之則一夫為至寡也聖眀初政仁厚播聞睿斷過嚴人情震駭所有録黃未敢書行是日有旨李沐除右諫議大夫劉德秀除右正言知臨安府錢象祖捕諸生押送貶所未幾馹罷出知泉州托胄既誅有旨褒録上書之士宏中衜皆循一資端朝仲麟各免文解一次傳已死以束帛賜其家吕中曰父有天下傳歸於子此古今之常也後世以人臣往往貪天之功以為已力非小人之尤者乎嘗聞哲廟之立本宣仁保祐之賜與諸大臣建請之功羣憸矯誣乃以定策歸功蔡確而上謗宣仁下纍王圭遂為元祐大臣不可解之禍其往轍可鑒矣今我寧考纂承大統蓋慈福宫定計於內趙忠定諸臣效贊於外托胄何人夤緣戚里蒙蔽朝廷既攘奪其功掩為已有猶且附會言章竄之於必死之地亦獨何心哉然則確與托胄其罪俱不勝誅矣余端禮兼參知政事四月為右丞相京鏜知樞密院事己卯雨土三月丙戌朔日有食之庚寅太白經天命侍從等官集議江南松江諸州行鐵錢利害條具以聞夏四月丁巳太府寺丞吕祖儉上疏乞留汝愚併論朱熹彭龜年不當逐語侵韓托胄故也中書舍人鄧馹封還録黃詔祖儉志在無君其罪當誅姑從竄斥乃安置韶州尋改吉州都城大疫詔戒勵風俗時知名之士罷斥相繼人情洶洶韓托胄患之侍御史楊大法右正言劉德秀乃乞降詔以國是尊君中道等事訓飭在廷有不如詔者重置典憲詔乃直學士院傅伯夀所草也伯夀則奴事托胄𨽻人蘇師旦致身通顯至是草詔以詆善類丙午置廣惠倉詔諸路提舉司置修胎養令劉德秀上言邪正之辨無過於真與偽而已彼口道先王語而行如市人所不為在興王之所必斥也昔孝宗垂意規恢首務核實凡虛偽之徒言行相戾者未嘗不深知其姦臣願陛下以孝宗為法考核真偽以辨邪正詔下其章庚午德秀又劾國子博士孫元卿太學博士袁燮國子正陳武皆罷去司業汪逵入劄子辨之德秀以為狂言逵亦罷己未復置臺諫言事簿庚午詔三衙江上諸軍主帥將佐舉自代一人嵗舉所知二人癸酉命韓托胄為樞密都承旨固辭乃拜保寧軍節度使提舉萬夀宫初徐誼嘗告汝愚以節度使畀托胄汝愚不許至是建節秋七月丁酉御史中丞何淡上疏論專門之學流而為偽空虛短拙變詐沽名願風厲學者專師孔孟不必自相標榜詔榜朝堂後七日吏部郎官麋師旦亦建言請考核真偽未幾遷左司員外郎時有張貴謨者指論太極圖説之非淡又上疏論在朝之臣大臣既熟知其邪正之迹然不敢白發以招報復之禍望明詔大臣去其所當去者吕中曰我朝自王安石以新經破舊説凡學校科舉之間皆以王氏之經從事士用新進國尊新法而天下自是多事矣孝宗皇帝崇尚伊洛之學一時明師大儒相繼而奮張栻在湘朱熹在閩吕祖謙在浙皆推明是學以續孔孟正脈之傳天下學者翕然從之得其統者互以傳授凡巖谷草野之問皆出一轍學校科舉取人士大夫立身事君無不源流於是學之中涵養陶成士習粹美自小人用事摧靡道學而名之以偽海內之士瀾倒風從不惟禮義亷耻有所不顧而學士大夫之衣冠亦更變以趨時未幾異説橫興兵端驟起非朝廷慨然鋤去大姦以復正學幾為東南不可解之禍師道不立其流弊乃至此哉曩者紹興之前一時風俗之好尚為士者喜言時政為吏者喜立功名誠不能無所偏而執事懲之過甚遂一舉而厭薄之稍自好者斥以偽學欲自立者號以朋黨從是世俗毁方為員變真為佞而流風之弊有不可勝言者矣何淡復力攻趙汝愚乃落職罷祠十一月責授寧逺軍節度副使永州安置徐誼坐言汝愚亦貶南安軍明年汝愚卒於永州汝愚既責道過衡州已病又為守臣錢鍪所窘遂自服藥而卒天下寃之訃聞有旨追復元官許歸葬中書舍人汪義端繳還復官之命從之時有迪功郎趙師古者上書乞斬汝愚事雖不行然托胄之黨以汝愚有定策功惟恐其復進故當時謂汝愚不死事固不可知也己亥太白晝見八月己巳詔內外諸軍主帥條將佐士卒器械船艦可用與否及控扼防守之策以聞都城水以久雨決繫囚冬十月乙丑升潛藩府以秀州為嘉興府舒州為安慶府嘉州為嘉定府英州為英德府十一月己酉雨土戊戌加上帝后尊號夀聖隆慈備福太皇太后尊號加惠慈二字太上皇帝聖號曰聖安仁夀太上皇后尊號曰仁夀命宰執大閲庚戌何淡言薦舉弊是月詔諸司連銜薦舉十二月朱熹上疏辭職名詔依舊祕閣修撰仍舊宫觀丙戌慶元二年春正月戊子雷庚寅余端禮為左丞相京鏜為右丞相鄭僑知樞密院事謝深甫參知政事何淡同知樞密院事京鏜自上登極與托胄深交遂為執政劉德秀論留正四大罪其首云已招引偽學以危社稷乃落職罷祠韓托胄本武人志在招權納賄除不附已而已不能巧為説以擠善類也而士大夫嗜利無耻或素為清議所擯者乃教托胄言凡相與為異者皆道學人也隂疏姓名授之俾以次斥逐或又為言名道學則何罪當名曰偽學蓋謂貪黷放肆乃人真情其亷潔好修者皆偽也於是憸壬險狠猥薄無行之徒利其説之便攘臂奮袂以攻偽干進而學禁之禍酷矣二月知貢舉葉翥倪思劉德秀奏論文弊上言偽學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞將語録之類盡行除毁是科取士稍涉義理悉見黜落六經語孟中庸大學之書為世大禁矣六月張釡請申禁偽學中書舍人汪義端引唐李林甫故事以偽學之黨欲盡除之一時號為君子無不斥逐太皇太后聞而非之乃詔臺諫給舍論奏毋及舊事務在平正以副朕救偏建中之意御筆既出韓托胄及其黨皆怒時劉德秀為諫長與察官張伯垓等上疏言繼自今舊姦宿惡或滋長不悛臣等不言則誤陛下之進用言之則礙今日之御札若俟其敗壞國事如前日而後進言則徒有噬臍之悔三者皆無一而可望下此章播告中外令舊姦知朝廷紀綱尚在不至放肆從之尋詔改不必更及舊事為不必專及舊事自是托胄與其黨攻治之志愈急矣御筆之出也黃黼為殿中侍御史獨上言治道在黜其首惡而任其賢使賢者不失其職而不才者無所憾故仁宗嘗曰朕不欲留人過失於心此皇極之道也至於前事有合論列事體明證有關國家利害者臣不敢不以正對疏奏黼竟徙他官未幾罷去而姚愈遷殿中侍御史八月丙辰太常少卿胡紘建言比年偽學猖獗圖為不軌近元惡殞命羣邪屏迹或者議取前日偽學之姦黨次第用之望宣諭宰執權住進擬後二日遷知起居舍人十一月監察御史沈繼祖奏朱熹剽竊張載程頥之餘論以喫菜事魔之妖術以簧鼓後進張浮駕誕私立品題收召四方無行義之徒以益其黨伍相與餐粗食淡衣裒帶博或會徒於廣信鵝湖之寺或呈身於長沙敬簡之堂潛形匿迹如鬼如魅及不忠不孝不仁不義不公不亷等乞褫職罷祠其徒蔡元定佐熹為妖乞送别州編管詔朱熹落祕閣修撰罷宫觀竄元定於道州托胄欲論朱熹無敢先發者胡紘鋭然任責物色無所得經年醖釀章疏乃成會建禮樂之議遷太常少卿紘遂以藁授繼祖云吕中曰治平以前臺諫之所彈擊出於議論之公熙豐以後臺諫之所彈擊出於觀望之私王吕用事其所惡者蘇軾孔文仲也故李定謝景溫為之鷹犬章蔡弄權其所惡者元祐諸君子也故張商英來之邵為之鷹犬秦檜賣國其所惡者嶽飛張浚也故万俟卨何若為之鷹犬今托胄擅命其所惡者非道學之名儒乎而李沐沈繼祖輩之所彈劾一則曰偽學二則曰偽黨是亦托胄之鷹犬耳復置編修敕令所提舉官三月己亥皇弟柄封吳興郡王孝宗之喪上實以嫡孫行三年服監察御史胡紘言皇帝為孝宗喪當服期詔侍從百官議釋服吏部尚書葉翥等言請以六月六日大祥禮畢皇帝及百官並從吉服七月一日皇帝御正殿饗祖廟將來禫祭令禮官檢照纍朝禮例施行四月庚戌詔羣臣所議雖合禮經然非朕追慕之意丙午上慶元會計録傅伯夀言國子生員多濫請自今職事官期親釐務官子孫乃得試補從之夏四月甲子余端禮罷壬申何淡參知政事葉翥簽書樞密院事乙亥增置監察御史一員五月不雨辛卯賜舉人鄒應龍四百九十有九人甲午減諸路折帛和買錢三年建華文閣奉藏孝宗皇帝御集甲辰改慈福官為夀祠宫六月乙丑令監司帥守各於嵗終以所部縣令分臧否上中下三等合平而為七次春上奏頒之考功取旨升擢丙子皇子埈生至八月薨追封兖王諡曰沖惠秋七月丙戌以生皇子詔諸路死罪囚釋杖以下流人吕祖儉等量移內郡太學生楊宏中等各押歸本貫聽讀戊子劉德秀請付檢正都司考核守臣所陳便民五事取其近情合理者以聞八月戊戌韓托胄特加開府儀同三司萬夀觀使九月丁亥復分利州為東西路冬十月戊申上册寶於慈福夀康宫辛亥册皇后韓氏甲戌大閲十一月庚寅上詣夀康宫上太上皇帝寬恤詔令壬辰京鏜上孝宗淳熙寬恤詔令韓托胄為其父韓誡請諡誡乃神宗外孫也娶憲聖皇后女弟積官橫行承宣使未嘗更歷事任時黃唐為考功郎言其不可因求去遂命館職官一員暫權考功遂諡誡曰忠定丁巳慶元三年春正月壬寅樞密鄭僑罷謝深甫兼知樞密院事二月神宗玉牒髙宗實録成大理司直邵裒然請詔大臣自今權臣之黨偽學之徒不得除在內差遣詔下其章復紹熙升差將校法委主帥選擇審核保明三月建東華門竄內侍王德謙上即位德謙驟遷承宣使是春德謙求建節上許之德謙乃薦吳宗旦為刑部侍郎直學士院宗旦為德謙草制且引天寶同光故事為比臺諫交章遂寢其命言者以宗旦交結德謙坐追三官又劾德謙為人求官贓以巨萬計嘗以導駕燈籠自奉服食擬乘輿獄未成降為團練使使居撫州十二月安置汀州禁浙西圍田詔有司奏讞議罪不當者論如律夏四月丙午雨土旱乙丑雨雹閏六月甲戌內出銅器付尚書省毁之民間並赴官收賣甲子論留正共引偽學之罪貶邵州大奚作亂秋八月戊子復置嚴州神泉監甲午均諸路職田九月壬寅以旱詔四川制置總領諸司蠲放民賦乙丑令帥臣監司臧否郡守詔監司部守薦舉改官並於奏牘前甘結聲説非偽學之人秋當大比漕司前期取家狀必欲書以不是偽學五字時有柴中行為撫州推官獨申漕司云自幼習易讀程氏易傳未委是與不是偽學如以為偽不願考校士論壯之十二月知綿州王沇乞置偽學之籍仍自今曽受偽學舉薦關升及刑法亷吏自代之人並令省部籍記姓名與間慢差遣從之偽學黨逆得罪者凡五十九人宰執四人趙汝愚留正王藺周必大待制以上十三人朱熹徐誼彭龜年陳傅良薛叔似章穎鄭湜樓鑰林大中黃由黃黼何異孫逢吉餘官三十一人劉光祖吕祖儉葉適楊芳項安世沈有開曽三聘遊仲鴻吳獵李祥楊簡趙汝讜趙汝談陳峴范仲黼汪逵孫元卿袁燮陳武田淡黃度張體仁蔡幼學黃灝周南吳柔勝李􅐉王厚之孟浩趙鞏白炎震武臣三人皇甫斌危仲壬張致逺士人八人楊宏中周端朝張衜林仲麟蔣傅徐範蔡元定吕祖泰太學生削何淡名治其罪冬十一月癸酉雷丙申赦十一月辛丑上孝宗徽號加紹統同道冠德昭功八字是日太皇太后崩於慈福宫詔報期明年加諡憲聖慈烈皇后癸卯日南至祀天地于圜丘赦天下壬子車駕自慈福宫還大內十二月丙子始御正殿丁丑紹興府以太后殯宫故蠲貧民身丁折帛絹綿錢甲申雨土詔銓試依舊制二人而取一革樞密院以密白補官戊午慶元四年春正月京尹趙師􅋷除工部侍郎托胄妻早死有四妾皆封郡夫人其次十人亦有名位去嵗有獻北珠冠四枚者托胄喜以遺四夫人而十人慍托胄患之師􅋷時守臨安亟出十萬緡市北珠為十珠冠乘托胄入朝未歸遣人致饋十人者大喜分持而去托胄歸十人者咸來致謝遂以翼日都市行燈羣婢皆頂珠冠而出明日語托胄曰我曹夜來過朝天門都人以為稀有咸聚觀焉郡王奈何不與趙大卿轉官耶翼日又言之故有是命托胄嘗與衆客飲南園過山莊指其竹籬茆舍而謂曰此真田舍間氣象所惜者欠雞鳴犬吠耳少焉有犬嘷於叢薄之下亟遣視之京尹趙侍郎也托胄大笑其後京尹坐他事罷諸生為詩誚之有也曽學犬吠村莊之句即指此也丙寅葉翥同知樞密院事七月罷丁卯兩浙江淮荆湖四川民流詔有司舉行寬恤之政二月辛未詔兩省侍從臺諫各舉所知一人毋舉宰執子弟親黨三月己丑以憲聖殯宫之役蠲臨安紹興府租稅有差經筵進讀三朝寶訓夏五月己亥韓托胄為少傅賜玉帶以朝己酉詔禁偽學禁女冠毋入大內秋七月罷𣙜茶丁逢入見極論元祐建中調停之害且引蘇轍任伯雨之言為證時薛叔似葉適坐汝愚黨久斥皆起家為郡故逢有是言宰執京鏜何淡大然之翌日除軍器監八月久雨命決繫囚丙子謝深甫知樞密院事兼參知政事許及之同知樞密院事庚辰白氣亘天丙戌以太上皇帝聖躬清復詔詣夀康宫上夀九月壬寅太白晝見癸卯太白經天京鏜上重修敕令格式申明詔頒天下是月詔造新厯冬十二月丙戌再蠲臨安府身丁錢是嵗育宗室與願于宫中己未慶元五年春正月蔡璉誣告趙汝愚定䇿時有異謀乃議送大理托胄欲問彭龜年以實其事中書舍人范仲藝謁托胄語之曰章確之權不為不盛然至今得罪於清議者以同文之獄故耳相公胡為蹈之托胄曰某初無此心京鏜劉德秀實主其議既而臺諫官連疏有請詔以纍經赦宥於是彭龜年追元官勒停曽三聘追元官而璉補進義副尉乙卯果州學官王莘罷辛酉初命漕臣無出身者勿差官考試壬戌建玉堂二月乙丑胡紘罷庚午雪癸酉白氣亘天乙酉諫議張釡劾劉光祖佐逆不成蓄憤懷姦欺世罔上五罪詔光祖落職房州居住先是光祖撰涪城學記有世方以道為偽而以學為棄物夫好惡出於一時是非定於萬世學者盍謹所先入以待豪傑之興此語聞於朝乃有是命三月罷監司臧否郡守之制戊申四川行對補錢引法夏四月用察院程松言詔大理評事已改官未歷縣人並令親民一次著為令五月壬辰朔新厯成戊戌親試舉人賜曽從龍等四百十有二人及第丁酉以久雨民多疾疫命臨安府賑恤之壬子命諸州學置武士齋舍六月丁逢罷是夏盜竊太廟金寶秋七月癸丑劉德秀罷甲寅禁髙麗日本商旅博易銅錢八月癸亥白氣亘天辛巳太廟太祖夾室柱生芝上過夀康宫上太上皇帝夀戊子立沿邊諸州武舉取士法冬十月丙子金使來賀瑞慶節陳自強上政目三十事十一月己丑詔復右司一員十二月庚午建安仁宅惠濟倉庫於廣東水土惡弱諸州以給士大夫之罪而不能歸者是月編慶元寬恤詔令賑諸州水災庚申慶元六年春正月己亥皇子坦生二月詔諸路雜犯死罪以下囚釋杖以下以皇子生故也己丑雨土戊寅上太上皇帝玉牒乙酉雪閏二月庚寅京鏜為左丞相謝深甫為右丞相何淡知樞密院事兼參知政事乙巳留正致仕辛亥吳曦以殿前都指揮使為昭信軍節度使詔許用前宰執舉狀為職司以待執政之子弟焉三月甲子朱熹卒熹以去年四月致仕至是卒於建陽之考亭熹平居惓惓無一念不在於國聞時政之失則寂然有不豫之色語及國勢之未振則感慨以至泣下然謹難進之禮則一官之拜必抗章而力辭厲易退之節則一語不合必奉身而亟去其事君也不貶道以求售其愛民也不徇俗以茍安故其與世動輒齟齬自筮仕以至屬纊五十年間歷仕四朝仕於外者僅九考立於朝者四十日道之難行也如此然紹道統立人極為萬世宗師則不以用舍而加損也自熹故其道愈久而愈彰其學愈久而愈盛亦可見此理之在人心未嘗泯也辛未幸聚景園夏四月辛亥奏院鄧友龍請毋用偽黨除察官初置資善堂小學教授五月旱詔求言壬申雨丁丑詔三省樞密院看詳封事擇其可行者以聞丁亥夀仁太上皇后崩諡曰慈懿壬辰趙善義吳旴使金為告哀使戊申同知許及之以母喪去位秋七月丁卯陳自強簽書樞密院事自強入都欲求諸州學官闕不遂居逆旅其主人為托胄拂茶自強因曰我嘗識儀同先生主人曰官人求闕不遂盍見儀同乎自強曰吾貧旅費垂盡聞見儀同所費不少安能辦之主人曰俟語次試為拈出句餘無耗一日自強方悶坐有直省官持呼召來者約來日午後至府相見自強莫知所謂及往則侍從官以次畢集謁入傳令先召自強托胄命設坐於堂上鄉之再拜次召從官同坐從官踧踖莫敢居上者托胄徐曰陳先生老儒沉沒可念坐客唯唯明日連章薦其才遂除太學録未踰年遷祕書郎入館甫半嵗除御史中丞入臺半月餘遂秉政八月戊寅太上皇帝違豫乃赦天下丁亥太上皇帝崩孝宗之喪趙汝愚當國始令羣臣服白涼衫皂帶以治事逮終喪乃止論者以為是及光宗之喪禮部侍郎陳宗召復請百官以日易月禫除畢服紫衫皂帶以治事從之乙未日中有黑子丁酉左丞相京鏜薨贈諡文穆其子沆請避家諱改文忠議者謂未當改諡莊定鏜與劉德秀最為凶險托胄未顯時二人與之深交及用事托胄所為暴虐皆二人教之云壬寅皇太子坦薨追封邠王諡曰沖溫九月己未雷辛未合祭天地於明堂赦天下進士吕祖泰上書論韓托胄其言略曰道與學自古皆恃以為國也丞相汝愚今之有大勳勞者也立偽學之禁逐汝愚之黨是將空陛下之國而陛下不之悟即陳自強何人也徒以托胄童孺之師而躐致禁從陛下舊學之臣若龜年等今安在哉蘇師旦平江之吏胥周筠韓氏之厮役人人皆知之今師旦以潛邸隨龍周筠以皇后親屬俱至大官不知陛下在潛邸時果識所謂蘇師旦者乎椒房之親果有厮役之周筠者乎其自尊大而卑陵朝廷一至於此也願陛下亟誅托胄及蘇師旦周筠而罷遂陳自強之徒故大臣在者獨周必大可用冝以代其任不然事將不測書出中外大駭托胄怒會方行明堂禮故未及問復五日以祖泰上書狂妄坐決杖配欽州冬十月以韓托胄為太傅癸巳在選侍郎費士寅請歷十五考以上無贓私罪犯者聽免職司舉主一員從之辛丑雨土十一月癸丑朔宗室與願除福州觀察使改名曮令資善堂授書己未皇后韓氏崩癸亥皇子增生丙寅上太上皇帝諡曰憲仁聖哲慈孝皇帝廟號光宗東北地震十二月癸未朔皇子增薨乙酉日中有黑子至癸巳乃滅辛丑權殯光宗於永崇陵癸卯祔光宗於太廟詔改明年為嘉泰元年乙巳蠲臨安紹興府民賦緣殯宫之役也己酉吳曦為太尉是冬括關外營田租不足是嵗封樁庫錢百萬緡賑諸州水旱辛酉嘉泰元年春正月戊午申嚴福建私鹽之禁壬戌右丞相謝深甫等薦士三十有五人詔籍記中書以待選擇丁卯禁鈐轄按閲受餽戊辰雪庚午以葛邲配饗光宗廟庭二月壬辰開資善堂癸巳監察御史林采言偽習之成造端自必大宜加絀削以周必大降官為少保依舊職致仕自朱熹獲罪黨禁益譁稍稱善類斥逐無遺至薦舉考校皆為厲禁姦貪狼籍暴慢恣肆之徒紛紜並起填塞要塗士知修飭守亷隅者例取姍侮或及於禍一時從逰特立不顧者屏伏丘壑依阿巽懦者更名他師過門不入甚至變易衣冠狎逰市肆以自别其非黨詔修光宗實録乙未續修吏部七司法己亥四川初試教官辛丑雨土三月丙寅雨雹戊寅臨安大火以薑特立為寧逺軍節度使夏四月辛巳下詔自責辛卯龍州蕃部冦邊詔戒風俗戊戌以潛邸為開元宫五月旱求言監太平惠民局夏允中者嘗建言當令托胄平章軍國重事如文彥博托胄聞之乃上疏乞致仕丙子雨丁丑雨雹六月丙午太白經天乙卯何淡罷甲子陳自強參知政事兼同知樞密院事張釡簽書樞密院事八月釡罷乙丑賜龔頤正出身己巳以吳曦為興州都統制兼知興州先是吳氏世職西陲列聖皆留其子孫於中朝托胄欲握兵權乃遣曦入蜀八月言者以官冗恩濫請因娶宗女授官者仍舊法終身止任一子兩府使相不得以郊恩奏門客文學歸正官不許添差極邊初官不許求辟大使臣丁憂解官遇覃恩不得遷秩著為令從之陳自強兼知樞密院事張巖參知政事程松知樞密院事先是松知錢塘縣托胄有愛姬小故而出松聞之亟召女儈以八百千市之既而供饋之禮甚謹數日托胄意稍解召之則知為松取矣托胄怒松聞之亟上謁曰頃聞有郡守赴闕者欲得斯人懼逺方小吏不識事體他日有忤鈞顔我為王取之爾姬既入姬具言松所以謹待之禮托胄大喜即日躐除太府寺丞遷諫議大夫松尤無耻又市一妾獻之名松夀托胄遣問之曰奈何與大諫同名答曰欲使疵賤姓名常逹鈞聽耳托胄憐之遂除同知樞密院事丙戌詔百官復議鐵錢利害九月辛亥決浙西圍田己卯雨土甲戌纂集孝宗朝典禮冬十月以光宗憂免瑞慶入貢丙戌以韓托胄定䇿事迹付史館丙寅太白晝見十一月始命刑部得薦舉外任人十二月庚寅復免臨安府身丁錢是嵗諸路旱賑之占城國入貢獻馴象二續宋編年資治通鑑卷十二
