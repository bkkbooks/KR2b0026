body:
  text: 續宋編年資治通鑑卷三宋劉時舉撰宋高宗三紹興元年春正月上在越州升為紹興府大赦改元復制科李成據江淮六七州連兵數萬中外惡之以張俊為江淮招討使討之分荆湖為東西路録趙普後封安定郡王二月己卯日中有黑子詔近臣條陳時務置祕書省尋召范同等試館職二月詔募兵耕閒田張俊復筠州臨江軍馬進走江州俊追殺之復江州成遂遁于是俊軍有鐵山之號罷免行錢金人已破福津蹂同谷迫武興浚遂保閬州而以張深為四川制置與參議劉子羽趨益昌金陷階州引兵犯文州而江漲不得度遂還因棄成州去而知岷州李惟德亦以城來歸于是盡失陜西地但餘階成岷鳯洮五郡及鳯翔府之和尚原隴州之方山原而已浚承制以王庶知興元府張榮破敵于泰州水寨以榮知泰州夏四月隆祐皇太后孟氏崩曲端為王庶所譛吳玠亦憾之乃書曲端謀反四字于手心因待浚至舉以示浚浚素知端庶不可並立且方倚玠為用庶等知之即言端嘗作詩題柱有指斥乘輿之意曰不向關中興事業即來江上泛漁舟此其罪也浚乃送端恭州獄有武臣康隨者在鳯翔嘗以事忤端端鞭其背有切骨恨浚以隨提㸃䕫州路刑獄端聞之曰吾其死矣呼天者數聲端有馬名鐵象日馳四百里至是連呼鐵象可惜者又數聲乃赴逮至命獄吏縶之維之糊其口熁之以火端乾渴而死士大夫莫不惜之軍民亦皆悵恨五月吳玠大敗敵于和尚原出爵募民賑糴收催役錢六月上賜經筵官扇殯皇太后孟氏于㑹稽秋七月罷鬻官田侍御史沈與求言范宗尹罪狀二十遂落職奉祠詔江東西路依舊以升洪為帥府八月以秦檜為右僕射范宗尹既免相位久虛檜倡言曰我有二䇿可以聳動天下或問何以不言檜曰今無相不可行也語聞乃有是命九月癸亥大饗明堂復合祭奉太祖太宗配録元祐黨人推恩范柔中等三十人並與一子恩澤以吕頤浩為左僕射頤浩復相首言先平內寇然後可以禦外侮今李成摧破李允文革面張用招安李敦仁已敗江淮惟張琪邵青兩寇非久必可蕩平惟閩中之寇不一又孔彥舟據鄂馬友據潭曹成李宏在湖南江西之間而鄧慶龔富剽掠南雄英韶諸郡雖賊兵多寡不等然閩中之寇最急廣東之寇次之蓋閩中去行在不逺二廣不經殘破若非疾速𠞰除為害不細詔樞密院措置命汪藻修日厯冬十月詔戒朋黨以廖剛為起居舍人剛首乞經營建康為固守計吳玠大敗敵于和尚原立便錢法范汝為為盜命孟慶為福建等路宣撫使太尉韓世忠副之大軍至汝為亟入據建州城建盜犯南劍守臣張觷敗之明年正月世忠至福州見李綱綱謂曰建州百姓多無辜及下建州民得全活汝為竄回原洞自殺僞齊寇廬州守臣王亨敗之斬首數千級又寇秦隴張浚遣王彥關師古等戰却之遂復秦州張浚復洮州李惟德以岷州來歸薛安靜以海州來歸十一月詔侍從舉官行營屯田定兵法十二月初除宗室為從官西外宗正司居福州南外居泉州彗星見詔求言復廣西茶鹽司詔恤張孝純家文階繫銜復分左右劉光世守鎮江以金銀銅為三色泉其文曰招納信寶獲敵人則燕餞而遣之未幾踵至得數千衆皆給良馬利器用之如華人因創赤心竒兵兩軍頗得其用是嵗交趾李乾德死子陽煥立壬子紹興二年正月上在紹興乃詔待制以上舉人才不拘已仕未仕各舉一人上如臨安乃詔橫行非軍功不遷二月收御府散亡圖書以李綱為湖廣宣撫使詔除監司避本貫上自巡幸以來經筵久輟至是復之董震以商虢二州叛降僞齊金人陷慶陽府執楊可升降之葉夢得討劉豫復光州三月罷發運司䖍盜李敦仁三嵗蹂四州十縣至是平盜曹成陷道州賀州嶽飛擊敗之降韓世忠盜崔進陷漢陽軍殺守臣以其衆附孔彥舟盜趙進犯江州李綱討降之劉忠據白面山韓世忠擊敗之䖍盜謝達犯惠州守臣范琮退保子城城外居民縱兵使焚掠獨葺蘇軾白鶴故居奠之而去封李陽煥為交趾郡王金人犯隴州吳玠遣楊政敗之于方山原楊偉叛殺翟興降僞齊親試舉人賜張九成二百五十餘人及第川陜類試楊希仲等一百二十人皆即家賜第夏四月詔戒朋黨以翟汝文參知政事太平州軍亂王進討平之上諭二相曰頤浩專治軍旅秦檜專理庶務以吕頤浩都督江淮荆湖諸軍開府鎮江時張浚軍三萬韓世忠軍四萬嶽飛軍二萬四千王燮軍一萬三千劉光世軍四萬又神武中軍楊沂中後軍叵師古皆不下萬人御前崔增姚端張守忠等軍亦二萬合有兵十六七萬且請自夏月舉兵北向以復中原頤浩尋次常州部將趙延夀叛劉光世討平之于是頤浩稱疾不進尋命傅嵩卿主管督府事吕頤浩還閏月輔臣言內外差遣欲外自監司郡守及舊格嘗除通判內自察官省郎以上及館職書局編修官外寺監丞以下並令吏部依格注擬從之五月臨安府火上嘗謂輔臣曰人主待臣下當以至誠若知其不可用不若罷去疑而留之無益也置修政局以秦檜提舉翟汝文同提舉是秋因彗見以言者謂修政所講多刻薄之事失人心致天變罷之詔內外言陳治道上欲復余深官給事中程瑀言深是蔡京腹心深官可復則京儻未死官亦可復也乃詔寢前事命建隆故事行在釐務官自通直郎以上日輪一人轉對令極言得失六月頒戒石銘蘄黃鎮撫孔彥舟叛降僞齊詔川陜合赴省試人于宣撫司類試復鬻官田參政翟汝文罷秋七月胡安國入對遂進言曰臣聞保國必先定計定計必先定都建都擇地必先設險分土必先遵制制國以守必先恤民夫國之有斯民猶人之有元氣不可不恤也除亂賊選縣令輕賦斂更弊法省官吏皆恤民之事也而行此有道必先立政立政有經必先核實核實者是非毁譽各不亂真此致理之大要也是非核實而後賞罰當賞罰當而後號令行人心順從惟上所命以守則固以戰則勝以攻則服天下定矣然欲致此顧人主志向如何耳尚志所以立本也正心所以決事也養氣所以制敵也宏度所以用人也寬隱所以明德也具此五者帝王之能事畢矣乞以核實而上十有五篇付宰相參酌施行遷安國給事中仍命兼侍讀春秋起居郎王居正見上曰秦檜嘗語臣中國之人唯當著衣噉飯共圖中興臣時心服其言又自謂使檜為相數月必驚動天下今為相施設止是願陛下以臣所言問檜所行于是檜恨之乃出居正知婺州詔吕頤浩赴都堂治事修玉牒以孟庾權同都督諸軍提㸃鑄錢司言江地殘破逺涉大江乞權就䖍饒二州併工鼓鑄許之詔自今守臣除代並引對八月司諫吳表臣言大江之南上自荆鄂下至常鎮十郡之間要緊處七渡上流最急者三荆南之公安石首嶽之北津中流最緊者二鄂之武昌太平之采石下流最緊者建康之宣化鎮江之瓜州是也當擇官兵修器械宜每縣分定百里專令巡尉守之詔以付沿江守帥無為軍守臣王彥恢言建康古都乃用武之地欲保建康必內以大江為之控扼外以淮甸為之藩籬又必措置兵食以贍國費然大江以南千里浩渺決欲控扼非戰艦不可大江以北方軌坦途欲遏長驅非戰車不可舒廬滁和良疇百萬欲措置軍食非營田不可詔彥恢就本軍措置置沿海制置司于浙西以仇悆領之吕頤浩言敵舟自海道來有二一自海北岸來至明之定海一自海南岸來至秀之海鹽萬一有警逺不相及乞仇悆專管浙西别命人管浙東上從之胡安國罷黃龜年劾檜專主和議沮止國家恢復逺圖且植黨專權漸不可長檜上章辭位尋落職初檜獻上二䇿大略欲以河北人還金人中原人還劉豫上怒曰檜言南人歸南北人歸北朕北人將安歸檜既免上乃諭朝廷終不復用仍榜朝堂于是給事中程瑀侍御史江躋左司諫吳表臣起居舍人張燾皆坐檜黨罷去彗出胃上憂之九月赦求直言王倫自北歸至是入見上嘉其勞倫言虛中奉使日久守節不屈遂命其子師瑗添差福建路轉運判官乃命潘致堯為奏表通問使高公繪副之以朱勝非為右僕射置六部監門初用御筆除官以劉光世為江東西安撫使置司建康以王似為川陜等安撫處置副使復用文臣為都承㫖張浚在關陜三年以新集之軍當方張之敵蚤夜訓輯以劉子羽為上賔任趙開為都運使開善理財為茶鹽酒法方用兵調度百出而民不加賦擢吳玠為大將守鳯翔玠每戰輒勝先是將軍曲端逐其帥王庶而奪之印又不受節制富平之役其腹心張中彥等降敵曲端與知之後下端獄論死西北遺民聞浚威德歸附日衆于是全蜀按堵且以牽制東南江淮亦賴以安㑹有言張浚殺趙哲曲端為無辜而任劉子羽吳玠趙開為非朝廷疑之遣王似副浚浚聞王似來求解兵柄且上疏略曰臣熟知王似平生最詳愼重寬厚為民不擾似之所長至于駕馭將帥裁處機事不為身謀以圖事功緩急之際恐不可使一也臣又伏思陛下之意欲委似招徠未附之人臣竊惟天下之患獨在金人金未退聽難將不已何暇撫叛又况似任環慶日嘗為置制使行檄諸路皆不奉從如張中孚之徒昔有深隙今又安能懷之使來乎二也臣被命川陜外而子羽吳玠之徒蹈萬死一生之地與金為仇內而張深程唐日夜謀議此輩皆以侍從高選嘗立破敵之功各望陛下天日照明寖加任使今事將就緒一旦以無功侍從驟處副任人情謂何三也臣去嵗差似知興元府兼節制吳玠王彥彥與玠各有論列遂復以劉子羽代之今似為副使必不安職四也臣最單微獨荷陛下知遇屢經大謗得荷保全凡所委任莫非親付似未嘗得對天日之表有此除擢恐自此臣之過失日聞于陛下之前矣五也貼黃又云臣所陳事理上干國家臣非不知含糊茍且自為身謀特慮劉子羽張深程唐吳玠王彥之徒必自引去而似之才能庸常終至敗事臣雖萬死無以塞責兼事之利害又有至切者伏見蜀之士大夫及流寓侍從官以下貽書至臣及朝廷執事皆以自守安靜為言彼非為陛下國家計乃自為家屬及一身計者也曾不知將士所以捨僞從正數至十五餘萬彼于臣何有哉特以上念祖宗恩德之厚次戴陛下養育之仁各欲奮力以求平定今若按兵自固能保其不離散而為亂乎此特其一耳而况金為不道必欲傾搖我社稷剪除我民人而我自委靡日困終必為金所滅為此說者蓋不思之甚也臣每與劉子羽吳玠王彥等日夜治兵儲糧食備器械其一蓋欲張大聲勢使金知我必與為敵不敢萌意南行其二亦欲激勵將士講明戰陳為陛下興大利除大害奉迎車駕以福中原而或者區區獨為身謀遂起怨謗相為朋黨求撓臣權在臣去就利害甚輕而國家之計恐有未便伏望陛下謀之于心斷之于已以惠天下臣之此言天日鬼神實所照臨伏望陛下留臣章疏于中恐大臣不安其職求為進退益煩聖慮冬十月置饒州馬監置九路都轉運江浙荆湖閩廣置司湖州尋罷遣官如溫州薦饗録孔氏後以孔端朝為祕書省正字十一月沈與求罷上諭翰臣曰朕觀周宣王修車馬備器械其車攻復古一篇可見若漢世祖起南陽初起尋邑之戰以少擊衆大敗昆陽其下如唐肅宗雖不足道能用郭子儀李光弼以復王室朕謂中興之治無有不用兵者朕前日與世忠論至晚膳過時夜思至四更不寢可召侍從輪日條對朕將參酌以必萬全楊么據洞庭命李綱㑹兵捕之以劉大中胡蒙朱異明槖薛徽宣諭諸路上曰今遣卿等務令民被實惠守令民之師帥縣令尤親于民姦贓之萌必須按發公正奉法之人必須薦舉如山林不仕賢者亦當具名以聞平反獄訟觀風問俗等事並書于厯朕將一一行之此非尋常遣使比也十二月禁銷金李綱罷職李綱言荆湖之地自古號為用武之國今朝廷保有東南制御西北當於鼎澧荆鄂皆宿重兵使與四川襄漢相接乃有恢復中原之漸未及行而綱廢以盧法原為宣撫處置副使召張浚劉子羽馮康國還以王似代後遂罷便宜指揮詔諸路教習禁軍鎮撫使陳規奏屯田事請以兵為農因農為兵詔奬之復汝州尼瑪哈在雲中使薩里罕裒五路叛兵與僞齊劉䕫內侵陷商州僞齊劉豫遷汴時四月也至之日大風拔木人人震恐豫曲赦以安之金盡殺契丹人是嵗高麗入貢癸丑紹興三年正月上在臨安時行宫外朝止一殿日見羣臣省政事則謂之後殿食畢引公事則謂之內殿雙日講讀則謂之講殿河南鎮撫使翟琮入西京俘僞留守蓋邦雄以歸置總領錢糧官詔恤刑望祭諸陵二月置扈州買馬司金薩里罕自鳯翔長安聲言東去其實由商于出漢陰直趨金商鎮撫使王彥以三千人迎敵敗走彥退保石泉縣金人遂入金州知興元府劉子羽聞金州失守即率兵守饒風嶺且報陜西統制吳玠玠一日夜馳三百里至饒風列營拒之薩拉噶不能前募死士由饒風之左間道援崖而上犯祖溪關繞出饒嶺後玠遽還仙人關遂陷興元府子羽退保三泉縣從兵才三百玠引兵趨三泉縣與子羽守㑹統制官王俊又以兵千五百至于是軍聲復振乃因潭毒山築壘守之敵至金商無所得殺馬而食且盡遂殺兩河簽軍而食之且遣人齎書招子羽及玠子羽斬之而縱其一問孰遣汝來曰國相國相謂劉益也子羽與玠謀遣兵邀于武林關而金人棄輜重已去擊其後軍敗之以席益參知政事徐俯簽書樞密院事詔守臣到任先具民間利害或邊防五事來上知藤州侯彭老獻賣鹽見錢十萬上批其奏曰縱有寬剩自合歸之有司非守臣所當進納特降一官罷之三月寬贓吏法東流令王鮪坐贓罪本抵死降從編竄以韓世忠為淮東宣撫使泗州置司未幾朝廷遣韓肖胄使金乃詔解元以二千人戍泗州餘留屯江北世忠亦請移屯鎮江復兩淮監司命韓世清提舉淮西茶鹽夏四月朱勝非以母喪去位陳規召還入對乞罷鎮撫使上納之以規知池州以劉光世為江東宣撫使池州置司時光世與世忠更戍世忠已至鎮江而姦入池州城潜燒倉庫光世擒而鞫之皆言世忠所遣于是世忠與光世交訴于上詔光世移司建康府上遣使和解仍書後漢寇恂賈復事戒之僞齊陷虢州統制官謝皋死之王彥復金州又敗敵于洵陽湖寇楊么衆益甚僣號大聖天王紀年肆赦立鍾相少子儀為太子么已下臣事之分兵寇公安石首等縣命折彥質㑹兵捕之彥質請師命王􅊅為荆南制置使録文彥博後五月作睦親宅增小吏俸以韓肖胄充奉表通問使胡松年副之增月樁錢立武科令國子監量養士知秦州吳璘以茶綵招致小蕃三十八族以馬來市西馬得通秋七月置博學宏詞科其法以制詔書表露布檄針銘紀贊頌序為題大旱詔羣臣言闕政尚書洪擬奏曰法行之公則人樂而氣和行之乖則人怨而氣偏試以小事論之近時監司守臣獻羡餘則黜之宣撫司獻則受之是行法止及疏逺之臣也有自庶僚為侍從卧家視事未嘗入謝遂得美職而去若鼓院官移疾廢朝則斥罷之是行法止及冗賤之官也𣙜貨立法甚嚴犯者籍家財以充賞而大官有勢者連行列肆公行酤賣則不敢問是行法止及孤弱之家也小事如此推廣而言之則怨多而和氣傷可知矣疏奏上嘉納之録勳臣後朱勝非起復右僕射庚辰雨八月上以雨暘不時蘇湖地震詔中外極言無隱置史館命監司條上五事具便民或邊防五事如守臣例九月泉州大水詔除被災之稅吕頤浩罷增贓絹錢數吳勝敗僞齊兵于黃堆寨以吕祉知建康府記注官復許直前奏事以趙鼎為江西安撫制置大使詔非機速事仍命給舍書讀諸將擁重兵而無分定路分至是如儀江東淮南路劉光世領之鎮江建康淮東路韓世忠領之荆南嶽鄂潭鼎澧黃州漢陽軍領之江西路舒蘄州嶽飛領之利州路吳玠領之明州兼沿海制置郭仲荀領之冬十月詔曰奔競之風不息朋比之勢漸成可令臺諫察其微而劾之僞齊陷鄧隨等州罷諸路類試十一月廣西走馬承受俞似為諸臣所劾而罷自是遂不復除禁邊兵侵齊修運河復司農丞御史常同援臺格請皇城𨽻臺察上曰改使皇城司𨽻臺察何所憚顧祖宗法不可易詔自今臣僚不得妄有陳請更改元祐薦舉十科以舉人才嵗令侍從以上各舉三人十二月韓肖胄偕金使來請還僞齊之俘及西北士民之在南者且欲畫江以益劉豫侍御史常同言先振國威則和戰常在我若一意議和則和戰常在彼靖康以來分為兩事可為鑒戒上因從容語武備曰今養兵已二十萬有畸同曰未聞二十萬兵而畏人者也復將作軍器監官金人陷和尚原宣撫司分川陜之地責守于諸將自秦鳯至洋州以制置吳玠主之屯仙人關金房至巴達以鎮撫王彥主之屯通川文龍至威茂以統制劉錡主之屯巴西洮岷至階成命統制官關師古主之屯武都甲寅紹興四年正月上在臨安章誼充奉表通問使請還兩宫反河南地韓肖胄與朱勝非議不合力求罷詔以本職知溫州金犯仙人關吳玠擊走之關師古深入敵境忽遇金兵與戰大敗師古歸大潭內懷慚懼遂隻身降金玠念其下忠義不從師古以叛亟撫定之玠既併其衆所統益以精純然自此遂失洮岷之地獨有階成而尋復秦鳯隴州二月張浚入見遂赴樞密院治事監州鹽稅吳仲上疏訟浚無罪大略云復辟之功大失地之罪小使浚罪去誰可繼其忠乎疏入不報臺臣辛炳率同列劾浚遂落職奉祠復交論浚跋扈不臣之罪大于是詔浚福州居住王似升川陜宣撫使盧法原副之夏四月又以吳玠為副使唐輝胡交修常同交章論子羽謂張浚過惡皆子羽助成之安置白州是冬有吳玠復辭兩鎮之節以贖子羽之罪降詔奬諭置臨安府牧馬監五月嶽飛復隨郢襄陽等州罷武尉言者論以中書細務歸六曹至是條上裁省細務一百十一事歸之六月復川陜類試詔御前軍並𨽻樞密院秋七月建昌軍亂制置司遣兵討平之章誼使還尼瑪哈答書又約以淮南毋得長駐軍馬蓋欲畫江以益劉豫也復勳官十二級八月范沖入對上云以史事召御兩朝大典皆為姦臣所壞若此時更不修定何以得本末以趙鼎知樞密院都督川陜荆襄諸軍鼎將行上疏言陛下建炎中遣張浚出使川陜國勢百倍于今浚有補天浴日之功陛下有山河之誓君臣相信古今無二而終致物議以被竄逐夫喪師失地浚則有之然未必如言者之甚也大扺專黜陟之典受不御之權則小人不安其分謂爵賞可以茍求一不如意便生觖望是時蜀士至于醵金募人詣闕訟之以無為有何以自明故有志之士欲為國立事者每以浚為戒且浚有罪臺諫論之可也人主誅之亦無憾今乃下至草澤行伍凡有求于浚而不得者人人投牒醜詆及其母妻甚者指為跋扈抑何甚哉今臣無浚之功當此重責去朝廷逺恐好惡是非復紛紛于聰明之下矣伏望睿鑒憫臣孤忠使得展布四體少寬陛下西顧之憂魏良臣為奉表通問使韓世忠奏遣使議和非計乞勵兵恢復上謂大臣世忠為國之忠甚切可降詔奬諭仍先開諭二聖在逺當時遣使通問十二月魏良臣使還浚問以金事良臣謂金有長平之衆且出大言謂當割建州以南王爾家為小國索銀絹犒軍其數十萬仍約良臣再使侍御史魏矼言當罷講和二字以攻守代之遂不復遣福州提刑吕聽問上疏乞追削王安石王爵置襄陽府路郢隨唐鄧信陽屬焉九月辛酉大饗明堂侍御史魏矼言三省樞密院間有不用録黃而直降指揮者亦有畫黃而不下六部者紀綱廢弛欲望特詔三省樞密院除實係機密邊事外當一切遵守舊典從之朱勝非請解官持餘服從之以趙鼎為右僕射僞齊遣人詣金主且乞師南征以鄂勒歡達蘭權左右副元帥調渤海漢兒軍以應豫豫遣其子麟姪猊將兵與俱南侵于是騎兵自泗攻滁步兵自楚攻承楚州守臣樊序遁韓世忠自承州退保鎮江諜報至舉朝震恐冬十月詔親征上如平江乃以張浚為浙西江東宣撫使以韓世忠進屯揚州世忠敗敵于大儀鎮遂擒其將世忠又遣兵往天長縣遇敵于鴉口擒女真四十餘人又解元成閔敗之于承州一日凡十三戰時敵進據夀春安豐仇悆與孫暉敗之翌日遂復安豐十一月下詔罪狀劉豫蜀兵敗敵于臘家城以張浚知樞密院先是浚極言北方既無西顧憂必并力窺東南上思其言遂召之浚請遣嶽飛渡江入淮以牽制敵兵之在淮東者從之命張浚視師江上浚疾驅臨江召韓世忠劉光世與議且勞其軍將士見浚來勇氣百倍王繐敗敵于滁州仇悆求援嶽飛飛遣牛皋徐慶赴援敗敵于廬州又淮西宣撫使選鋒將王師晟復南夀春府補獻助者官十一月月犯昴太史奏以為敵滅之象求直言敵退達蘭在泗州而烏珠屯于竹墩鎮以書幣遺世忠約戰世忠報書略曰元帥軍事良苦下諭約戰敢不疾治行李以承奉指揮也敵師為世忠所扼㑹大雨雷糧道不通至殺馬而食軍皆怨憤聞上親征金主晟病篤夜引軍還劉麟及其弟猊等棄輜重遁去續宋編年資治通鑑卷三
